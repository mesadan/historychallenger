<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Did They Overlap? — History Challenger</title>
<meta name="description" content="Did these civilizations coexist? A history quiz about empires, kingdoms and dynasties that shared the same era.">
<meta name="robots" content="index, follow">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body{font-family:Georgia,'Times New Roman',serif;background:#000;color:#fff;display:flex;flex-direction:column;align-items:center;padding:0 0 2rem}
@media(min-width:768px){body{padding:0 0 2rem}}
.wrap{width:100%;max-width:900px;padding:1rem 0.75rem}
@media(min-width:768px){.wrap{padding:1.5rem}}
@media(min-width:1200px){.wrap{padding:2rem}}
@media(min-width:1024px){.wrap{max-width:1100px}}
@media(min-width:1400px){.wrap{max-width:1280px}}
.card{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:14px;padding:1.25rem}
@media(min-width:600px){.card{padding:1.75rem 2rem}}
@media(min-width:1024px){.card{padding:2rem 2.5rem}}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;border-bottom:1px solid #2a2a2a;padding-bottom:.9rem;flex-wrap:wrap;gap:8px}
.hdr-left{display:flex;align-items:center;gap:11px}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.ttl{font-size:20px;font-weight:700;color:#fff;letter-spacing:.01em}
@media(min-width:600px){.ttl{font-size:24px}}
.ttl-sub{font-size:10px;color:#666;letter-spacing:.09em;text-transform:uppercase;font-family:-apple-system,sans-serif}
.mets{display:flex;gap:8px}
.met{background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:5px 12px;text-align:center;min-width:56px}
.mv{font-size:18px;font-weight:700;color:#fff}
.ml{font-size:10px;color:#666;font-family:-apple-system,sans-serif;letter-spacing:.04em}

/* USER */
.user-btn{display:flex;align-items:center;gap:7px;background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:5px 10px;cursor:pointer;font-family:-apple-system,sans-serif;font-size:12px;color:#aaa;-webkit-tap-highlight-color:transparent}
.user-btn:hover{border-color:#555;color:#fff}
.user-avatar{width:22px;height:22px;border-radius:50%;object-fit:cover}
.user-name{max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sign-in-btn{background:#c8903a;color:#000;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:-apple-system,sans-serif}
.user-menu{position:fixed;right:8px;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:10px;padding:8px;min-width:180px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.8);display:none}
@media(min-width:600px){.user-menu{position:absolute;top:100%;right:0;margin-top:6px}}
.user-menu-item{display:block;width:100%;text-align:left;padding:8px 12px;background:none;border:none;border-radius:6px;color:#aaa;font-family:-apple-system,sans-serif;font-size:13px;cursor:pointer}
.user-menu-item:hover{background:#1a1a1a;color:#fff}
.user-menu-item.danger{color:#e06040}
.user-menu-divider{border:none;border-top:1px solid #2a2a2a;margin:4px 0}
.user-stats-row{display:flex;gap:12px;padding:8px 12px 4px;border-bottom:1px solid #1a1a1a;margin-bottom:4px}
.user-stat-val{font-size:16px;font-weight:700;color:#c8903a;font-family:Georgia,serif}
.user-stat-lbl{font-size:10px;color:#555;font-family:-apple-system,sans-serif}

/* SETUP */
.sf{font-family:-apple-system,sans-serif}
.setup-title{font-size:17px;font-weight:700;color:#fff;margin-bottom:.35rem;font-family:Georgia,serif}
.diff-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1.25rem}
@media(max-width:500px){.diff-grid{grid-template-columns:1fr}}
.dc{border:1px solid #2a2a2a;border-radius:10px;padding:10px 12px;cursor:pointer;background:#111;transition:border-color .12s,background .12s;-webkit-tap-highlight-color:transparent}
.dc:hover{background:#181818;border-color:#555}
.dc.sel{border-color:#c8903a;background:#1a1000}
.dn{font-size:13px;font-weight:700;color:#fff;margin-bottom:3px}
.dt{font-size:10px;color:#c8903a;background:#111;border:1px solid #2a2a2a;border-radius:3px;padding:1px 5px;display:inline-block;margin-bottom:4px;letter-spacing:.02em}
.dd{font-size:11px;color:#666;line-height:1.4}
.divider{border:none;border-top:1px solid #2a2a2a;margin:1.1rem 0}
.round-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem}
.rc{border:1px solid #2a2a2a;background:#111;border-radius:8px;padding:6px 18px;font-size:13px;cursor:pointer;color:#888;font-family:-apple-system,sans-serif;-webkit-tap-highlight-color:transparent}
.rc:hover{border-color:#555;color:#fff}
.rc.sel{border-color:#c8903a;background:#1a1000;color:#c8903a;font-weight:700}
.btn{border:1px solid #3a3a3a;background:#111;border-radius:10px;padding:10px 20px;font-size:14px;cursor:pointer;color:#fff;font-family:-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;transition:background .1s,border-color .1s}
.btn:hover{background:#1a1a1a;border-color:#555}
.btn:disabled{opacity:.4;cursor:default}
.btn-p{background:#c8903a;border-color:#c8903a;color:#000;font-weight:700}
.btn-p:hover{background:#e0a84a;border-color:#e0a84a}
.section-num{font-size:11px;color:#c8903a;letter-spacing:.1em;text-transform:uppercase;font-family:-apple-system,sans-serif;font-weight:700;margin-bottom:.2rem}

/* GAME */
.round-label{font-size:11px;color:#555;font-family:-apple-system,sans-serif;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5rem}
.anchor-name{font-family:Georgia,serif;font-size:clamp(1.4rem,4vw,2rem);font-weight:700;color:#fff;margin-bottom:.25rem}
.question-text{font-size:14px;color:#888;font-family:-apple-system,sans-serif;margin-bottom:1.5rem}

/* ANCHOR BLOCK */
.anchor-block{margin-bottom:1.5rem;padding:1.25rem 1.5rem;background:#0a0800;border:1px solid #c8903a33;border-radius:12px}
.anchor-name{font-family:Georgia,serif;font-size:clamp(1.4rem,4vw,2rem);font-weight:700;color:#fff;margin-bottom:.2rem}
.anchor-dates{font-size:13px;color:#c8903a;font-family:-apple-system,sans-serif;margin-bottom:.85rem;font-weight:600}
.single-tl{padding:0 2px}
.single-tl-bar{height:8px;background:#1a1a1a;border-radius:4px;overflow:hidden}
.single-tl-fill{height:100%;width:100%;border-radius:4px}
.single-tl-fill.gold{background:linear-gradient(90deg,#c8903a,#e0a84a)}

/* QUESTION PROMPT */
.question-prompt{font-size:15px;color:#aaa;font-family:-apple-system,sans-serif;margin-bottom:1.25rem;line-height:1.6;padding:0 2px}
.question-prompt strong{color:#fff}

/* RESOLUTION */
.resolution-box{background:#080808;border:1px solid #1e1e1e;border-radius:12px;padding:1.25rem 1.5rem;margin-top:1rem}
.res-result{font-family:-apple-system,sans-serif;font-size:15px;font-weight:700;margin-bottom:.75rem}
.res-result.res-correct{color:#5acc8a}
.res-result.res-wrong{color:#e06040}
.overlap-note{font-size:13px;color:#c8903a;font-family:-apple-system,sans-serif;margin-bottom:.75rem;font-style:italic}
.res-explanation{font-size:13px;color:#777;font-family:-apple-system,sans-serif;margin-bottom:1rem;line-height:1.6;padding-bottom:.75rem;border-bottom:1px solid #1a1a1a}
.res-timelines{display:flex;flex-direction:column;gap:.75rem;margin-top:.75rem}
.res-civ{display:flex;flex-direction:column;gap:.3rem}
.res-civ-name{font-family:-apple-system,sans-serif;font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:4px}
.res-civ-dates{font-size:11px;font-weight:400;color:#555}
.res-track{height:10px;background:#111;border-radius:5px;position:relative;overflow:hidden}
.res-fill{position:absolute;top:0;height:100%;border-radius:5px;min-width:2px}
.res-legend{display:flex;gap:16px;margin-top:.85rem;font-size:12px;font-family:-apple-system,sans-serif;flex-wrap:wrap;padding-top:.75rem;border-top:1px solid #1a1a1a}

/* ROUND LABEL */
.round-label{font-size:11px;color:#555;font-family:-apple-system,sans-serif;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.75rem}
/* OPTIONS */
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
@media(max-width:400px){.options-grid{grid-template-columns:1fr}}
.opt-btn{border:1.5px solid #2a2a2a;background:#111;border-radius:12px;padding:1rem 1.25rem;cursor:pointer;text-align:left;-webkit-tap-highlight-color:transparent;transition:border-color .12s,background .12s;font-family:-apple-system,sans-serif}
.opt-btn:hover:not(:disabled){border-color:#555;background:#181818}
.opt-btn:disabled{cursor:default}
.opt-name{font-size:15px;font-weight:700;color:#fff;font-family:Georgia,serif}
.opt-btn.correct{border-color:#5acc8a!important;background:#0a1a0a!important}
.opt-btn.correct .opt-name{color:#5acc8a}
.opt-btn.wrong{border-color:#e06040!important;background:#1a0a05!important}
.opt-btn.wrong .opt-name{color:#e06040}
.score-big{font-family:Georgia,serif;font-size:clamp(3rem,10vw,5rem);font-weight:700;color:#c8903a;text-align:center;margin:.5rem 0}
.score-bar-wrap{height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden;margin-bottom:1rem}
.score-bar-fill{height:100%;background:linear-gradient(90deg,#c8903a,#e0a84a);border-radius:3px;transition:width .8s ease}

/* LOADING */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;display:none}
.overlay.show{display:flex}
.overlay-inner{text-align:center;font-family:-apple-system,sans-serif;color:#888;font-size:15px;padding:2rem 2.5rem;border-radius:8px;min-width:220px}
.spinner{width:32px;height:32px;border:2px solid #2a2a2a;border-top-color:#c8903a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}

.guest-banner{background:#1a1000;border:1px solid #c8903a33;border-radius:8px;padding:10px 14px;margin-bottom:1rem;font-family:-apple-system,sans-serif;font-size:12px;color:#c8903a;display:flex;align-items:center;justify-content:space-between;gap:10px}
.guest-banner-cta{background:#c8903a;color:#000;border:none;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
</style>

<style>
/* Parchment theme overrides */
:root{
  --ink:#1a150e;--parchment:#f5edd8;
  --gold:#8a6208;--gold-light:#b88a18;--page-bg:#f0e6cc;

<body>
<div class="wrap">
  <div class="card">
    <div class="mets" id="mets" style="display:none;justify-content:flex-end;gap:8px;margin-bottom:1rem">
      <div class="met"><div class="mv" id="sc">—</div><div class="ml">Score</div></div>
      <div class="met"><div class="mv" id="rn">—</div><div class="ml">Round</div></div>
    </div>
    <div id="guest-banner-area"></div>
    <div id="body"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-inner">
    <div class="spinner"></div>
    <div id="overlay-msg">Loading questions…</div>
  </div>
</div>

<script>
const WORKER = 'https://histroychallenger-api.maletethan.workers.dev';
const GOOGLE_CLIENT_ID = '413171729958-s5kimtsskjsfsu45ao1ah0gob8f4ghn9.apps.googleusercontent.com';

// ── STATE ─────────────────────────────────────────────────────────
let S = { diff: 'disciple', rounds: 5, round: 0, sets: [], score: 0, answered: 0, phase: 'setup' };
let _user = null;
let _guestGames = parseInt(localStorage.getItem('hc_guest_games_ov') || '0');
let _seenIds = new Set(JSON.parse(localStorage.getItem('hc_seen_overlap') || '[]'));

// ── AUTH ──────────────────────────────────────────────────────────
function getToken(){ return localStorage.getItem('hc_token'); }
function clearToken(){ localStorage.removeItem('hc_token'); }

async function initAuth(){
  const token=getToken();
  if(token){
    try{
      const res=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'verify_token',token})});
      const d=await res.json();
      if(d.user){_user=d.user;}
    }catch(e){}
  }
  renderGuestBanner();
}

function renderGuestBanner(){
  const area=document.getElementById('guest-banner-area');
  if(!area||_user)return;
  if(_guestGames>=2){
    area.innerHTML=`<div class="guest-banner">
      <span>📊 Sign in to track your scores and streaks</span>
      <button class="guest-banner-cta" onclick="window._hcSignIn()">Sign in free</button>
    </div>`;
  }
}

// ── SETUP ─────────────────────────────────────────────────────────
function renderSetup(){
  S.phase = 'setup';
  document.getElementById('mets').style.display = 'none';
  const diffs = [
    { k:'disciple', icon:'🕯', name:'Disciple', tag:'Famous civilizations · Clear gaps', desc:'One correct answer with a long clear overlap. Wrong options are from distant eras — a real challenge for any history buff.' },
    { k:'master', icon:'⚔️', name:'Master', tag:'Mixed eras · Real knowledge', desc:'Wrong options are from the same broad era as the anchor. You need to actually know whether they coexisted.' },
    { k:'keeper', icon:'🏆', name:'Keeper of Time', tag:'Same era · Expert precision', desc:'All four options are from roughly the same era as the anchor. Only precise date knowledge will save you.' }
  ];
  const rounds = [3, 5, 8];

  document.getElementById('body').innerHTML = `
    <div class="sf">
      <div class="section-num">I — Difficulty</div>
      <div class="diff-grid">
        ${diffs.map(d => `
          <div class="dc ${S.diff===d.k?'sel':''}" onclick="selDiff('${d.k}')">
            <div style="font-size:20px;margin-bottom:6px">${d.icon}</div>
            <div class="dn">${d.name}</div>
            <div class="dt">${d.tag}</div>
            <div class="dd">${d.desc}</div>
          </div>`).join('')}
      </div>
      <div class="divider"></div>
      <div class="section-num">II — Rounds</div>
      <div class="round-row">
        ${rounds.map(r => `<div class="rc ${S.rounds===r?'sel':''}" onclick="selRounds(${r})">${r} rounds</div>`).join('')}
      </div>
      <div class="divider"></div>
      <button class="btn btn-p" onclick="startGame()" style="width:100%;font-size:16px;padding:14px">Start →</button>
      <div style="text-align:center;margin-top:1rem">
        <a href="/" style="font-size:13px;color:#555;font-family:-apple-system,sans-serif">← Home</a>
      </div>
    </div>`;
}

function selDiff(k){ S.diff = k; renderSetup(); }
function selRounds(r){ S.rounds = r; renderSetup(); }

// ── GAME ──────────────────────────────────────────────────────────
async function startGame(){
  showOverlay('Loading questions…');
  try{
    const token = getToken();
    const seenIds = [..._seenIds];
    const res = await fetch(WORKER, {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action:'get_overlap_sets', diff:S.diff, needed:S.rounds, token, seen_ids:seenIds})});
    const data = await res.json();
    if(data.error) throw new Error(data.error);

    const sets = data.sets || [];
    (data.sets || []).forEach(s => _seenIds.add(s.id));
    localStorage.setItem('hc_seen_overlap', JSON.stringify([..._seenIds].slice(-500)));

    if(!sets.length){ hideOverlay(); alert('No questions available. Please try again later.'); return; }

    S.sets = sets;
    S.round = 0;
    S.score = 0;
    S.answered = 0;
    S.phase = 'game';

    if(!_user){ _guestGames++; localStorage.setItem('hc_guest_games_ov', _guestGames); renderGuestBanner(); }

    hideOverlay();
    renderRound();
  }catch(e){
    hideOverlay();
    alert('Failed to load questions: ' + e.message);
  }
}

function renderRound(){
  if(S.round >= S.sets.length){ showFinal(); return; }
  const set = S.sets[S.round];

  document.getElementById('mets').style.display = 'flex';
  document.getElementById('sc').textContent = S.score;
  document.getElementById('rn').textContent = (S.round + 1) + '/' + S.sets.length;

  // Anchor timeline — just show anchor bar in gold, clean and simple
  document.getElementById('body').innerHTML = `
    <div>
      <div class="round-label">Round ${S.round + 1} of ${S.sets.length} · ${S.diff.charAt(0).toUpperCase()+S.diff.slice(1)}</div>

      <div class="anchor-block">
        <div class="anchor-name">${set.anchor.name}</div>
        <div class="anchor-dates">${formatYear(set.anchor.start)} — ${formatYear(set.anchor.end)}</div>
        <div class="single-tl">
          <div class="single-tl-bar">
            <div class="single-tl-fill gold"></div>
          </div>
        </div>
      </div>

      <div class="question-prompt">
        Only one of these civilizations existed at some point simultaneously with <strong>${set.anchor.name}</strong>. Which one?
      </div>

      <div class="options-grid" id="options-grid">
        ${set.options.map((opt, i) => `
          <button class="opt-btn" id="opt-${i}" onclick="answer(${i})">
            <div class="opt-name">${opt.name}</div>
          </button>`).join('')}
      </div>

      <div id="resolution-area"></div>
      <div id="next-area"></div>
    </div>`;
}

function answer(idx){
  const set = S.sets[S.round];
  const chosen = set.options[idx];
  const multiplier = {disciple:1, master:1.5, keeper:2}[S.diff] || 1;
  const pts = chosen.correct ? Math.round(100 * multiplier) : 0;
  S.score += pts;
  S.answered++;

  // Disable all buttons immediately
  set.options.forEach((_, i) => {
    const btn = document.getElementById('opt-' + i);
    if(btn) btn.disabled = true;
  });

  // Style the chosen button
  const chosenBtn = document.getElementById('opt-' + idx);
  if(chosenBtn) chosenBtn.classList.add(chosen.correct ? 'correct' : 'wrong');

  // Build the resolution — all timelines sorted chronologically
  const allCivs = [
    { name: set.anchor.name, start: set.anchor.start, end: set.anchor.end, role: 'anchor' },
    ...set.options.map(o => ({
      name: o.name, start: o.start, end: o.end,
      role: o.correct ? 'correct' : 'wrong',
      chosen: set.options.indexOf(o) === idx
    }))
  ].sort((a, b) => (a.start || 0) - (b.start || 0));

  const minYear = Math.min(...allCivs.map(c => c.start || 0));
  const maxYear = Math.max(...allCivs.map(c => c.end || 0));
  const totalSpan = maxYear - minYear || 1;

  function barLeft(start){ return ((( start - minYear) / totalSpan) * 100).toFixed(1); }
  function barWidth(start, end){ return (((end - start) / totalSpan) * 100).toFixed(1); }

  const timelinesHTML = allCivs.map(c => {
    const left = barLeft(c.start);
    const width = barWidth(c.start, c.end);
    let color, label;
    if(c.role === 'anchor'){
      color = '#c8903a'; label = 'anchor';
    } else if(c.role === 'correct'){
      color = '#5acc8a'; label = 'overlap';
    } else {
      color = '#e06040'; label = 'no overlap';
    }
    return `
      <div class="res-civ">
        <div class="res-civ-name" style="color:${color}">${c.name}
          <span class="res-civ-dates">${formatYear(c.start)} — ${formatYear(c.end)}</span>
        </div>
        <div class="res-track">
          <div class="res-fill" style="left:${left}%;width:${width}%;background:${color}"></div>
        </div>
      </div>`;
  }).join('');

  // Show overlap period annotation for the correct civ
  let overlapNote = '';
  if(set.overlap_start != null && set.overlap_end != null){
    const yrs = Math.abs(set.overlap_end - set.overlap_start);
    const correctOpt = set.options.find(o => o.correct);
    overlapNote = `<div class="overlap-note">✦ ${set.anchor.name} and ${correctOpt ? correctOpt.name : ''} coexisted from ${formatYear(set.overlap_start)} to ${formatYear(set.overlap_end)} — ${yrs} years</div>`;
  }

  const resArea = document.getElementById('resolution-area');
  if(resArea){
    resArea.innerHTML = `
      <div class="resolution-box">
        <div class="res-result ${chosen.correct?'res-correct':'res-wrong'}">
          ${chosen.correct ? '✓ Correct' : '✗ Wrong'} — +${pts} pts
        </div>
        ${overlapNote}
        ${set.explanation ? `<div class="res-explanation">${set.explanation}</div>` : ''}
        <div class="res-timelines">${timelinesHTML}</div>
        <div class="res-legend">
          <span style="color:#c8903a">━ ${set.anchor.name}</span>
          <span style="color:#5acc8a">━ Overlapped</span>
          <span style="color:#e06040">━ Did not overlap</span>
        </div>
      </div>`;
  }

  // Update score
  document.getElementById('sc').textContent = S.score;

  // Next button
  const nextArea = document.getElementById('next-area');
  if(nextArea){
    const isLast = S.round + 1 >= S.sets.length;
    nextArea.innerHTML = `<button class="btn btn-p" onclick="nextRound()" style="width:100%;margin-top:.75rem">
      ${isLast ? 'See results →' : 'Next round →'}
    </button>`;
  }
}

function nextRound(){
  S.round++;
  renderRound();
}

async function showFinal(){
  // Save session
  if(_user){
    const total = S.sets.length * Math.round(100 * ({disciple:1,master:1.5,keeper:2}[S.diff]||1));
    const pct = Math.round((S.score / total) * 100);
    try{
      await fetch(WORKER, {method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({action:'save_session', token:getToken(), diff:S.diff, rounds:S.sets.length, scores:[], avg_score:pct, game_type:'overlap'})});
    }catch(e){}
  }
  document.getElementById('mets').style.display = 'none';
  const total = S.sets.length * Math.round(100 * ({disciple:1,master:1.5,keeper:2}[S.diff]||1));
  const pct = Math.round((S.score / total) * 100);
  const m = pct>=90?'🏆 Keeper of Time':pct>=70?'⚔️ Master':pct>=50?'🕯 Disciple':'📜 Initiate';

  document.getElementById('body').innerHTML = `
    <div style="text-align:center">
      <div style="font-size:13px;color:#7a6040;margin-bottom:.5rem;font-family:-apple-system,sans-serif">${S.sets.length} rounds · ${S.diff.charAt(0).toUpperCase()+S.diff.slice(1)} level</div>
      <div class="score-big">${S.score} <span style="font-size:1.2rem;color:#7a6040;font-weight:400">/ ${total}</span></div>
      <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${pct}%"></div></div>
      <div style="font-size:13px;color:#7a6040;margin:.4rem 0 .75rem;font-family:-apple-system,sans-serif;letter-spacing:.06em;text-transform:uppercase">${m}</div>
      ${!_user?`<div style="margin:.75rem 0;padding:12px;background:#1a1000;border:1px solid #c8903a33;border-radius:8px;font-family:-apple-system,sans-serif;font-size:13px;color:#c8903a">
        <div style="margin-bottom:8px">Sign in to save your score and track your progress</div>
        <button class="sign-in-btn" onclick="signIn()">Sign in with Google</button>
      </div>`:''}
      <div style="display:flex;gap:10px;justify-content:center;margin-top:1rem;flex-wrap:wrap">
        <button class="btn btn-p" onclick="startGame()">Play again</button>
        <button class="btn" onclick="renderSetup()">← Menu</button>
        <button class="btn" onclick="window.location.href='/play.html'">History Challenger</button>
      </div>
    </div>`;
}

// ── HELPERS ───────────────────────────────────────────────────────
function formatYear(y){
  if(y == null) return '?';
  return y < 0 ? Math.abs(y) + ' BC' : y + ' AD';
}

function showOverlay(msg){
  document.getElementById('overlay-msg').textContent = msg;
  document.getElementById('overlay').classList.add('show');
}

function hideOverlay(){
  document.getElementById('overlay').classList.remove('show');
}

// ── INIT ──────────────────────────────────────────────────────────
initAuth();
renderSetup();
</script>

</body>
</html>
