<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — History Challenger</title>
<meta name="robots" content="noindex">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#000;color:#fff;min-height:100vh}
a{color:#c8903a;text-decoration:none}

/* XP / TIER */
.tier-section{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:14px;padding:1.5rem;margin-bottom:2rem;text-align:center}
.tier-name{font-family:Georgia,serif;font-size:1.4rem;font-weight:700;color:#c8903a;margin-bottom:.2rem}
.tier-xp{font-size:12px;color:#aaa;margin-bottom:.75rem;font-family:-apple-system,sans-serif}
.tier-bar-wrap{height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden;margin-bottom:.4rem}
.tier-bar-fill{height:100%;background:linear-gradient(90deg,#8a6208,#c8903a);border-radius:3px;transition:width 1s ease}
.tier-bar-labels{display:flex;justify-content:space-between;font-size:10px;color:#888;font-family:-apple-system,sans-serif}

/* LAYOUT */
.page{max-width:900px;margin:0 auto;padding:2.5rem 1.5rem 5rem}

/* PROFILE HEADER */
.profile-hero{display:flex;align-items:center;gap:1.5rem;margin-bottom:1rem;flex-wrap:wrap}
.avatar-wrap{position:relative}
.profile-avatar{width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid #c8903a;display:block}
.avatar-placeholder{width:72px;height:72px;border-radius:50%;background:#d4b98a;border:2px solid #c8903a;display:flex;align-items:center;justify-content:center;font-size:28px}
.profile-info h1{font-family:Georgia,serif;font-size:1.75rem;font-weight:700;margin-bottom:.2rem;color:#1a150e}
.profile-info .email{font-size:13px;color:#5a3e1a;margin-bottom:.4rem}
.profile-info .joined{font-size:12px;color:#7a6040}
.hero-btns{display:flex;gap:.5rem;margin-left:auto;align-items:center;flex-wrap:wrap}
.sign-out-btn{background:none;border:1px solid #b8a878;color:#5a3e1a;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:-apple-system,sans-serif}
.sign-out-btn:hover{border-color:#8a6208;color:#3a2e1e}
.edit-profile-btn{background:none;border:1px solid #b8a878;color:#5a3e1a;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:-apple-system,sans-serif}
.edit-profile-btn:hover{border-color:#8a6208;color:#3a2e1e}

/* HQ BADGE */
.hq-badge{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:10px;padding:.5rem .9rem;text-align:center;min-width:70px}
.hq-badge-val{font-family:Georgia,serif;font-size:1.4rem;font-weight:700;line-height:1}
.hq-badge-lbl{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
.hq-no-score{font-size:12px;color:#7a6040;text-decoration:none;white-space:nowrap}
.hq-no-score:hover{color:#8a6208}

/* SETTINGS PANEL */
.settings-panel{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:14px;padding:1.5rem;margin-bottom:2rem;display:none}
.settings-panel.open{display:block}
.settings-section-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:.75rem;font-family:-apple-system,sans-serif}
.settings-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem;flex-wrap:wrap}
.settings-label{font-size:13px;color:#aaa;min-width:120px}
.settings-input{flex:1;min-width:180px;background:#1a1a1a;border:1px solid #333;color:#fff;border-radius:8px;padding:7px 12px;font-size:13px;font-family:-apple-system,sans-serif}
.settings-input:focus{outline:none;border-color:#c8903a}
.settings-save{background:#c8903a;color:#000;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.settings-save:hover{background:#b07828}
.settings-divider{border:none;border-top:1px solid #1e1e1e;margin:1.25rem 0}
.danger-btn{background:none;border:1px solid #6b2020;color:#cc4444;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer}
.danger-btn:hover{background:#2a0808;border-color:#cc4444}
.settings-msg{font-size:12px;color:#5acc8a;min-height:18px;margin-top:.25rem}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1rem;margin-bottom:2.5rem}
.stat-card{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:12px;padding:1.25rem;text-align:center}
.stat-val{font-family:Georgia,serif;font-size:2rem;font-weight:700;color:#c8903a;line-height:1}
.stat-lbl{font-size:12px;color:#bbb;margin-top:.4rem;font-family:-apple-system,sans-serif}
.stat-card.highlight{border-color:#c8903a33;background:#0a0800}

/* CHART */
.chart-section{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:14px;padding:1.5rem;margin-bottom:2rem}
.section-title{font-size:13px;color:#3a2e1e;letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-bottom:1.25rem;font-family:-apple-system,sans-serif}
.chart-section .section-title{color:#aaa}
.chart-wrap{height:140px;position:relative;display:flex;align-items:flex-end;gap:6px}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.chart-bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:height .6s ease;position:relative;cursor:default}
.chart-bar:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid #333;color:#fff;font-size:11px;padding:3px 8px;border-radius:5px;white-space:nowrap;font-family:-apple-system,sans-serif;z-index:10}
.chart-label{font-size:9px;color:#888;text-align:center;font-family:-apple-system,sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.chart-empty{display:flex;align-items:center;justify-content:center;height:100%;color:#666;font-size:14px;font-family:-apple-system,sans-serif}

/* BREAKDOWN */
.breakdown-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
.breakdown-card{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:12px;padding:1.25rem}
.breakdown-name{font-size:15px;font-weight:700;margin-bottom:.75rem;color:#ddd}
.breakdown-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:.4rem}
.breakdown-key{color:#aaa}
.breakdown-val{color:#fff;font-weight:600}
.breakdown-bar{height:4px;background:#1a1a1a;border-radius:2px;margin-top:.75rem;overflow:hidden}
.breakdown-fill{height:100%;border-radius:2px;background:#c8903a;transition:width .8s ease}

/* SESSIONS */
.sessions-list{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:14px;overflow:hidden;margin-bottom:2rem}
.session-row{display:flex;align-items:center;padding:1rem 1.25rem;border-bottom:1px solid #111;gap:1rem}
.session-row:last-child{border-bottom:none}
.session-row:hover{background:#111}
.session-score{font-family:Georgia,serif;font-size:1.5rem;font-weight:700;min-width:54px;text-align:center}
.session-score.great{color:#5acc8a}
.session-score.good{color:#c8903a}
.session-score.ok{color:#888}
.session-meta{flex:1}
.session-diff{font-size:13px;font-weight:600;color:#fff;margin-bottom:.2rem}
.session-date{font-size:12px;color:#888}
.session-rounds{font-size:12px;color:#888;margin-left:auto}

/* DISPATCH BADGE */
.dispatch-card{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:12px;padding:1.25rem;margin-bottom:1rem}

/* STREAK */
.streak-display{display:flex;align-items:center;justify-content:center;gap:1.5rem;background:#0a0800;border:1px solid #c8903a33;border-radius:14px;padding:1.5rem;margin-bottom:2rem}
.streak-num{font-family:Georgia,serif;font-size:3rem;font-weight:700;color:#c8903a;line-height:1}
.streak-info{text-align:left}
.streak-label{font-size:14px;font-weight:600;color:#fff}
.streak-sub{font-size:12px;color:#aaa;margin-top:.2rem}

/* EMPTY / LOADING */
.loading{text-align:center;padding:4rem;color:#7a6040;font-size:15px}
.empty-state{text-align:center;padding:3rem;color:#888;font-size:14px;line-height:1.8}
.empty-state a{color:#c8903a}
.not-signed-in{text-align:center;padding:5rem 1.5rem}
.not-signed-in h2{font-family:Georgia,serif;font-size:1.5rem;margin-bottom:.75rem;color:#1a150e}
.not-signed-in p{color:#7a6040;margin-bottom:1.5rem;font-size:15px}
.sign-in-btn{background:#c8903a;color:#000;border:none;border-radius:10px;padding:12px 28px;font-size:16px;font-weight:700;cursor:pointer}

@media(max-width:600px){
  .profile-hero{flex-direction:column;align-items:flex-start;gap:1rem}
  .hero-btns{margin-left:0}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .settings-row{flex-direction:column;align-items:flex-start}
  .settings-input{width:100%}
  .nav-links a:not(.nav-play){display:none}
}
</style>
<script src="/nav.js?v=2" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* Parchment theme overrides */
:root{
  --ink:#1a150e;--parchment:#f5edd8;
  --gold:#8a6208;--gold-light:#b88a18;--page-bg:#f0e6cc;
}
html,body{background:#f0e6cc !important}
.card{background:#faf4e4 !important;border-color:#c8b888 !important;border-radius:3px !important;box-shadow:0 2px 8px rgba(26,21,14,.06) !important}
.hdr{border-bottom-color:#c8b888 !important}
.ttl{font-family:'Playfair Display',serif !important;font-weight:400 !important;color:#1a150e !important;font-size:clamp(20px,3vw,26px) !important}
.ttl-sub{color:#7a6040 !important}
.met{background:#faf4e4 !important;border-color:#c8b888 !important;border-radius:2px !important;color:#3a2e1e !important}
</style>
</head>
<body>

<div class="page" id="page">
  <div class="loading">Loading your profile…</div>
</div>

<script>
const WORKER='https://histroychallenger-api.maletethan.workers.dev';
const GOOGLE_CLIENT_ID='413171729958-s5kimtsskjsfsu45ao1ah0gob8f4ghn9.apps.googleusercontent.com';

function getToken(){return localStorage.getItem('hc_token');}
function clearToken(){localStorage.removeItem('hc_token');}

function signOut(){
  clearToken();
  window.location.href='/';
}

function signIn(){
  const params=new URLSearchParams({
    client_id:GOOGLE_CLIENT_ID,
    redirect_uri:'https://historychallenger.com/profile.html',
    response_type:'code',
    scope:'openid email profile',
    access_type:'offline',
    prompt:'select_account'
  });
  window.location.href='https://accounts.google.com/o/oauth2/v2/auth?'+params;
}

function toggleSettings(){
  const panel=document.getElementById('settings-panel');
  if(panel) panel.classList.toggle('open');
}

async function saveProfileName(){
  const name=document.getElementById('settings-name').value.trim();
  if(!name) return;
  const msg=document.getElementById('settings-msg');
  msg.textContent='Saving…';
  try{
    const res=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'update_profile',token:getToken(),name})});
    const d=await res.json();
    if(d.ok){
      msg.textContent='Name updated!';
      const h1=document.querySelector('.profile-info h1');
      if(h1) h1.textContent=name;
      setTimeout(()=>{msg.textContent='';},2500);
    } else { msg.textContent=d.error||'Error saving'; }
  }catch(e){ msg.textContent='Network error'; }
}

async function saveProfileAvatar(){
  const avatar=document.getElementById('settings-avatar').value.trim();
  const msg=document.getElementById('settings-msg');
  msg.textContent='Saving…';
  try{
    const res=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'update_profile',token:getToken(),avatar})});
    const d=await res.json();
    if(d.ok){
      msg.textContent='Picture updated — reload to see it.';
      setTimeout(()=>{msg.textContent='';},3000);
    } else { msg.textContent=d.error||'Error saving'; }
  }catch(e){ msg.textContent='Network error'; }
}

async function deleteAccount(){
  if(!confirm('Delete your account? This will permanently erase all your scores and history. This cannot be undone.')) return;
  if(!confirm('Absolutely sure? All data will be gone.')) return;
  try{
    const res=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'delete_account',token:getToken()})});
    const d=await res.json();
    if(d.ok){ clearToken(); window.location.href='/'; }
    else { alert(d.error||'Error deleting account'); }
  }catch(e){ alert('Network error'); }
}

function diffLabel(d){return{disciple:'🕯 Disciple',master:'⚔️ Master',keeper:'🏆 Keeper'}[d]||d;}
function diffColor(d){return{disciple:'#5acc8a',master:'#c8903a',keeper:'#e0a84a'}[d]||'#888';}
function gameLabel(g){return{overlap:'🏛 Did They Overlap?',dispatch:'⚔️ Dispatch',timeline:'🧭 History Challenger'}[g]||'🧭 History Challenger';}
function gameTag(g){return{overlap:'Overlap',dispatch:'Dispatch',timeline:'Timeline'}[g]||'Timeline';}
function eraLabel(e){return{antiquity:'Antiquity',medieval:'Medieval',modern:'Modern'}[e]||(e||'Campaign');}
function scoreColor(s){return s>=80?'great':s>=50?'good':'ok';}
function hqColor(hq){
  if(hq>=950)return'#e8d060';if(hq>=850)return'#c8903a';if(hq>=750)return'#a07828';
  if(hq>=650)return'#5acc8a';if(hq>=500)return'#4a9a6a';if(hq>=350)return'#6888cc';
  if(hq>=200)return'#8888aa';return'#888';
}

const TIERS=[
  {name:'Sage',       min:10000,next:null},
  {name:'Historian',  min:4000, next:10000},
  {name:'Chronicler', min:1500, next:4000},
  {name:'Scribe',     min:500,  next:1500},
  {name:'Witness',    min:0,    next:500}
];
function getTier(xp){return TIERS.find(t=>xp>=t.min)||TIERS[TIERS.length-1];}
function tierPct(xp){const t=getTier(xp);if(!t.next)return 100;return Math.round(((xp-t.min)/(t.next-t.min))*100);}
function formatDate(ts){
  const d=new Date(ts*1000);
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function formatJoined(ts){
  const d=new Date(ts*1000);
  return 'Member since '+d.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
}

function renderNotSignedIn(){
  document.getElementById('page').innerHTML=`
    <div class="not-signed-in">
      <div style="font-size:48px;margin-bottom:1rem">📜</div>
      <h2>Sign in to see your profile</h2>
      <p>Your scores, streaks and history are saved when you play signed in.</p>
      <button class="sign-in-btn" onclick="signIn()">Sign in with Google</button>
      <div style="margin-top:1.5rem"><a href="/play.html">← Back to game</a></div>
    </div>`;
}

function renderProfile(data){
  const {user, sessions, history, breakdown} = data;
  const avg = user.avg_score || 0;

  // Chart — 10 most recent, displayed oldest → newest (left → right)
  const chartItems = [...(history||[])].slice(0,10).reverse();
  let chartHTML = '';
  if(chartItems.length===0){
    chartHTML = `<div class="chart-empty">Play some games to see your score history</div>`;
  } else {
    const maxScore = Math.max(...chartItems.map(h=>h.avg_score||0), 1);
    chartHTML = chartItems.map(h=>{
      const heightPct = Math.max(4, Math.round(((h.avg_score||0)/maxScore)*100));
      const color = diffColor(h.diff);
      const dateStr = formatDate(h.completed_at);
      return `<div class="chart-bar-wrap">
        <div class="chart-bar" style="height:${heightPct}%;background:${color}" data-tip="${Math.round(h.avg_score||0)}% · ${dateStr}"></div>
        <div class="chart-label">${Math.round(h.avg_score||0)}%</div>
      </div>`;
    }).join('');
  }

  // Tier / XP
  const xp = user.total_xp || 0;
  const t = getTier(xp);
  const tPct = tierPct(xp);
  const nextTierName = t.next ? TIERS[TIERS.findIndex(x=>x.name===t.name)-1]?.name : null;
  const tierHTML = `
    <div class="tier-section">
      <div class="tier-name">${t.name}</div>
      <div class="tier-xp">${xp.toLocaleString()} XP${nextTierName?' · '+t.next.toLocaleString()+' to '+nextTierName:' · Max tier reached'}</div>
      <div class="tier-bar-wrap"><div class="tier-bar-fill" style="width:${tPct}%"></div></div>
      <div class="tier-bar-labels"><span>${t.name}</span>${nextTierName?`<span>${nextTierName}</span>`:'<span>Sage</span>'}</div>
    </div>`;

  // Breakdown by game / difficulty
  const diffs = ['disciple','master','keeper'];
  const scoredGames = ['timeline','overlap'];
  const bMap = {};
  (breakdown||[]).forEach(b => { bMap[`${b.game_type||'timeline'}_${b.diff||'none'}`] = b; });

  const scoredBreakdown = scoredGames.map(g => {
    const hasAny = diffs.some(d => bMap[`${g}_${d}`]);
    if(!hasAny) return '';
    return `<div style="margin-bottom:1.5rem">
      <div style="font-size:12px;color:#3a2e1e;font-family:-apple-system,sans-serif;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:.75rem">${gameLabel(g)}</div>
      <div class="breakdown-grid">
        ${diffs.map(d => {
          const b = bMap[`${g}_${d}`];
          if(!b) return `<div class="breakdown-card">
            <div class="breakdown-name">${diffLabel(d)}</div>
            <div style="font-size:13px;color:#666">No games yet</div>
          </div>`;
          return `<div class="breakdown-card">
            <div class="breakdown-name">${diffLabel(d)}</div>
            <div class="breakdown-row"><span class="breakdown-key">Games</span><span class="breakdown-val">${b.games}</span></div>
            <div class="breakdown-row"><span class="breakdown-key">Average</span><span class="breakdown-val">${Math.round(b.avg||0)}%</span></div>
            <div class="breakdown-row"><span class="breakdown-key">Best</span><span class="breakdown-val">${Math.round(b.best||0)}%</span></div>
            <div class="breakdown-bar"><div class="breakdown-fill" style="width:${Math.round(b.avg||0)}%"></div></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  const dispatchTotal = (breakdown||[]).filter(b=>b.game_type==='dispatch').reduce((s,b)=>s+(b.games||0),0);
  const dispatchBreakdown = dispatchTotal>0 ? `<div style="margin-bottom:1.5rem">
    <div style="font-size:12px;color:#3a2e1e;font-family:-apple-system,sans-serif;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:.75rem">${gameLabel('dispatch')}</div>
    <div class="dispatch-card">
      <div class="breakdown-row"><span class="breakdown-key">Campaigns completed</span><span class="breakdown-val">${dispatchTotal}</span></div>
    </div>
  </div>` : '';

  // Sessions — last 10
  const recentSessions = (sessions||[]).slice(0,10);
  const sessionsHTML = recentSessions.length===0
    ? `<div class="empty-state">No games yet. <a href="/play.html">Play your first game →</a></div>`
    : recentSessions.map(s => {
      if(s.game_type==='dispatch'){
        return `<div class="session-row">
          <div class="session-score ok" style="font-size:1.1rem">⚔️</div>
          <div class="session-meta">
            <div class="session-diff">${eraLabel(s.diff)} <span style="font-size:11px;color:#888;font-weight:400">· Dispatch</span></div>
            <div class="session-date">${formatDate(s.completed_at)}</div>
          </div>
          <div class="session-rounds">${s.rounds} decision${s.rounds!==1?'s':''}</div>
        </div>`;
      }
      return `<div class="session-row">
        <div class="session-score ${scoreColor(s.avg_score||0)}">${Math.round(s.avg_score||0)}%</div>
        <div class="session-meta">
          <div class="session-diff">${diffLabel(s.diff)} <span style="font-size:11px;color:#888;font-weight:400">· ${gameTag(s.game_type)}</span></div>
          <div class="session-date">${formatDate(s.completed_at)}</div>
        </div>
        <div class="session-rounds">${s.rounds} round${s.rounds!==1?'s':''}</div>
      </div>`;
    }).join('');

  const avatarVal = (user.avatar||'').replace(/"/g,'&quot;');
  const nameVal = (user.name||'').replace(/"/g,'&quot;');

  document.getElementById('page').innerHTML=`
    <!-- HEADER -->
    <div class="profile-hero">
      <div class="avatar-wrap">
        ${user.avatar
          ? `<img class="profile-avatar" src="${user.avatar}" alt="${nameVal}">`
          : `<div class="avatar-placeholder">👤</div>`}
      </div>
      <div class="profile-info">
        <h1>${user.name||'History Player'}</h1>
        <div class="email">${user.email}</div>
        <div class="joined">${formatJoined(user.created_at)}</div>
      </div>
      <div class="hero-btns">
        ${user.hq_score
          ? `<div class="hq-badge"><div class="hq-badge-val" style="color:${hqColor(user.hq_score)}">${Math.round(user.hq_score)}<span style="font-size:.65em;color:#666;font-weight:400"> / 990</span></div><div class="hq-badge-lbl">HQ</div></div>`
          : `<a href="/hq.html" class="hq-no-score">Take HQ test →</a>`}
        <button class="edit-profile-btn" onclick="toggleSettings()">Edit profile</button>
        <button class="sign-out-btn" onclick="signOut()">Sign out</button>
      </div>
    </div>

    <!-- SETTINGS PANEL -->
    <div class="settings-panel" id="settings-panel">
      <div class="settings-section-label">Account settings</div>
      <div class="settings-row">
        <span class="settings-label">Display name</span>
        <input id="settings-name" class="settings-input" type="text" value="${nameVal}" placeholder="Your name" maxlength="80">
        <button class="settings-save" onclick="saveProfileName()">Save</button>
      </div>
      <div class="settings-row">
        <span class="settings-label">Picture URL</span>
        <input id="settings-avatar" class="settings-input" type="url" value="${avatarVal}" placeholder="https://…">
        <button class="settings-save" onclick="saveProfileAvatar()">Save</button>
      </div>
      <div class="settings-msg" id="settings-msg"></div>
      <hr class="settings-divider">
      <button class="danger-btn" onclick="deleteAccount()">Delete account</button>
    </div>

    <!-- TIER / XP -->
    ${tierHTML}

    <!-- STREAK -->
    ${(user.current_streak||0)>0?`
    <div class="streak-display">
      <div class="streak-num">🔥 ${user.current_streak}</div>
      <div class="streak-info">
        <div class="streak-label">Day streak</div>
        <div class="streak-sub">Longest ever: ${user.longest_streak||0} days</div>
      </div>
    </div>`:''}

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card highlight">
        <div class="stat-val">${Math.round(avg)}%</div>
        <div class="stat-lbl">Average score</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${user.total_games||0}</div>
        <div class="stat-lbl">Games played</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${user.total_rounds||0}</div>
        <div class="stat-lbl">Total rounds</div>
      </div>
      <div class="stat-card highlight">
        <div class="stat-val">${Math.round(user.best_score||0)}%</div>
        <div class="stat-lbl">Best game</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${user.current_streak||0}</div>
        <div class="stat-lbl">Current streak</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${user.longest_streak||0}</div>
        <div class="stat-lbl">Longest streak</div>
      </div>
    </div>

    <!-- CHART -->
    <div class="chart-section">
      <div class="section-title">Score history — last ${chartItems.length} games</div>
      <div class="chart-wrap">${chartHTML}</div>
    </div>

    <!-- BREAKDOWN -->
    <div class="section-title" style="margin-bottom:1rem">Performance by game</div>
    ${scoredBreakdown + dispatchBreakdown}

    <!-- SESSIONS -->
    <div class="section-title" style="margin-bottom:1rem">Recent games</div>
    <div class="sessions-list">${sessionsHTML}</div>

    <div style="text-align:center;margin-top:2rem">
      <a href="/games.html" style="color:#c8903a;font-size:15px;font-weight:600">Play another game →</a>
    </div>`;
}

async function init(){
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if(code){
    history.replaceState({},'','/profile.html');
    try{
      const res = await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'google_callback',code,redirect:'https://historychallenger.com/profile.html'})});
      const data = await res.json();
      if(data.token){localStorage.setItem('hc_token',data.token);}
    }catch(e){}
  }

  const token = getToken();
  if(!token){renderNotSignedIn();return;}

  try{
    const res = await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'get_profile',token})});
    const data = await res.json();
    if(data.error){renderNotSignedIn();return;}
    renderProfile(data);
  }catch(e){
    document.getElementById('page').innerHTML=`<div class="loading">Failed to load profile. <a href="/play.html">Go back to game</a></div>`;
  }
}

init();
</script>

</body>
</html>
