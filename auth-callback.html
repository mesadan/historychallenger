<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>Signing in — History Challenger</title>
<style>
body{background:#1a150e;color:#f5edd8;font-family:'Crimson Text',Georgia,serif;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:1rem;font-size:18px}
.spinner{width:36px;height:36px;border:2px solid #3a2a14;border-top-color:#c49020;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{color:#9a8060;font-style:italic;font-size:16px;max-width:400px;text-align:center}
.err{color:#c05040;font-size:15px;max-width:400px;text-align:center;line-height:1.6;font-style:italic}
.btn{margin-top:1rem;background:#8a6208;color:#f5edd8;border:none;padding:10px 28px;font-family:'Crimson Text',Georgia,serif;font-size:16px;font-style:italic;border-radius:2px;cursor:pointer}
</style>
</head>
<body>
<div class="spinner" id="spinner"></div>
<div class="msg" id="msg">Signing you in…</div>
<script>
const WORKER = 'https://histroychallenger-api.maletethan.workers.dev';
const LOCK_KEY = 'hc_auth_lock';

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state') || '/';

  if (!code) {
    window.location.href = state;
    return;
  }

  // Prevent double-execution (e.g. if page is loaded twice)
  if (sessionStorage.getItem(LOCK_KEY) === code) {
    document.getElementById('msg').textContent = 'Already processing…';
    setTimeout(() => window.location.href = state, 2000);
    return;
  }
  sessionStorage.setItem(LOCK_KEY, code);

  // Clear the code from URL immediately so refreshes don't reuse it
  history.replaceState({}, '', window.location.pathname);

  try {
    document.getElementById('msg').textContent = 'Verifying with Google…';

    const res = await fetch(WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'google_callback',
        code,
        redirect: 'https://historychallenger.com/auth-callback.html'
      })
    });

    const data = await res.json();

    if (data.token) {
      localStorage.setItem('hc_token', data.token);
      document.getElementById('msg').textContent = 'Signed in! Taking you back…';
      sessionStorage.removeItem(LOCK_KEY);
      const dest = state && state.startsWith('/') ? state : '/';
      window.location.href = dest;
      return;
    }

    // Show the actual error so we can debug
    showError('Sign-in failed: ' + (data.error || data.detail || JSON.stringify(data)), state);

  } catch(e) {
    showError('Network error: ' + e.message, state);
  }
}

function showError(msg, back) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('msg').className = 'err';
  document.getElementById('msg').innerHTML = msg
    + '<br><br><button class="btn" onclick="window.location.href=\''
    + (back || '/') + '\'">Go back</button>';
}

handleCallback();
</script>
</body>
</html>
