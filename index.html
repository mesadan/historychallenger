<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History Challenger</title>
<meta name="description" content="Prove your historical mastery. Place events on a timeline — score points for correct order and accurate spacing.">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body{font-family:Georgia,'Times New Roman',serif;background:#000000;color:#ffffff;display:flex;justify-content:center;padding:1.25rem 0.75rem}
.wrap{width:100%;max-width:820px}
.card{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:14px;padding:1.25rem}
@media(min-width:600px){.card{padding:1.75rem}}

/* HEADER */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.1rem;border-bottom:1px solid #2a2a2a;padding-bottom:.9rem;flex-wrap:wrap;gap:8px}
.hdr-left{display:flex;flex-direction:column;gap:4px}
.ttl{font-size:20px;font-weight:700;color:#ffffff;letter-spacing:.01em}
@media(min-width:600px){.ttl{font-size:24px}}
.ttl-sub{font-size:10px;color:#666;letter-spacing:.09em;text-transform:uppercase;font-family:-apple-system,sans-serif}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.mets{display:flex;gap:8px}
.met{background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:5px 12px;text-align:center;min-width:56px}
.mv{font-size:18px;font-weight:700;color:#ffffff}
.ml{font-size:10px;color:#666;font-family:-apple-system,sans-serif;letter-spacing:.04em}
.lang-row{display:flex;gap:5px}
.lang-btn{border:1px solid #2a2a2a;background:#111;border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer;color:#666;font-family:-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation;font-weight:600}
.lang-btn:hover{border-color:#555;color:#999}
.lang-btn.active{border-color:#c8903a;background:#1a1000;color:#c8903a}

/* SETUP */
.sf{font-family:-apple-system,sans-serif}
.section-num{font-size:11px;color:#c8903a;letter-spacing:.1em;text-transform:uppercase;font-family:-apple-system,sans-serif;font-weight:700;margin-bottom:.2rem}
.setup-title{font-size:17px;font-weight:700;color:#ffffff;margin-bottom:.35rem;font-family:Georgia,serif}
.setup-sub{font-size:13px;color:#666;margin-bottom:1rem;line-height:1.6}
.diff-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1.25rem}
@media(max-width:500px){.diff-grid{grid-template-columns:1fr}}
.dc{border:1px solid #2a2a2a;border-radius:10px;padding:10px 12px;cursor:pointer;background:#111;transition:border-color .12s,background .12s;-webkit-tap-highlight-color:transparent}
.dc:hover{background:#181818;border-color:#555}
.dc.sel{border-color:#c8903a;background:#1a1000}
.dn{font-size:13px;font-weight:700;color:#ffffff;margin-bottom:3px}
.dt{font-size:10px;color:#c8903a;background:#111;border:1px solid #2a2a2a;border-radius:3px;padding:1px 5px;display:inline-block;margin-bottom:4px;letter-spacing:.02em}
.dd{font-size:11px;color:#666;line-height:1.4}
.divider{border:none;border-top:1px solid #2a2a2a;margin:1.1rem 0}
.theme-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:.85rem}
.chip{border:1px solid #2a2a2a;background:#111;border-radius:18px;padding:5px 13px;font-size:12px;cursor:pointer;color:#aaa;font-family:-apple-system,sans-serif;transition:all .12s;-webkit-tap-highlight-color:transparent}
.chip:hover{background:#181818;border-color:#555;color:#fff}
.chip.sel{border-color:#c8903a;background:#1a1000;color:#c8903a;font-weight:600}
.custom-row{display:flex;gap:8px;align-items:center;margin-bottom:.6rem}
.ci{flex:1;border:1px solid #2a2a2a;background:#111;border-radius:8px;padding:9px 13px;font-size:14px;color:#ffffff;font-family:-apple-system,sans-serif;outline:none;-webkit-appearance:none}
.ci:focus{border-color:#c8903a}
.ci::placeholder{color:#333}
.rounds-row{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;flex-wrap:wrap}
.rl{font-size:13px;color:#666;font-family:-apple-system,sans-serif}
.ropts{display:flex;gap:7px;flex-wrap:wrap}
.ro{border:1px solid #2a2a2a;background:#111;border-radius:7px;padding:7px 14px;font-size:13px;cursor:pointer;color:#aaa;font-family:-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.ro:hover{background:#181818;border-color:#555;color:#fff}
.ro.sel{border-color:#c8903a;background:#1a1000;color:#c8903a;font-weight:700}
.btn{border:1px solid #2a2a2a;background:#111;color:#ffffff;border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;font-family:-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn:hover{background:#181818;border-color:#555}
.btn-p{background:#c8903a;color:#000000;border-color:#c8903a;font-weight:700}
.btn-p:hover{background:#e0a040}
.btn:disabled{opacity:.3;cursor:default}
.err-msg{font-size:12px;color:#e05530;font-family:-apple-system,sans-serif;padding:8px 0;font-style:italic}

/* OVERLAY */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.94);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.overlay-card{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:14px;padding:2rem 2.5rem;text-align:center;max-width:320px}
.overlay-title{font-size:18px;font-weight:700;color:#ffffff;font-family:Georgia,serif;margin-bottom:.5rem}
.overlay-sub{font-size:13px;color:#666;margin-bottom:1.25rem;line-height:1.6;font-family:-apple-system,sans-serif}
.spin{display:inline-block;width:28px;height:28px;border:3px solid #2a2a2a;border-top-color:#c8903a;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* GAME */
.instr{font-size:13px;color:#aaa;line-height:1.6;margin-bottom:1rem;padding:10px 13px;background:#111;border-radius:8px;border-left:3px solid #c8903a;font-family:-apple-system,sans-serif}
.plbl{font-size:10px;color:#444;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;font-family:-apple-system,sans-serif}
.pool{display:flex;flex-wrap:wrap;gap:7px;min-height:44px;padding:7px;border:1px solid #1e1e1e;border-radius:8px;margin-bottom:1.25rem;align-items:flex-start;background:#080808}
.ecard{background:#111;border:1px solid #2a2a2a;border-radius:7px;padding:8px 12px;font-size:12px;cursor:pointer;user-select:none;color:#ffffff;line-height:1.4;font-family:-apple-system,sans-serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.ecard:hover{border-color:#555;background:#181818}
.ecard.selected-card{border-color:#c8903a;background:#1a1000;color:#c8903a;font-weight:600}

/* TIMELINE */
.tl-section{margin-bottom:1.25rem}
.tl-outer{position:relative}
.tl-anchors{display:flex;justify-content:space-between;gap:8px;margin-bottom:10px}
.anchor-zone{flex:0 0 calc(50% - 4px)}
@media(min-width:600px){.anchor-zone{flex:0 0 145px}}
.anchor-label{font-size:10px;color:#444;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;text-align:center;font-family:-apple-system,sans-serif}
.anchor-drop{min-height:50px;border:1px solid #2a2a2a;border-radius:8px;padding:6px 8px;display:flex;align-items:center;justify-content:center;text-align:center;background:#080808;transition:border-color .12s,background .12s;cursor:pointer;-webkit-tap-highlight-color:transparent}
.anchor-drop.over{border-color:#c8903a;background:#111}
.anchor-drop.filled{border-color:#555;background:#111}
.anchor-card{font-size:11px;color:#ffffff;line-height:1.3;cursor:pointer;user-select:none;text-align:center;font-weight:600;font-family:-apple-system,sans-serif}
.anchor-ok{border-color:#2a8a4a !important;background:#051209 !important}
.anchor-bad{border-color:#8a2a1a !important;background:#120502 !important}
.tl-bar-row{display:none}
@media(min-width:600px){.tl-bar-row{display:flex;align-items:center;margin-top:4px}}
.tl-anchor-line{width:145px;flex-shrink:0;height:5px;background:#2a2a2a}
.tl-bar-wrap{flex:1;position:relative;height:5px}
.tl-bar{position:absolute;top:-17px;left:0;right:0;height:40px;cursor:crosshair;z-index:5}
.tl-track{position:absolute;top:0;left:0;right:0;height:5px;background:#2a2a2a;transition:background .12s}
.tl-bar.active .tl-track{background:#c8903a}
.pins-layer{position:absolute;top:0;left:0;right:0;height:0;pointer-events:none;z-index:10}
.pin{position:absolute;top:0;display:flex;flex-direction:column;align-items:center;transform:translateX(-50%);pointer-events:all;cursor:grab}
.pin-dot{width:13px;height:13px;border-radius:50%;background:#c8903a;border:2px solid #0d0d0d;flex-shrink:0;margin-top:-4px}
.pin-stem{width:1.5px;height:14px;background:#c8903a}
.pin-label{background:#111;border:1px solid #333;border-radius:6px;padding:4px 8px;font-size:11px;color:#ffffff;max-width:110px;text-align:center;line-height:1.3;font-family:-apple-system,sans-serif}
.ghost-pin{position:absolute;top:0;display:flex;flex-direction:column;align-items:center;transform:translateX(-50%);pointer-events:none;opacity:0.3}
.ghost-dot{width:13px;height:13px;border-radius:50%;background:#c8903a;border:2px solid #0d0d0d;flex-shrink:0;margin-top:-4px}
.ghost-stem{width:1.5px;height:14px;background:#c8903a}
.ghost-label{background:#111;border:1px dashed #333;border-radius:6px;padding:4px 8px;font-size:11px;color:#666;max-width:110px;text-align:center;line-height:1.3;font-family:-apple-system,sans-serif}
.answer-pin{position:absolute;display:flex;flex-direction:column;align-items:center;transform:translateX(-50%);pointer-events:none}
.answer-dot{width:10px;height:10px;border-radius:50%;background:#2a8a5a;border:2px solid #0d0d0d;flex-shrink:0;opacity:0.7}
.answer-stem{width:1.5px;background:#2a8a5a;opacity:0.5}
.answer-label{background:rgba(42,138,90,0.12);border:1px solid rgba(42,138,90,0.4);border-radius:5px;padding:2px 6px;font-size:10px;color:#5acc8a;max-width:105px;text-align:center;line-height:1.3;font-family:-apple-system,sans-serif;font-weight:600}
.tl-mobile-bar{display:block;margin-top:12px;position:relative;height:52px;background:#080808;border:1px solid #1e1e1e;border-radius:8px;cursor:pointer;overflow:visible}
@media(min-width:600px){.tl-mobile-bar{display:none}}
.tl-mobile-track{position:absolute;top:50%;left:12px;right:12px;height:5px;background:#2a2a2a;border-radius:2px;transform:translateY(-50%)}
.tl-mobile-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;color:#333;font-family:-apple-system,sans-serif;white-space:nowrap;pointer-events:none}
.mobile-pin{position:absolute;top:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;pointer-events:all;cursor:pointer}
.mobile-pin-dot{width:14px;height:14px;border-radius:50%;background:#c8903a;border:2px solid #0d0d0d;flex-shrink:0}
.mobile-pin-lbl{background:#111;border:1px solid #333;border-radius:5px;padding:2px 6px;font-size:10px;color:#ffffff;white-space:normal;max-width:80px;text-align:center;line-height:1.3;font-family:-apple-system,sans-serif;margin-top:3px}
.mobile-bar-instr{display:block;font-size:11px;color:#444;font-family:-apple-system,sans-serif;font-style:italic;margin-top:8px;margin-bottom:4px;text-align:center}
@media(min-width:600px){.mobile-bar-instr{display:none}}
.tap-hint{font-size:11px;color:#444;font-family:-apple-system,sans-serif;font-style:italic;margin-bottom:6px;display:block}
@media(min-width:600px){.tap-hint{display:none}}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:.5rem;align-items:center}
.res{margin-top:1.25rem;padding:1.2rem;border:1px solid #2a2a2a;border-radius:12px;background:#080808}
.score-big{font-size:48px;font-weight:700;color:#c8903a;font-family:Georgia,serif}
.score-bar-wrap{background:#1a1a1a;border-radius:6px;height:6px;margin:.45rem 0 .35rem;overflow:hidden}
.score-bar-fill{height:100%;background:#c8903a;border-radius:6px;transition:width .7s ease}
.res-sub{font-size:12px;color:#444;margin-bottom:.9rem;font-family:-apple-system,sans-serif}
.res-row{display:flex;gap:9px;margin-bottom:10px;font-size:13px;line-height:1.5;align-items:flex-start;font-family:-apple-system,sans-serif}
.dot{width:18px;height:18px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.ok{background:#051209;color:#5acc8a;border:1px solid #2a8a4a}
.bad{background:#120502;color:#e06040;border:1px solid #8a2a1a}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="hdr">
      <div class="hdr-left">
        <div class="ttl">History Challenger</div>
        <div class="ttl-sub" id="ttl-sub">Prove your historical mastery</div>
      </div>
      <div class="hdr-right">
        <div class="mets">
          <div class="met"><div class="mv" id="sc">—</div><div class="ml" id="lbl-avg">Avg</div></div>
          <div class="met"><div class="mv" id="rn">—</div><div class="ml" id="lbl-round">Round</div></div>
        </div>
        <div class="lang-row">
          <button class="lang-btn active" onclick="setLang('en')">EN</button>
          <button class="lang-btn" onclick="setLang('fr')">FR</button>
          <button class="lang-btn" onclick="setLang('de')">DE</button>
          <button class="lang-btn" onclick="setLang('es')">ES</button>
        </div>
      </div>
    </div>
    <div id="body"></div>
  </div>
</div>

<script>
const WORKER='https://histroychallenger-api.maletethan.workers.dev';

/* ── TRANSLATIONS ── */
const T={
  en:{
    subtitle:'Prove your historical mastery',
    avg:'Avg',round:'Round',
    secI:'I — Difficulty',chooseLevel:'Choose your level',
    levelSub:'Three levels based on how events are mixed across historical eras — not just how far apart they are.',
    howToPlay:`<strong style="color:#c8903a">How to play:</strong> You have 5 events. First, identify which is <strong>Earliest</strong> and which is <strong>Most Recent</strong> — drag or tap them into those anchor boxes. This is important: those two events define the full time scale of the round. The bar between them becomes a proportional ruler — if Earliest is 500 BC and Most Recent is 1900 AD, the midpoint of the bar represents roughly 700 AD. Place the remaining 3 events at the correct proportional position along that ruler. Scoring is 50% for getting the order right, 50% for accurate spacing.`,
    secII:'II — Theme',chooseTheme:'Choose a theme',
    themeOptional:'— optional, AI generates focused events',
    themeSub:'Pick an era or topic, or type your own — "Punic Wars", "Space Race", "The Black Death". Without a theme, curated event sets are used.',
    typePlaceholder:'Or type any theme...',clearBtn:'Clear',
    secIII:'III — Rounds',
    genStart:'Generate & Start →',startBtn:'Start →',
    earliest:'Earliest',mostRecent:'Most recent',

    dropEarliest:'Drop earliest here',dropRecent:'Drop most recent here',
    tapEarliest:'Tap a card then tap here',tapRecent:'Tap a card then tap here',
    barInstr:'Select a card above, then tap the bar to place it',
    placeEvents:'Events to place',allPlaced:'All placed',
    submitBtn:'Submit',clearAll:'Clear all',menuBtn:'← Menu',
    orderSpacing:'order · spacing · Green = correct positions',
    spacing:'Spacing',
    nextRound:'Next round →',finalScore:'Final score →',playAgain:'Play again',
    generatingMsg:'Sourcing events for',generatingWait:'This may take a moment...',
    connError:'Connection error — please try again.',
    noSets:'Could not generate events for this theme — try rephrasing it.',
    curatedSets:'Curated sets',
    medals:{90:'🏆 Keeper of Time',70:'⚔️ Master',50:'🕯️ Disciple',0:'📜 Initiate'},
    diffs:{
      disciple:{label:'Disciple',tag:'Era-mixing · Famous events',desc:'No theme: 3+ events from distinct eras spanning millennia. With a theme: the most famous moments — widely spaced, forgiving.'},
      master:{label:'Master',tag:'Mixed challenge · Real knowledge required',desc:'No theme: 3 events clustered in one era, 2 outliers elsewhere. With a theme: notable but non-obvious events, moderate spacing.'},
      keeper:{label:'Keeper of Time',tag:'Precision · Expert level',desc:'No theme: all 5 within the same tight era. With a theme: obscure events packed close together — same decade or campaign.'}
    },
    themes:[
      {label:'Bronze Age',q:'the Bronze Age civilisations: Mesopotamia, Egypt, Mycenae, Hittites, Indus Valley'},
      {label:'Iron Age',q:'the Iron Age: early Greece, Assyria, Persia, Celtic Europe, early Rome'},
      {label:'Ancient World',q:'the ancient world: Classical Greece, Republican and Imperial Rome, Egypt, Persia'},
      {label:'Medieval',q:'medieval history: feudalism, crusades, plague, the Mongols, Byzantine Empire'},
      {label:'Early Modern',q:'early modern history: Renaissance, Reformation, Age of Exploration, 1400-1700'},
      {label:'Revolutions',q:'the age of revolutions: American, French, Haitian, Latin American, 1776-1830'},
      {label:'19th Century',q:'19th century: industrialisation, nationalism, imperialism'},
      {label:'World Wars',q:'World War I and World War II: key battles, turning points, political events'},
      {label:'Cold War',q:'the Cold War 1945-1991: space race, proxy wars, nuclear standoff, detente'},
      {label:'Aviation',q:'the history of aviation: from the Wright Brothers to the jet age and space flight'},
      {label:'Medicine',q:'the history of medicine: discoveries, vaccines, surgery, anatomy, public health breakthroughs'},
      {label:'Technology',q:'landmark moments in technology history: inventions, computers, communications, engineering'},
      {label:'Ancient Asia',q:'ancient Asian history: Han Dynasty China, Maurya India, classical Japan, Southeast Asia'},
      {label:'Science',q:'landmark moments in science: physics, chemistry, biology, astronomy, mathematics'},
    ]
  },
  fr:{
    subtitle:'Prouvez votre maîtrise historique',
    avg:'Moy.',round:'Manche',
    secI:'I — Difficulté',chooseLevel:'Choisissez votre niveau',
    levelSub:'Trois niveaux basés sur la façon dont les événements sont mélangés entre les époques historiques.',
    howToPlay:`<strong style="color:#c8903a">Comment jouer :</strong> Vous avez 5 événements. D'abord, identifiez lequel est le <strong>plus ancien</strong> et lequel est le <strong>plus récent</strong> — faites-les glisser dans les cases d'ancrage. Ces deux événements définissent l'échelle de temps du round. La barre entre eux devient une règle proportionnelle — si le plus ancien est en 500 av. J.-C. et le plus récent en 1900, le milieu de la barre représente environ 700 apr. J.-C. Placez les 3 autres événements à la bonne position proportionnelle. Le score est 50% pour l'ordre, 50% pour l'espacement.`,
    secII:'II — Thème',chooseTheme:'Choisissez un thème',
    themeOptional:'— facultatif, l\'IA génère des événements ciblés',
    themeSub:'Choisissez une époque ou tapez votre propre thème — "Guerres puniques", "Course spatiale", "La Peste noire". Sans thème, des séries présélectionnées sont utilisées.',
    typePlaceholder:'Ou tapez un thème...',clearBtn:'Effacer',
    secIII:'III — Manches',
    genStart:'Générer & Commencer →',startBtn:'Commencer →',
    earliest:'Le plus ancien',mostRecent:'Le plus récent',
    tapHint:'Appuyez sur une carte pour la sélectionner, puis appuyez où la placer',

    diffs:{

      master:{label:'Maître',tag:'Défi mixte · Vraie connaissance requise',desc:'Sans thème : 3 événements groupés dans une époque, 2 ailleurs. Avec un thème : événements notables mais non évidents, espacement modéré.'},
      keeper:{label:'Gardien du Temps',tag:'Précision · Niveau expert',desc:'Sans thème : les 5 dans la même époque serrée. Avec un thème : événements obscurs très proches — même décennie ou campagne.'}
    },
    themes:[
      {label:'Âge du Bronze',q:'les civilisations de l\'Âge du Bronze: Mésopotamie, Égypte, Mycènes, Hittites, Vallée de l\'Indus'},
      {label:'Âge du Fer',q:'l\'Âge du Fer: Grèce archaïque, Assyrie, Perse, Europe celtique, Rome primitive'},
      {label:'Monde antique',q:'le monde antique: Grèce classique, Rome républicaine et impériale, Égypte, Perse'},
      {label:'Moyen Âge',q:'l\'histoire médiévale: féodalisme, croisades, peste, les Mongols, Empire byzantin'},
      {label:'Époque moderne',q:'l\'histoire moderne: Renaissance, Réforme, âge des découvertes, 1400-1700'},
      {label:'Révolutions',q:'l\'ère des révolutions: américaine, française, haïtienne, latino-américaine, 1776-1830'},
      {label:'XIXe siècle',q:'l\'histoire mondiale du XIXe siècle: industrialisation, nationalisme, impérialisme'},
      {label:'Guerres mondiales',q:'la Première et la Deuxième Guerre mondiale: batailles clés, tournants, événements politiques'},
      {label:'Guerre froide',q:'la Guerre froide 1945-1991: course à l\'espace, guerres par procuration, dissuasion nucléaire'},
      {label:'Aviation',q:'l\'histoire de l\'aviation: des frères Wright à l\'ère des jets et des vols spatiaux'},

async function startSeries(){
  if(!S.diff)return;
  S.round=0;S.totalPct=0;S.roundsPlayed=0;S.phase='game';
  const themeObj=S.theme!==null?themes()[S.theme]:null;
  const themeQ=S.customTheme||(themeObj?themeObj.q:null);
  if(themeQ){
    showOverlay(t('generatingMsg')+' <strong style="color:#fff">'+activeLabel()+'</strong><br><br>'+t('generatingWait'));
    const ok=await generateEvents(themeQ);
    hideOverlay();
    if(!ok)return;
  }
  startRound();
}

async function generateEvents(themeQ){
  try{
    const res=await fetch(WORKER,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({theme:themeQ,diff:S.diff,rounds:Math.min(S.rounds,8),lang:LANG})
    });
    const data=await res.json();
    if(data.error){renderSetup();const el=document.getElementById('theme-err');if(el){el.textContent=data.error;el.style.display='block';}return false;}
    const sets=[];
    if(data.sets&&Array.isArray(data.sets)){data.sets.forEach(s=>{if(Array.isArray(s)&&s.length===5)sets.push(s);});}
    if(!sets.length){renderSetup();const el=document.getElementById('theme-err');if(el){el.textContent=t('noSets');el.style.display='block';}return false;}
    S.generatedSets=sets;return true;
  }catch(e){
    renderSetup();const el=document.getElementById('theme-err');if(el){el.textContent=t('connError');el.style.display='block';}return false;
  }
}

function startRound(){
  S.submitted=false;S.midP={};S.aLeft=null;S.aRight=null;
  S.dragId=null;S.dragFrom=null;S.ghostName='';S.selectedCard=null;
  let raw;
  if(S.generatedSets.length>0){raw=S.generatedSets[S.round%S.generatedSets.length];}
  else{const sets=DIFFS[S.diff].events;raw=sets[S.round%sets.length];}
  S.events=raw.map((e,i)=>({...e,id:'e'+i}));
  shuffle(S.events);
  document.getElementById('rn').textContent=(S.round+1)+'/'+S.rounds;
  updSc();renderGame();
}

function updSc(){document.getElementById('sc').textContent=S.roundsPlayed>0?Math.round(S.totalPct/S.roundsPlayed)+'%':'—';}
function pIds(){const s=new Set(Object.keys(S.midP));if(S.aLeft)s.add(S.aLeft.id);if(S.aRight)s.add(S.aRight.id);return s;}
function allP(){return pIds().size===5;}

function renderGame(){
  const placed=pIds();
  const pool=S.events.filter(e=>!placed.has(e.id));
  const tTag=activeLabel()!==t('curatedSets')?` <span style="color:#c8903a;font-weight:600">${activeLabel()}</span>`:'';
  const dis=(!allP()||S.submitted)?'disabled':'';
  const mobile=isMobile();

  const pH=pool.length
    ?pool.map(e=>`<div class="ecard${S.selectedCard===e.id?' selected-card':''}" onclick="tapCard('${e.id}')"${!mobile?` draggable="true" ondragstart="ds(event,'${e.id}','pool')" ondragend="de()"`:''} >${e.name}</div>`).join('')
    :`<span style="font-size:12px;color:#444;font-family:-apple-system,sans-serif">${t('allPlaced')}</span>`;

  const lP=`<span style="font-size:10px;color:#333;font-family:-apple-system,sans-serif">${mobile?t('tapEarliest'):t('dropEarliest')}</span>`;
  const rP=`<span style="font-size:10px;color:#333;font-family:-apple-system,sans-serif">${mobile?t('tapRecent'):t('dropRecent')}</span>`;
  const lC=S.aLeft?`<div class="anchor-card" onclick="tapAnchor('left')"${!mobile?` draggable="true" ondragstart="ds(event,'${S.aLeft.id}','left')" ondragend="de()"`:''} >${S.aLeft.name}</div>`:lP;
  const rC=S.aRight?`<div class="anchor-card" onclick="tapAnchor('right')"${!mobile?` draggable="true" ondragstart="ds(event,'${S.aRight.id}','right')" ondragend="de()"`:''} >${S.aRight.name}</div>`:rP;

  let pins='';
  for(const [id,pct] of Object.entries(S.midP)){
    const evt=S.events.find(e=>e.id===id);if(!evt)continue;
    pins+=`<div class="pin" id="pin-${id}" style="left:${pct*100}%" draggable="true" ondragstart="ds(event,'${id}','bar')" ondragend="de()"><div class="pin-dot"></div><div class="pin-stem"></div><div class="pin-label">${evt.name}</div></div>`;
  }
  const ghost=`<div class="ghost-pin" id="ghost" style="left:-999px;display:none"><div class="ghost-dot"></div><div class="ghost-stem"></div><div class="ghost-label" id="ghost-lbl"></div></div>`;

  let mobilePins='';
  for(const [id,pct] of Object.entries(S.midP)){
    const evt=S.events.find(e=>e.id===id);if(!evt)continue;
    mobilePins+=`<div class="mobile-pin" style="left:${pct*100}%" onclick="tapMobilePin('${id}')"><div class="mobile-pin-dot"></div><div class="mobile-pin-lbl">${evt.name}</div></div>`;
  }
  const mobileHint=Object.keys(S.midP).length===0?`<div class="tl-mobile-hint">${t('tapEarliest')}</div>`:'';

  document.getElementById('body').innerHTML=`
    <div class="instr">${t('howToPlay')}</div>
    ${mobile?`<span class="tap-hint">${t('tapHint')}</span>`:''}
    <div class="plbl">${t('placeEvents')}</div>
    <div class="pool" id="pool">${pH}</div>
    <div class="tl-section"><div class="tl-outer">
      <div class="tl-anchors">
        <div class="anchor-zone" id="zl">
          <div class="anchor-label">${t('earliest')}</div>
          <div class="anchor-drop ${S.aLeft?'filled':''}" id="dl"
            onclick="tapAnchor('left')" ondragover="aOv(event,'left')" ondragleave="aLv('left')" ondrop="aDr(event,'left')">${lC}</div>
        </div>
        <div class="anchor-zone" id="zr">
          <div class="anchor-label">${t('mostRecent')}</div>
          <div class="anchor-drop ${S.aRight?'filled':''}" id="dr"
            onclick="tapAnchor('right')" ondragover="aOv(event,'right')" ondragleave="aLv('right')" ondrop="aDr(event,'right')">${rC}</div>
        </div>
      </div>
      <div class="tl-bar-row">
        <div class="tl-anchor-line"></div>
        <div class="tl-bar-wrap">
          <div class="tl-bar" id="tl-bar" ondragover="bOv(event)" ondragleave="bLv()" ondrop="bDr(event)" onmousemove="bMv(event)" onmouseleave="hG()">
            <div class="tl-track" id="tl-track"></div>
          </div>
          <div class="pins-layer" id="pl">${pins}${ghost}</div>
        </div>
        <div class="tl-anchor-line"></div>
      </div>
      ${mobile?`<div class="mobile-bar-instr">${t('barInstr')}</div>`:''}
      <div class="tl-mobile-bar" id="mobile-bar" onclick="tapBar(event)">
        <div class="tl-mobile-track"></div>
        ${mobileHint}${mobilePins}
      </div>
    </div></div>
    <div class="actions">
      <button class="btn btn-p" onclick="doSubmit()" ${dis}>${t('submitBtn')}</button>
      <button class="btn" onclick="clearAll()">${t('clearAll')}</button>
      <button class="btn" onclick="restartSetup()" style="margin-left:auto">${t('menuBtn')}</button>
    </div>
    <div id="res-area"></div>`;
}

function tapCard(id){
  if(S.submitted)return;
  if(S.midP[id]){delete S.midP[id];S.selectedCard=null;renderGame();return;}
  if(S.aLeft&&S.aLeft.id===id){S.aLeft=null;S.selectedCard=null;renderGame();return;}
  if(S.aRight&&S.aRight.id===id){S.aRight=null;S.selectedCard=null;renderGame();return;}
  S.selectedCard=S.selectedCard===id?null:id;renderGame();
}
function tapAnchor(side){
  if(S.submitted)return;
  if(!S.selectedCard){
    if(side==='left'&&S.aLeft){S.aLeft=null;renderGame();return;}
    if(side==='right'&&S.aRight){S.aRight=null;renderGame();return;}
    return;
  }
  const evt=S.events.find(x=>x.id===S.selectedCard);if(!evt)return;
  rtp(S.selectedCard,null);
  if(side==='left')S.aLeft=evt;else S.aRight=evt;
  S.selectedCard=null;renderGame();
}
function tapBar(e){
  if(S.submitted||!S.selectedCard)return;
  const bar=document.getElementById('mobile-bar');if(!bar)return;
  const r=bar.getBoundingClientRect();
  const pct=Math.max(0.02,Math.min(0.98,(e.clientX-r.left)/r.width));
  const evt=S.events.find(x=>x.id===S.selectedCard);if(!evt)return;
  rtp(S.selectedCard,'pool');
  S.midP[S.selectedCard]=pct;S.selectedCard=null;renderGame();
}
function tapMobilePin(id){if(S.submitted)return;delete S.midP[id];renderGame();}

function ds(e,id,from){S.dragId=id;S.dragFrom=from;const ev=S.events.find(x=>x.id===id);S.ghostName=ev?ev.name:'';}
function de(){S.dragId=null;S.dragFrom=null;S.ghostName='';hG();}
function aOv(e,s){e.preventDefault();document.getElementById('d'+s[0])?.classList.add('over');}
function aLv(s){document.getElementById('d'+s[0])?.classList.remove('over');}
function aDr(e,side){
  e.preventDefault();document.getElementById('d'+side[0])?.classList.remove('over');
  if(!S.dragId)return;const ev=S.events.find(x=>x.id===S.dragId);if(!ev)return;
  rtp(S.dragId,S.dragFrom);
  if(side==='left')S.aLeft=ev;else S.aRight=ev;renderGame();
}
function rtp(id,from){
  if(from==='bar')delete S.midP[id];
  else if(from==='left')S.aLeft=null;
  else if(from==='right')S.aRight=null;
}
function gPct(e){const b=document.getElementById('tl-bar');if(!b)return.5;const r=b.getBoundingClientRect();return Math.max(.01,Math.min(.99,(e.clientX-r.left)/r.width));}
function bOv(e){e.preventDefault();document.getElementById('tl-track')?.style.setProperty('background','#c8903a');document.getElementById('tl-bar')?.classList.add('active');uG(e);}
function bLv(){document.getElementById('tl-track')?.style.setProperty('background','#2a2a2a');document.getElementById('tl-bar')?.classList.remove('active');hG();}
function bMv(e){if(S.dragId)uG(e);}
function uG(e){const g=document.getElementById('ghost');const gl=document.getElementById('ghost-lbl');if(!g||!S.dragId)return;g.style.left=(gPct(e)*100)+'%';g.style.display='flex';if(gl)gl.textContent=S.ghostName;}
function hG(){const g=document.getElementById('ghost');if(g)g.style.display='none';}
function bDr(e){e.preventDefault();bLv();hG();if(!S.dragId)return;const ev=S.events.find(x=>x.id===S.dragId);if(!ev)return;rtp(S.dragId,S.dragFrom);S.midP[S.dragId]=gPct(e);renderGame();}
function clearAll(){S.midP={};S.aLeft=null;S.aRight=null;S.selectedCard=null;renderGame();}

function doSubmit(){
  if(!allP()||S.submitted)return;S.submitted=true;
  const sorted=[...S.events].sort((a,b)=>a.year-b.year);
  const minY=sorted[0].year,maxY=sorted[4].year,range=maxY-minY||1;
  const iP={};sorted.forEach(e=>{iP[e.id]=(e.year-minY)/range;});
  const eP={};
  if(S.aLeft)eP[S.aLeft.id]=0;
  if(S.aRight)eP[S.aRight.id]=1;
  for(const [id,pct] of Object.entries(S.midP))eP[id]=pct;
  const pOrd=[...S.events].sort((a,b)=>(eP[a.id]??0.5)-(eP[b.id]??0.5));
  let oc=0;pOrd.forEach((ev,i)=>{if(sorted[i]&&sorted[i].id===ev.id)oc++;});
  const oPct=Math.round((oc/5)*50);
  const tF=DIFFS[S.diff].tolerance/range;
  let sRaw=0;const sPer={};
  S.events.forEach(ev=>{const d=Math.abs((eP[ev.id]??0.5)-iP[ev.id]);const p=Math.max(0,1-d/tF);sPer[ev.id]=Math.round(p*10);sRaw+=p;});
  const sPct=Math.round((sRaw/5)*50);
  const tot=oPct+sPct;S.totalPct+=tot;S.roundsPlayed++;updSc();

  const ld=document.getElementById('dl');const rd=document.getElementById('dr');
  if(ld)ld.classList.add(S.aLeft&&sorted[0].id===S.aLeft.id?'anchor-ok':'anchor-bad');
  if(rd)rd.classList.add(S.aRight&&sorted[4].id===S.aRight.id?'anchor-ok':'anchor-bad');

  const layer=document.getElementById('pl');
  if(layer){
    const pos=sorted.map(e=>iP[e.id]);const sh=stemH(pos);
    sorted.forEach((ev,i)=>{
      const el=document.createElement('div');el.className='answer-pin';
      el.style.left=(iP[ev.id]*100)+'%';el.style.top='5px';
      el.innerHTML=`<div class="answer-dot"></div><div class="answer-stem" style="height:${sh[i]}px"></div><div class="answer-label">${yr(ev.year)}<br><span style="font-weight:400;font-size:9px">${ev.name}</span></div>`;
      layer.appendChild(el);
    });
  }

  const rows=sorted.map((ev,i)=>{
    const pR=pOrd.findIndex(x=>x.id===ev.id);const oOk=pR===i;const sp=sPer[ev.id];
    return `<div class="res-row"><div class="dot ${oOk?'ok':'bad'}">${oOk?'✓':'✗'}</div><div><span style="font-weight:700;color:#ffffff">${yr(ev.year)} — ${ev.name}</span><br><span style="color:#666;font-size:12px">${ev.desc}</span><br><span style="font-size:12px;color:#444">${t('spacing')}: ${sp}/10</span></div></div>`;
  }).join('');

  const isLast=S.round+1>=S.rounds;
  const nBtn=isLast?`<button class="btn btn-p" onclick="showFinal()">${t('finalScore')}</button>`:`<button class="btn btn-p" onclick="nextRound()">${t('nextRound')}</button>`;
  document.getElementById('res-area').innerHTML=`
    <div class="res">
      <div class="score-big">${tot}%</div>
      <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${tot}%"></div></div>
      <div class="res-sub">${oPct}/50 ${t('orderSpacing')}</div>
      ${rows}
      <div style="margin-top:1rem;display:flex;gap:10px;flex-wrap:wrap">${nBtn}<button class="btn" onclick="restartSetup()">${t('menuBtn')}</button></div>
    </div>`;
}

function stemH(positions){
  const n=positions.length;const h=new Array(n).fill(20);
  for(let i=1;i<n;i++){if(positions[i]-positions[i-1]<0.1)h[i]=h[i-1]+38;}
  return h;
}
function nextRound(){S.round++;startRound();}

function showFinal(){
  const avg=Math.round(S.totalPct/S.roundsPlayed);
  document.getElementById('body').innerHTML=`
    <div class="res" style="text-align:center">
      <div style="font-size:13px;color:#444;margin-bottom:.5rem;font-family:-apple-system,sans-serif">${S.rounds} ${t('round')} · ${td(S.diff,'label')} · ${activeLabel()}</div>
      <div class="score-big">${avg}%</div>
      <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${avg}%"></div></div>
      <div style="font-size:22px;font-weight:700;color:#ffffff;margin:.75rem 0;font-family:Georgia,serif">${medal(avg)}</div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:1rem;flex-wrap:wrap">
        <button class="btn btn-p" onclick="beginGame()">${t('playAgain')}</button>
        <button class="btn" onclick="restartSetup()">${t('menuBtn')}</button>
      </div>
    </div>`;
  document.getElementById('sc').textContent=avg+'%';
  document.getElementById('rn').textContent=t('round');
}

function beginGame(){S.round=0;S.totalPct=0;S.roundsPlayed=0;S.phase='game';startRound();}
function restartSetup(){S.phase='setup';S.diff=null;S.rounds=5;S.generatedSets=[];renderSetup();}
renderSetup();
</script>
</body>
