<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History Challenger</title>
<meta name="description" content="Test your historical instincts. Place events on a timeline — score points for correct order and accurate spacing.">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body{font-family:Georgia,'Times New Roman',serif;background:#d4b97a;display:flex;justify-content:center;padding:1.5rem 0.75rem}
.wrap{width:100%;max-width:820px}
.card{background:#f5efe0;border:1px solid #c8b47a;border-radius:14px;padding:1.25rem}
@media(min-width:600px){.card{padding:1.75rem}}

/* HEADER */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.1rem;border-bottom:1.5px solid #c8b47a;padding-bottom:.9rem;flex-wrap:wrap;gap:8px}
.ttl{font-size:20px;font-weight:700;color:#3b2a0e}
@media(min-width:600px){.ttl{font-size:24px}}
.ttl-sub{font-size:10px;color:#8a6f3a;letter-spacing:.07em;text-transform:uppercase;font-family:-apple-system,sans-serif;margin-top:3px}
.mets{display:flex;gap:8px}
.met{background:#e8d9b0;border:1px solid #c8b47a;border-radius:8px;padding:5px 12px;text-align:center;min-width:56px}
.mv{font-size:18px;font-weight:700;color:#3b2a0e}
.ml{font-size:10px;color:#8a6f3a;font-family:-apple-system,sans-serif}

/* SETUP */
.sf{font-family:-apple-system,sans-serif}
.setup-title{font-size:17px;font-weight:700;color:#3b2a0e;margin-bottom:.4rem;font-family:Georgia,serif}
.setup-sub{font-size:13px;color:#8a6f3a;margin-bottom:1.1rem;line-height:1.5}
.diff-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem}
.dc{border:1.5px solid #c8b47a;border-radius:10px;padding:10px 12px;cursor:pointer;background:#fdf6e3;transition:border-color .12s,background .12s;-webkit-tap-highlight-color:transparent}
.dc:hover{background:#fff8e8;border-color:#8a6f3a}
.dc.sel{border-color:#7a3b0e;background:#e8d9b0}
.dn{font-size:13px;font-weight:700;color:#3b2a0e;margin-bottom:2px}
.dt{font-size:10px;color:#7a3b0e;background:#f5dfc0;border:1px solid #c8b47a;border-radius:3px;padding:1px 5px;display:inline-block;margin-bottom:4px}
.dd{font-size:11px;color:#6b4f1a;line-height:1.4}
.divider{border:none;border-top:1px solid #c8b47a;margin:1.1rem 0}
.theme-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:.85rem}
.chip{border:1px solid #c8b47a;background:#fdf6e3;border-radius:18px;padding:5px 13px;font-size:12px;cursor:pointer;color:#3b2a0e;font-family:-apple-system,sans-serif;transition:all .12s;-webkit-tap-highlight-color:transparent}
.chip:hover{background:#fff8e8;border-color:#8a6f3a}
.chip.sel{border-color:#7a3b0e;background:#e8d9b0;font-weight:600}
.custom-row{display:flex;gap:8px;align-items:center;margin-bottom:.6rem}
.ci{flex:1;border:1px solid #c8b47a;background:#fdf6e3;border-radius:8px;padding:8px 12px;font-size:14px;color:#3b2a0e;font-family:-apple-system,sans-serif;outline:none;-webkit-appearance:none}
.ci:focus{border-color:#7a3b0e}
.ci::placeholder{color:#b09050}
.rounds-row{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;flex-wrap:wrap}
.rl{font-size:13px;color:#5c3d11;font-family:-apple-system,sans-serif}
.ropts{display:flex;gap:7px;flex-wrap:wrap}
.ro{border:1px solid #c8b47a;background:#fdf6e3;border-radius:7px;padding:6px 13px;font-size:13px;cursor:pointer;color:#3b2a0e;font-family:-apple-system,sans-serif;-webkit-tap-highlight-color:transparent}
.ro:hover{background:#fff8e8}
.ro.sel{border-color:#7a3b0e;background:#e8d9b0;font-weight:600}
.btn{border:1px solid #c8b47a;background:#ede0bc;color:#3b2a0e;border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;font-family:-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn:hover{background:#e2cfa0}
.btn-p{background:#7a3b0e;color:#fdf6e3;border-color:#7a3b0e}
.btn-p:hover{background:#5c2c09}
.btn:disabled{opacity:.35;cursor:default}
.err-msg{font-size:12px;color:#b03020;font-family:-apple-system,sans-serif;padding:8px 0;font-style:italic}

/* LOADING OVERLAY */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(212,185,122,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;font-family:-apple-system,sans-serif}
.overlay-card{background:#f5efe0;border:1px solid #c8b47a;border-radius:14px;padding:2rem 2.5rem;text-align:center;max-width:320px}
.overlay-title{font-size:18px;font-weight:700;color:#3b2a0e;font-family:Georgia,serif;margin-bottom:.5rem}
.overlay-sub{font-size:13px;color:#8a6f3a;margin-bottom:1.25rem;line-height:1.5}
.spin{display:inline-block;width:28px;height:28px;border:3px solid #e8d9b0;border-top-color:#7a3b0e;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* GAME */
.instr{font-size:13px;color:#5c3d11;line-height:1.6;margin-bottom:1rem;padding:9px 12px;background:#ede0bc;border-radius:8px;border-left:3px solid #c8b47a;font-family:-apple-system,sans-serif}
.plbl{font-size:10px;color:#8a6f3a;letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px;font-family:-apple-system,sans-serif}
.pool{display:flex;flex-wrap:wrap;gap:7px;min-height:44px;padding:7px;border:1px dashed #c8b47a;border-radius:8px;margin-bottom:1.25rem;align-items:flex-start;background:#ede0bc}

/* Event cards — tap on mobile to select, drag on desktop */
.ecard{background:#fdf6e3;border:1.5px solid #c8b47a;border-radius:7px;padding:7px 11px;font-size:12px;cursor:pointer;user-select:none;color:#3b2a0e;line-height:1.4;font-family:-apple-system,sans-serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.ecard:hover{border-color:#8a6f3a;background:#fff8e8}
.ecard.selected-card{border-color:#7a3b0e;background:#e8d9b0;font-weight:600}

/* TIMELINE */
.tl-section{margin-bottom:1.25rem;overflow:visible}
.tl-outer{position:relative}

/* anchor zones stack vertically on mobile, side by side on desktop */
.tl-anchors{display:flex;justify-content:space-between;gap:8px;margin-bottom:10px}
.anchor-zone{flex:0 0 calc(50% - 4px)}
@media(min-width:600px){.anchor-zone{flex:0 0 145px}}
.anchor-label{font-size:10px;color:#8a6f3a;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px;text-align:center;font-family:-apple-system,sans-serif}
.anchor-drop{min-height:48px;border:1px dashed #c8b47a;border-radius:8px;padding:5px 7px;display:flex;align-items:center;justify-content:center;text-align:center;background:#ede0bc;transition:border-color .12s,background .12s;cursor:pointer;-webkit-tap-highlight-color:transparent}
.anchor-drop.over{border-color:#7a3b0e;background:#e2cfa0}
.anchor-drop.filled{border-style:solid;background:#e8d9b0}
.anchor-drop.tap-target{border-color:#7a3b0e;background:#e8d9b0;animation:pulse .4s ease}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
.anchor-card{font-size:11px;color:#3b2a0e;line-height:1.3;cursor:pointer;user-select:none;text-align:center;font-weight:600;font-family:-apple-system,sans-serif}
.anchor-ok{border-color:#2e6b3e !important;background:#c8e6c9 !important}
.anchor-bad{border-color:#b03020 !important;background:#fce4d6 !important}

/* bar — hidden on mobile, shown on desktop */
.tl-bar-row{display:none}
@media(min-width:600px){.tl-bar-row{display:flex;align-items:center;margin-top:4px}}
.tl-anchor-line{width:145px;flex-shrink:0;height:6px;background:#c8b47a}
.tl-bar-wrap{flex:1;position:relative;height:6px}
.tl-bar{position:absolute;top:-17px;left:0;right:0;height:40px;cursor:crosshair;z-index:5}
.tl-track{position:absolute;top:0;left:0;right:0;height:6px;background:#c8b47a;transition:background .12s}
.tl-bar.active .tl-track{background:#8a6f3a}
.pins-layer{position:absolute;top:0;left:0;right:0;height:0;pointer-events:none;z-index:10}

/* mobile bar — simplified tap strip */
.tl-mobile-bar{display:block;margin-top:8px;position:relative;height:44px;background:#ede0bc;border:1px dashed #c8b47a;border-radius:8px;cursor:pointer;overflow:visible}
@media(min-width:600px){.tl-mobile-bar{display:none}}
.tl-mobile-track{position:absolute;top:50%;left:12px;right:12px;height:5px;background:#c8b47a;border-radius:2px;transform:translateY(-50%)}
.tl-mobile-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;color:#b09050;font-family:-apple-system,sans-serif;white-space:nowrap;pointer-events:none}
.mobile-pin{position:absolute;top:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;pointer-events:all;cursor:pointer}
.mobile-pin-dot{width:14px;height:14px;border-radius:50%;background:#7a3b0e;border:2px solid #fdf6e3;flex-shrink:0}
.mobile-pin-lbl{background:#fdf6e3;border:1px solid #c8b47a;border-radius:5px;padding:2px 6px;font-size:10px;color:#3b2a0e;white-space:normal;max-width:90px;text-align:center;line-height:1.3;font-family:-apple-system,sans-serif;margin-top:3px}

/* desktop pins */
.pin{position:absolute;top:0;display:flex;flex-direction:column;align-items:center;transform:translateX(-50%);pointer-events:all;cursor:grab}
.pin-dot{width:13px;height:13px;border-radius:50%;background:#7a3b0e;border:2px solid #fdf6e3;outline:1.5px solid #7a3b0e;flex-shrink:0;margin-top:-4px}
.pin-stem{width:1.5px;height:14px;background:#7a3b0e}
.pin-label{background:#fdf6e3;border:1px solid #c8b47a;border-radius:6px;padding:4px 8px;font-size:11px;color:#3b2a0e;max-width:110px;text-align:center;line-height:1.3;font-family:-apple-system,sans-serif}
.ghost-pin{position:absolute;top:0;display:flex;flex-direction:column;align-items:center;transform:translateX(-50%);pointer-events:none;opacity:0.38}
.ghost-dot{width:13px;height:13px;border-radius:50%;background:#7a3b0e;border:2px solid #fdf6e3;outline:1.5px solid #7a3b0e;flex-shrink:0;margin-top:-4px}
.ghost-stem{width:1.5px;height:14px;background:#7a3b0e}
.ghost-label{background:#ede0bc;border:1px dashed #c8b47a;border-radius:6px;padding:4px 8px;font-size:11px;color:#8a6f3a;max-width:110px;text-align:center;line-height:1.3;font-family:-apple-system,sans-serif}

/* answer pins — below the line, staggered */
.answer-pin{position:absolute;display:flex;flex-direction:column;align-items:center;transform:translateX(-50%);pointer-events:none}
.answer-dot{width:10px;height:10px;border-radius:50%;background:#1a5c35;border:2px solid #fdf6e3;outline:1px solid #1a5c35;flex-shrink:0;opacity:0.55}
.answer-stem{width:1.5px;background:#1a5c35;opacity:0.45}
.answer-label{background:rgba(26,92,53,0.08);border:1px solid rgba(26,92,53,0.35);border-radius:5px;padding:2px 6px;font-size:10px;color:#1a5c35;max-width:105px;text-align:center;line-height:1.3;font-family:-apple-system,sans-serif;font-weight:600;opacity:0.7}

/* actions */
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:.5rem;align-items:center}

/* results */
.res{margin-top:1.25rem;padding:1.2rem;border:1px solid #c8b47a;border-radius:12px;background:#ede0bc}
.score-big{font-size:38px;font-weight:700;color:#7a3b0e;font-family:Georgia,serif}
.score-bar-wrap{background:#e2cfa0;border-radius:6px;height:8px;margin:.45rem 0 .35rem;overflow:hidden}
.score-bar-fill{height:100%;background:#7a3b0e;border-radius:6px;transition:width .7s ease}
.res-sub{font-size:12px;color:#8a6f3a;margin-bottom:.9rem;font-family:-apple-system,sans-serif}
.res-row{display:flex;gap:9px;margin-bottom:9px;font-size:13px;line-height:1.5;align-items:flex-start;font-family:-apple-system,sans-serif}
.dot{width:18px;height:18px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.ok{background:#c8e6c9;color:#2e6b3e}
.bad{background:#fce4d6;color:#7a3b0e}

/* mobile tap hint */
.tap-hint{font-size:11px;color:#8a6f3a;font-family:-apple-system,sans-serif;font-style:italic;margin-bottom:6px;display:block}
@media(min-width:600px){.tap-hint{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="hdr">
      <div><div class="ttl">History Challenger</div><div class="ttl-sub">Test your historical instincts</div></div>
      <div class="mets">
        <div class="met"><div class="mv" id="sc">—</div><div class="ml">Avg</div></div>
        <div class="met"><div class="mv" id="rn">—</div><div class="ml">Round</div></div>
      </div>
    </div>
    <div id="body"></div>
  </div>
</div>

<script>
const WORKER='https://histroychallenger-api.maletethan.workers.dev';

const DIFFS={
  easy:{label:'Easy',tag:'Centuries apart · Famous events',desc:'Iconic moments everyone knows. Events span centuries so spacing is forgiving.',tolerance:150,events:[[{name:"Great Pyramid of Giza completed",year:-2560,desc:"Pharaoh Khufu's pyramid at Giza is completed, the largest ever built."},{name:"Alexander the Great dies",year:-323,desc:"Alexander dies in Babylon after conquering an empire from Greece to India."},{name:"Roman Empire falls in the West",year:476,desc:"Romulus Augustulus is deposed, ending Western Roman rule."},{name:"Columbus reaches the Americas",year:1492,desc:"Columbus lands in the Caribbean, opening the Age of Exploration."},{name:"First Moon landing",year:1969,desc:"Apollo 11 astronauts become the first humans to walk on the Moon."}],[{name:"Homer composes the Iliad",year:-750,desc:"Homer's epic about the Trojan War is composed in ancient Greece."},{name:"Julius Caesar assassinated",year:-44,desc:"Caesar is stabbed to death in the Roman Senate."},{name:"Magna Carta signed",year:1215,desc:"English barons force King John to limit royal power."},{name:"Gutenberg's printing press",year:1440,desc:"Movable type revolutionises the spread of knowledge across Europe."},{name:"Berlin Wall falls",year:1989,desc:"East Germany opens its borders; Germany begins reunification."}]]},
  intermediate:{label:'Intermediate',tag:'Decades apart · Notable events',desc:'Events within a century. Requires real historical knowledge beyond just highlights.',tolerance:40,events:[[{name:"Battle of Hastings",year:1066,desc:"William the Conqueror defeats Harold II, transforming England."},{name:"First Crusade launched",year:1096,desc:"Pope Urban II calls for a military expedition to reclaim Jerusalem."},{name:"Magna Carta signed",year:1215,desc:"English barons force King John to limit royal power."},{name:"Mongols sack Baghdad",year:1258,desc:"Hulagu Khan destroys the Abbasid capital, ending its golden age."},{name:"Black Death arrives in Europe",year:1347,desc:"The bubonic plague reaches Sicily, spreading rapidly westward."}],[{name:"American Declaration of Independence",year:1776,desc:"The thirteen colonies declare independence from Britain."},{name:"French Revolution begins",year:1789,desc:"Storming of the Bastille ignites revolution reshaping Europe."},{name:"Napoleon crowned Emperor",year:1804,desc:"Napoleon crowns himself Emperor in Notre-Dame Cathedral."},{name:"Battle of Waterloo",year:1815,desc:"Napoleon is decisively defeated by Wellington and Blucher."},{name:"First Reform Act in Britain",year:1832,desc:"Parliament passes sweeping electoral reform, extending the vote."}]]},
  hard:{label:'Hard',tag:'Years apart · Specialist knowledge',desc:'Events within a decade or two. Requires deep knowledge of specific eras.',tolerance:15,events:[[{name:"American Declaration of Independence",year:1776,desc:"The thirteen colonies formally break from British rule."},{name:"US Constitution drafted",year:1787,desc:"Delegates draft a new constitution at Philadelphia."},{name:"French Revolution begins",year:1789,desc:"The storming of the Bastille opens a decade of upheaval."},{name:"US Bill of Rights ratified",year:1791,desc:"The first ten amendments protect fundamental civil liberties."},{name:"Execution of Louis XVI",year:1793,desc:"King Louis XVI is guillotined during the Terror."}],[{name:"World War I begins",year:1914,desc:"The assassination of Franz Ferdinand triggers global war."},{name:"Gallipoli campaign begins",year:1915,desc:"Allied forces land at Gallipoli in a failed Ottoman campaign."},{name:"Battle of the Somme",year:1916,desc:"The bloodiest battle in British history; over one million casualties."},{name:"US enters World War I",year:1917,desc:"America declares war after the Zimmermann Telegram is revealed."},{name:"Armistice ends World War I",year:1918,desc:"Fighting ceases on the Western Front at 11am on 11 November."}]]},
  historian:{label:'Historian',tag:'Months apart · Archival detail',desc:'Events years or months apart. Specialist knowledge required.',tolerance:5,events:[[{name:"Caesar crosses the Rubicon",year:-49,desc:"Caesar marches into Italy, triggering civil war against the Senate."},{name:"Caesar defeats Pompey at Pharsalus",year:-48,desc:"Caesar crushes Pompey's army in Greece; Pompey flees to Egypt."},{name:"Caesar assassinated on Ides of March",year:-44,desc:"A group of senators stab Caesar 23 times in the Theatre of Pompey."},{name:"Second Triumvirate formed",year:-43,desc:"Octavian, Antony, and Lepidus form an official ruling coalition."},{name:"Battle of Actium",year:-31,desc:"Octavian defeats Antony and Cleopatra's fleet off the Greek coast."}],[{name:"February Revolution — Tsar abdicates",year:1917,desc:"Mass protests force Nicholas II to abdicate; a provisional government takes power."},{name:"Lenin's April Theses published",year:1917,desc:"Lenin returns to Russia and demands immediate socialist revolution."},{name:"October Revolution — Bolsheviks seize power",year:1917,desc:"The Bolsheviks storm the Winter Palace and take control of Russia."},{name:"Treaty of Brest-Litovsk signed",year:1918,desc:"Russia exits WWI, ceding vast territory to Germany."},{name:"Russian Civil War ends",year:1922,desc:"The Bolsheviks defeat the White Army; the Soviet Union is established."}]]}
};

const ERA_THEMES=[
  {label:'Ancient World',q:'ancient world civilisations: Egypt, Greece, Rome, Persia, Mesopotamia'},
  {label:'Medieval Europe',q:'medieval European history: feudalism, crusades, plague, monarchies'},
  {label:'Islamic Golden Age',q:'the Islamic Golden Age and expansion of the Islamic world 600-1300 AD'},
  {label:'Renaissance & Reformation',q:'the Renaissance and Protestant Reformation in Europe 1400-1600'},
  {label:'Age of Exploration',q:'the Age of Exploration: European voyages, colonisation, trade routes 1400-1700'},
  {label:'Enlightenment & Revolution',q:'the Enlightenment, American Revolution and French Revolution'},
  {label:'19th Century',q:'19th century world history: industrialisation, nationalism, empire'},
  {label:'World Wars',q:'World War I and World War II: battles, political events, turning points'},
  {label:'Cold War',q:'the Cold War 1945-1991: space race, proxy wars, detente, nuclear standoff'},
  {label:'Ancient Asia',q:'ancient Asian history: China, India, Japan, Southeast Asia'},
  {label:'Science & Discovery',q:'landmark moments in science, technology and exploration across all eras'},
];

let S={
  phase:'setup',diff:null,rounds:5,round:0,
  theme:null,customTheme:'',generatedSets:[],
  totalPct:0,roundsPlayed:0,
  events:[],midP:{},aLeft:null,aRight:null,
  submitted:false,dragId:null,dragFrom:null,ghostName:'',
  selectedCard:null  // for mobile tap-to-place
};

function yr(y){return y<0?Math.abs(y)+' BC':y+' AD';}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}
function isMobile(){return window.innerWidth<600;}
function activeLabel(){
  if(S.customTheme)return'"'+S.customTheme+'"';
  if(S.theme)return ERA_THEMES.find(t=>t.q===S.theme)?.label||'';
  return'Curated sets';
}

function showOverlay(msg){
  let ov=document.getElementById('loading-overlay');
  if(!ov){
    ov=document.createElement('div');ov.id='loading-overlay';ov.className='overlay';
    document.body.appendChild(ov);
  }
  ov.innerHTML=`<div class="overlay-card"><div class="overlay-title">History Challenger</div><div class="overlay-sub">${msg}</div><div class="spin"></div></div>`;
  ov.style.display='flex';
}
function hideOverlay(){
  const ov=document.getElementById('loading-overlay');
  if(ov)ov.style.display='none';
}

function renderSetup(){
  document.getElementById('rn').textContent='—';
  document.getElementById('sc').textContent='—';
  const diffKeys=Object.keys(DIFFS);
  const roundOpts=[3,5,10,15,20];
  const themeQ=S.customTheme||S.theme;
  const hasTheme=!!(S.customTheme||S.theme);
  document.getElementById('body').innerHTML=`<div class="sf">
    <div class="setup-title">Choose difficulty</div>
    <div class="setup-sub">Two axes: how far apart events are in time, and how obscure they are.</div>
    <div class="diff-grid">${diffKeys.map(k=>`<div class="dc ${S.diff===k?'sel':''}" onclick="selDiff('${k}')"><div class="dn">${DIFFS[k].label}</div><div class="dt">${DIFFS[k].tag}</div><div class="dd">${DIFFS[k].desc}</div></div>`).join('')}</div>
    <hr class="divider">
    <div class="setup-title" style="font-size:15px;margin-bottom:.3rem">Choose a theme <span style="font-size:11px;font-weight:400;color:#8a6f3a">— AI generates focused events</span></div>
    <div class="setup-sub" style="margin-bottom:.75rem">Pick an era or type your own — "Punic Wars", "Ming Dynasty", "WW1 Western Front". Without a theme, curated event sets are used.</div>
    <div class="theme-grid">${ERA_THEMES.map(t=>`<div class="chip ${!S.customTheme&&S.theme===t.q?'sel':''}" onclick="selTheme('${t.q.replace(/'/g,"\\'")}')">${t.label}</div>`).join('')}</div>
    <div class="custom-row">
      <input class="ci" id="ci" type="text" placeholder="Or type a custom theme..." value="${S.customTheme}" oninput="onCI(this.value)">
      <button class="btn" onclick="clearTheme()">Clear</button>
    </div>
    <div id="theme-err" class="err-msg" style="display:none"></div>
    <div class="rounds-row">
      <div class="rl">Rounds:</div>
      <div class="ropts">${roundOpts.map(n=>`<div class="ro ${S.rounds===n?'sel':''}" onclick="selRounds(${n})">${n}</div>`).join('')}</div>
    </div>
    <button class="btn btn-p" id="start-btn" onclick="startSeries()" ${!S.diff?'disabled':''}>
      ${hasTheme?'Generate &amp; Start &#8594;':'Start &#8594;'}
    </button>
  </div>`;}

function selDiff(k){
  S.diff=k;S.generatedSets=[];
  renderSetup();
}
function selRounds(n){S.rounds=n;renderSetup();}
function selTheme(q){
  S.theme=q;S.customTheme='';S.generatedSets=[];
  renderSetup();
}
function clearTheme(){
  S.theme=null;S.customTheme='';S.generatedSets=[];
  renderSetup();
}
function onCI(v){
  S.customTheme=v.trim();
  if(S.customTheme)S.theme=null;
  S.generatedSets=[];
  // Update button label without full re-render
  const btn=document.getElementById('start-btn');
  if(btn)btn.innerHTML=S.customTheme?'Generate &amp; Start &#8594;':'Start &#8594;';
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));
}

async function startSeries(){
  if(!S.diff)return;
  S.round=0;S.totalPct=0;S.roundsPlayed=0;S.phase='game';
  const themeQ=S.customTheme||S.theme;
  if(themeQ){
    showOverlay('Sourcing historical events for<br><strong>'+activeLabel()+'</strong><br><br>This may take a moment...');
    const ok=await generateEvents(themeQ);
    hideOverlay();
    if(!ok)return; // error shown inside generateEvents
  }
  startRound();
}

async function generateEvents(themeQ){
  try{
    const res=await fetch(WORKER,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({theme:themeQ,diff:S.diff,rounds:Math.min(S.rounds,8)})
    });
    const data=await res.json();
    if(data.error){
      // Show error back on setup screen
      renderSetup();
      const errEl=document.getElementById('theme-err');
      if(errEl){errEl.textContent=data.error;errEl.style.display='block';}
      return false;
    }
    const sets=[];
    if(data.sets&&Array.isArray(data.sets)){
      data.sets.forEach(s=>{if(Array.isArray(s)&&s.length===5)sets.push(s);});
    }
    if(!sets.length){
      renderSetup();
      const errEl=document.getElementById('theme-err');
      if(errEl){errEl.textContent='Could not generate events for this theme — try rephrasing it.';errEl.style.display='block';}
      return false;
    }
    S.generatedSets=sets;
    return true;
  }catch(e){
    renderSetup();
    const errEl=document.getElementById('theme-err');
    if(errEl){errEl.textContent='Connection error — please try again.';errEl.style.display='block';}
    return false;
  }
}

function startRound(){
  S.submitted=false;S.midP={};S.aLeft=null;S.aRight=null;
  S.dragId=null;S.dragFrom=null;S.ghostName='';S.selectedCard=null;
  let raw;
  if(S.generatedSets.length>0){raw=S.generatedSets[S.round%S.generatedSets.length];}
  else{const sets=DIFFS[S.diff].events;raw=sets[S.round%sets.length];}
  S.events=raw.map((e,i)=>({...e,id:'e'+i}));
  shuffle(S.events);
  document.getElementById('rn').textContent=(S.round+1)+'/'+S.rounds;
  updSc();renderGame();
}

function updSc(){document.getElementById('sc').textContent=S.roundsPlayed>0?Math.round(S.totalPct/S.roundsPlayed)+'%':'—';}
function pIds(){const s=new Set(Object.keys(S.midP));if(S.aLeft)s.add(S.aLeft.id);if(S.aRight)s.add(S.aRight.id);return s;}
function allP(){return pIds().size===5;}

function renderGame(){
  const placed=pIds();
  const pool=S.events.filter(e=>!placed.has(e.id));
  const tTag=activeLabel()!=='Curated sets'?` <span style="color:#7a3b0e;font-weight:600">Theme: ${activeLabel()}</span>`:'';
  const dis=(!allP()||S.submitted)?'disabled':'';
  const mobile=isMobile();

  // Pool HTML — tappable on mobile
  const pH=pool.length
    ?pool.map(e=>`<div class="ecard${S.selectedCard===e.id?' selected-card':''}" onclick="tapCard('${e.id}')"${!mobile?` draggable="true" ondragstart="ds(event,'${e.id}','pool')" ondragend="de()"`:''} >${e.name}</div>`).join('')
    :'<span style="font-size:12px;color:#8a6f3a;font-family:-apple-system,sans-serif">All placed</span>';

  // Anchor content
  const lC=S.aLeft
    ?`<div class="anchor-card" onclick="tapAnchor('left')"${!mobile?` draggable="true" ondragstart="ds(event,'${S.aLeft.id}','left')" ondragend="de()"`:''} >${S.aLeft.name}</div>`
    :'<span style="font-size:10px;color:#b09050;font-family:-apple-system,sans-serif">'+(mobile?'Tap a card, then tap here':'Drop earliest here')+'</span>';
  const rC=S.aRight
    ?`<div class="anchor-card" onclick="tapAnchor('right')"${!mobile?` draggable="true" ondragstart="ds(event,'${S.aRight.id}','right')" ondragend="de()"`:''} >${S.aRight.name}</div>`
    :'<span style="font-size:10px;color:#b09050;font-family:-apple-system,sans-serif">'+(mobile?'Tap a card, then tap here':'Drop most recent here')+'</span>';

  // Desktop pins
  let pins='';
  for(const [id,pct] of Object.entries(S.midP)){
    const evt=S.events.find(e=>e.id===id);if(!evt)continue;
    pins+=`<div class="pin" id="pin-${id}" style="left:${pct*100}%" draggable="true" ondragstart="ds(event,'${id}','bar')" ondragend="de()"><div class="pin-dot"></div><div class="pin-stem"></div><div class="pin-label">${evt.name}</div></div>`;
  }
  const ghost=`<div class="ghost-pin" id="ghost" style="left:-999px;display:none"><div class="ghost-dot"></div><div class="ghost-stem"></div><div class="ghost-label" id="ghost-lbl"></div></div>`;

  // Mobile bar pins
  let mobilePins='';
  for(const [id,pct] of Object.entries(S.midP)){
    const evt=S.events.find(e=>e.id===id);if(!evt)continue;
    mobilePins+=`<div class="mobile-pin" style="left:${pct*100}%" onclick="tapMobilePin('${id}')"><div class="mobile-pin-dot"></div><div class="mobile-pin-lbl">${evt.name}</div></div>`;
  }
  const mobileBarContent=Object.keys(S.midP).length===0
    ?'<div class="tl-mobile-hint">Tap a card, then tap here to place</div>'
    :'';

  document.getElementById('body').innerHTML=`
    <p class="instr">Place one event in <strong>Earliest</strong> and one in <strong>Most recent</strong> — figure out which is which. Place the other three on the bar.${tTag}</p>
    ${mobile?'<span class="tap-hint">Tap a card to select it, then tap where to place it</span>':''}
    <div class="plbl">Events to place</div>
    <div class="pool" id="pool">${pH}</div>
    <div class="tl-section">
      <div class="tl-outer">
        <div class="tl-anchors">
          <div class="anchor-zone" id="zl">
            <div class="anchor-label">Earliest</div>
            <div class="anchor-drop ${S.aLeft?'filled':''}" id="dl"
              onclick="tapAnchor('left')"
              ondragover="aOv(event,'left')" ondragleave="aLv('left')" ondrop="aDr(event,'left')">${lC}</div>
          </div>
          <div class="anchor-zone" id="zr">
            <div class="anchor-label">Most recent</div>
            <div class="anchor-drop ${S.aRight?'filled':''}" id="dr"
              onclick="tapAnchor('right')"
              ondragover="aOv(event,'right')" ondragleave="aLv('right')" ondrop="aDr(event,'right')">${rC}</div>
          </div>
        </div>
        <div class="tl-bar-row">
          <div class="tl-anchor-line"></div>
          <div class="tl-bar-wrap">
            <div class="tl-bar" id="tl-bar"
              ondragover="bOv(event)" ondragleave="bLv()" ondrop="bDr(event)"
              onmousemove="bMv(event)" onmouseleave="hG()">
              <div class="tl-track"></div>
            </div>
            <div class="pins-layer" id="pl">${pins}${ghost}</div>
          </div>
          <div class="tl-anchor-line"></div>
        </div>
        <div class="tl-mobile-bar" id="mobile-bar" onclick="tapBar(event)">
          <div class="tl-mobile-track"></div>
          ${mobileBarContent}
          ${mobilePins}
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-p" onclick="doSubmit()" ${dis}>Submit</button>
      <button class="btn" onclick="clearAll()">Clear all</button>
      <button class="btn" onclick="restartSetup()" style="margin-left:auto">&#8592; Menu</button>
    </div>
    <div id="res-area"></div>`;
}

/* TAP INTERACTIONS (mobile) */
function tapCard(id){
  if(S.submitted)return;
  // If already placed, return it to pool
  if(S.midP[id]){delete S.midP[id];S.selectedCard=null;renderGame();return;}
  if(S.aLeft&&S.aLeft.id===id){S.aLeft=null;S.selectedCard=null;renderGame();return;}
  if(S.aRight&&S.aRight.id===id){S.aRight=null;S.selectedCard=null;renderGame();return;}
  // Select/deselect
  S.selectedCard=S.selectedCard===id?null:id;
  renderGame();
}

function tapAnchor(side){
  if(S.submitted)return;
  if(!S.selectedCard){
    // If already filled, return to pool
    if(side==='left'&&S.aLeft){S.aLeft=null;renderGame();return;}
    if(side==='right'&&S.aRight){S.aRight=null;renderGame();return;}
    return;
  }
  const evt=S.events.find(x=>x.id===S.selectedCard);
  if(!evt)return;
  rtp(S.selectedCard,S.dragFrom);
  if(side==='left'){if(S.aLeft){}; S.aLeft=evt;}
  else{S.aRight=evt;}
  S.selectedCard=null;
  renderGame();
}

function tapBar(e){
  if(S.submitted||!S.selectedCard)return;
  const bar=document.getElementById('mobile-bar');
  if(!bar)return;
  const r=bar.getBoundingClientRect();
  const pct=Math.max(0.02,Math.min(0.98,(e.clientX-r.left)/r.width));
  const evt=S.events.find(x=>x.id===S.selectedCard);
  if(!evt)return;
  rtp(S.selectedCard,'pool');
  S.midP[S.selectedCard]=pct;
  S.selectedCard=null;
  renderGame();
}

function tapMobilePin(id){
  if(S.submitted)return;
  delete S.midP[id];
  renderGame();
}

/* DRAG INTERACTIONS (desktop) */
function ds(e,id,from){S.dragId=id;S.dragFrom=from;const ev=S.events.find(x=>x.id===id);S.ghostName=ev?ev.name:'';}
function de(){S.dragId=null;S.dragFrom=null;S.ghostName='';hG();}
function aOv(e,s){e.preventDefault();document.getElementById('d'+s[0])?.classList.add('over');}
function aLv(s){document.getElementById('d'+s[0])?.classList.remove('over');}
function aDr(e,side){
  e.preventDefault();document.getElementById('d'+side[0])?.classList.remove('over');
  if(!S.dragId)return;
  const ev=S.events.find(x=>x.id===S.dragId);if(!ev)return;
  rtp(S.dragId,S.dragFrom);
  if(side==='left')S.aLeft=ev;else S.aRight=ev;
  renderGame();
}
function rtp(id,from){
  if(from==='bar')delete S.midP[id];
  else if(from==='left')S.aLeft=null;
  else if(from==='right')S.aRight=null;
}
function gPct(e){
  const b=document.getElementById('tl-bar');if(!b)return.5;
  const r=b.getBoundingClientRect();
  return Math.max(.01,Math.min(.99,(e.clientX-r.left)/r.width));
}
function bOv(e){e.preventDefault();document.getElementById('tl-track')?.style.setProperty('background','#8a6f3a');document.getElementById('tl-bar')?.classList.add('active');uG(e);}
function bLv(){document.getElementById('tl-bar')?.classList.remove('active');hG();}
function bMv(e){if(S.dragId)uG(e);}
function uG(e){
  const g=document.getElementById('ghost');const gl=document.getElementById('ghost-lbl');
  if(!g||!S.dragId)return;
  g.style.left=(gPct(e)*100)+'%';g.style.display='flex';if(gl)gl.textContent=S.ghostName;
}
function hG(){const g=document.getElementById('ghost');if(g)g.style.display='none';}
function bDr(e){
  e.preventDefault();document.getElementById('tl-bar')?.classList.remove('active');hG();
  if(!S.dragId)return;
  const ev=S.events.find(x=>x.id===S.dragId);if(!ev)return;
  rtp(S.dragId,S.dragFrom);
  S.midP[S.dragId]=gPct(e);renderGame();
}
function clearAll(){S.midP={};S.aLeft=null;S.aRight=null;S.selectedCard=null;renderGame();}

function doSubmit(){
  if(!allP()||S.submitted)return;
  S.submitted=true;
  const sorted=[...S.events].sort((a,b)=>a.year-b.year);
  const minY=sorted[0].year,maxY=sorted[4].year,range=maxY-minY||1;
  const iP={};sorted.forEach(e=>{iP[e.id]=(e.year-minY)/range;});
  const eP={};
  if(S.aLeft)eP[S.aLeft.id]=0;
  if(S.aRight)eP[S.aRight.id]=1;
  for(const [id,pct] of Object.entries(S.midP))eP[id]=pct;
  const pOrd=[...S.events].sort((a,b)=>(eP[a.id]??0.5)-(eP[b.id]??0.5));
  let oc=0;pOrd.forEach((ev,i)=>{if(sorted[i]&&sorted[i].id===ev.id)oc++;});
  const oPct=Math.round((oc/5)*50);
  const tF=DIFFS[S.diff].tolerance/range;
  let sRaw=0;const sPer={};
  S.events.forEach(ev=>{
    const d=Math.abs((eP[ev.id]??0.5)-iP[ev.id]);
    const p=Math.max(0,1-d/tF);
    sPer[ev.id]=Math.round(p*10);sRaw+=p;
  });
  const sPct=Math.round((sRaw/5)*50);
  const tot=oPct+sPct;
  S.totalPct+=tot;S.roundsPlayed++;updSc();

  // Colour anchors
  const ld=document.getElementById('dl');const rd=document.getElementById('dr');
  const lOk=S.aLeft&&sorted[0].id===S.aLeft.id;
  const rOk=S.aRight&&sorted[4].id===S.aRight.id;
  if(ld)ld.classList.add(lOk?'anchor-ok':'anchor-bad');
  if(rd)rd.classList.add(rOk?'anchor-ok':'anchor-bad');

  // Answer pins on desktop bar — staggered below the line
  const layer=document.getElementById('pl');
  if(layer){
    const pos=sorted.map(e=>iP[e.id]);
    const stemHeights=computeStemHeights(pos);
    sorted.forEach((ev,i)=>{
      const el=document.createElement('div');
      el.className='answer-pin';
      el.style.left=(iP[ev.id]*100)+'%';
      el.style.top='6px'; // starts at the line
      el.innerHTML=`<div class="answer-dot"></div><div class="answer-stem" style="height:${stemHeights[i]}px"></div><div class="answer-label">${yr(ev.year)}<br><span style="font-weight:400;font-size:9px">${ev.name}</span></div>`;
      layer.appendChild(el);
    });
  }

  const rows=sorted.map((ev,i)=>{
    const pR=pOrd.findIndex(x=>x.id===ev.id);
    const oOk=pR===i;const sp=sPer[ev.id];
    return `<div class="res-row"><div class="dot ${oOk?'ok':'bad'}">${oOk?'&#10003;':'&#10007;'}</div><div><span style="font-weight:600">${yr(ev.year)} &#8212; ${ev.name}</span><br><span style="color:#6b4f1a;font-size:12px">${ev.desc}</span><br><span style="font-size:12px;color:#8a6f3a">Spacing: ${sp}/10</span></div></div>`;
  }).join('');

  const isLast=S.round+1>=S.rounds;
  const nBtn=isLast
    ?`<button class="btn btn-p" onclick="showFinal()">Final score &#8594;</button>`
    :`<button class="btn btn-p" onclick="nextRound()">Next round &#8594;</button>`;

  document.getElementById('res-area').innerHTML=`
    <div class="res">
      <div class="score-big">${tot}%</div>
      <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${tot}%"></div></div>
      <div class="res-sub">${oPct}/50 order &#183; ${sPct}/50 spacing &#183; Green pins = correct positions</div>
      ${rows}
      <div style="margin-top:1rem;display:flex;gap:10px;flex-wrap:wrap">${nBtn}<button class="btn" onclick="restartSetup()">&#8592; Menu</button></div>
    </div>`;
}

function computeStemHeights(positions){
  // Stagger answer pins so labels don't overlap — each too-close pin gets a longer stem
  const n=positions.length;
  const heights=new Array(n).fill(20);
  const minGap=0.1; // 10% of bar width minimum before staggering
  for(let i=1;i<n;i++){
    if(positions[i]-positions[i-1]<minGap){
      heights[i]=heights[i-1]+36; // bigger step = less overlap
    }
  }
  return heights;
}

function nextRound(){S.round++;startRound();}

function showFinal(){
  const avg=Math.round(S.totalPct/S.roundsPlayed);
  const medal=avg>=90?'Gold &#8212; Historian':avg>=70?'Silver &#8212; Scholar':avg>=50?'Bronze &#8212; Student':'Apprentice Chronicler';
  document.getElementById('body').innerHTML=`
    <div class="res" style="text-align:center">
      <div style="font-size:13px;color:#8a6f3a;margin-bottom:.5rem;font-family:-apple-system,sans-serif">${S.rounds} rounds &#183; ${DIFFS[S.diff].label} &#183; ${activeLabel()}</div>
      <div class="score-big">${avg}%</div>
      <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${avg}%"></div></div>
      <div style="font-size:17px;font-weight:700;color:#3b2a0e;margin:.75rem 0;font-family:Georgia,serif">${medal}</div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:1rem;flex-wrap:wrap">
        <button class="btn btn-p" onclick="beginGame()">Play again</button>
        <button class="btn" onclick="restartSetup()">&#8592; Menu</button>
      </div>
    </div>`;
  document.getElementById('sc').textContent=avg+'%';
  document.getElementById('rn').textContent='Done';
}

function beginGame(){S.round=0;S.totalPct=0;S.roundsPlayed=0;S.phase='game';startRound();}
function restartSetup(){S.phase='setup';S.diff=null;S.rounds=5;S.generatedSets=[];renderSetup();}
renderSetup();
</script>
</body>
</html>
