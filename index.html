<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History Challenger</title>
<meta name="description" content="Prove your historical mastery. Place events on a timeline — score points for correct order and accurate spacing.">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body{font-family:Georgia,'Times New Roman',serif;background:#080705;color:#f0e8cc;display:flex;justify-content:center;padding:1.25rem 0.75rem}
.wrap{width:100%;max-width:820px}
.card{background:#141208;border:1px solid #4a3e1e;border-radius:14px;padding:1.25rem}
@media(min-width:600px){.card{padding:1.75rem}}

/* HEADER */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.1rem;border-bottom:1.5px solid #4a3e1e;padding-bottom:.9rem;flex-wrap:wrap;gap:8px}
.hdr-left{display:flex;flex-direction:column;gap:4px}
.ttl{font-size:20px;font-weight:700;color:#ffffff;letter-spacing:.01em}
@media(min-width:600px){.ttl{font-size:24px}}
.ttl-sub{font-size:10px;color:#7a6a3a;letter-spacing:.09em;text-transform:uppercase;font-family:-apple-system,sans-serif}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.mets{display:flex;gap:8px}
.met{background:#1e1a0a;border:1px solid #4a3e1e;border-radius:8px;padding:5px 12px;text-align:center;min-width:56px}
.mv{font-size:18px;font-weight:700;color:#ffffff}
.ml{font-size:10px;color:#7a6a3a;font-family:-apple-system,sans-serif;letter-spacing:.04em}
.lang-row{display:flex;gap:5px}
.lang-btn{border:1px solid #3a3010;background:#1a1608;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;color:#8a7a4a;font-family:-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.lang-btn:hover{border-color:#6b5a2a;color:#c8b47a}
.lang-btn.active{border-color:#c8903a;background:#2a2010;color:#f0dfa0;font-weight:700}

/* SETUP */
.sf{font-family:-apple-system,sans-serif}
.section-num{font-size:11px;color:#c8903a;letter-spacing:.1em;text-transform:uppercase;font-family:-apple-system,sans-serif;font-weight:700;margin-bottom:.2rem}
.setup-title{font-size:17px;font-weight:700;color:#ffffff;margin-bottom:.35rem;font-family:Georgia,serif}
.setup-sub{font-size:13px;color:#8a7a4a;margin-bottom:1rem;line-height:1.5}
.diff-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem}
.dc{border:1.5px solid #3a3010;border-radius:10px;padding:10px 12px;cursor:pointer;background:#1a1608;transition:border-color .12s,background .12s;-webkit-tap-highlight-color:transparent}
.dc:hover{background:#221e0c;border-color:#6b5a2a}
.dc.sel{border-color:#c8903a;background:#261e08}
.dn{font-size:13px;font-weight:700;color:#ffffff;margin-bottom:2px}
.dt{font-size:10px;color:#c8903a;background:#1e1808;border:1px solid #3a3010;border-radius:3px;padding:1px 5px;display:inline-block;margin-bottom:4px;letter-spacing:.02em}
.dd{font-size:11px;color:#7a6a3a;line-height:1.4}
.divider{border:none;border-top:1px solid #3a3010;margin:1.1rem 0}
.theme-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:.85rem}
.chip{border:1px solid #3a3010;background:#1a1608;border-radius:18px;padding:5px 13px;font-size:12px;cursor:pointer;color:#c8b47a;font-family:-apple-system,sans-serif;transition:all .12s;-webkit-tap-highlight-color:transparent}
.chip:hover{background:#221e0c;border-color:#6b5a2a}
.chip.sel{border-color:#c8903a;background:#261e08;color:#ffffff;font-weight:600}
.custom-row{display:flex;gap:8px;align-items:center;margin-bottom:.6rem}
.ci{flex:1;border:1px solid #4a3e1e;background:#1a1608;border-radius:8px;padding:8px 12px;font-size:14px;color:#f0e8cc;font-family:-apple-system,sans-serif;outline:none;-webkit-appearance:none}
.ci:focus{border-color:#c8903a}
.ci::placeholder{color:#3a3010}
.rounds-row{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;flex-wrap:wrap}
.rl{font-size:13px;color:#7a6a3a;font-family:-apple-system,sans-serif}
.ropts{display:flex;gap:7px;flex-wrap:wrap}
.ro{border:1px solid #3a3010;background:#1a1608;border-radius:7px;padding:6px 13px;font-size:13px;cursor:pointer;color:#c8b47a;font-family:-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.ro:hover{background:#221e0c}
.ro.sel{border-color:#c8903a;background:#261e08;color:#ffffff;font-weight:600}
.btn{border:1px solid #4a3e1e;background:#1e1a0a;color:#f0e8cc;border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;font-family:-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn:hover{background:#272210}
.btn-p{background:#9a5a10;color:#ffffff;border-color:#9a5a10}
.btn-p:hover{background:#b06a18}
.btn:disabled{opacity:.3;cursor:default}
.err-msg{font-size:12px;color:#e06040;font-family:-apple-system,sans-serif;padding:8px 0;font-style:italic}

/* OVERLAY */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(4,3,2,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.overlay-card{background:#141208;border:1px solid #4a3e1e;border-radius:14px;padding:2rem 2.5rem;text-align:center;max-width:320px}
.overlay-title{font-size:18px;font-weight:700;color:#ffffff;font-family:Georgia,serif;margin-bottom:.5rem}
.overlay-sub{font-size:13px;color:#7a6a3a;margin-bottom:1.25rem;line-height:1.5;font-family:-apple-system,sans-serif}
.spin{display:inline-block;width:28px;height:28px;border:3px solid #3a3010;border-top-color:#c8903a;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* GAME */
.instr{font-size:13px;color:#a09070;line-height:1.6;margin-bottom:1rem;padding:9px 12px;background:#1a1608;border-radius:8px;border-left:3px solid #c8903a;font-family:-apple-system,sans-serif}
.plbl{font-size:10px;color:#4a4020;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;font-family:-apple-system,sans-serif}
.pool{display:flex;flex-wrap:wrap;gap:7px;min-height:44px;padding:7px;border:1px dashed #3a3010;border-radius:8px;margin-bottom:1.25rem;align-items:flex-start;background:#100e06}
.ecard{background:#1a1608;border:1.5px solid #4a3e1e;border-radius:7px;padding:7px 11px;font-size:12px;cursor:pointer;user-select:none;color:#f0e8cc;line-height:1.4;font-family:-apple-system,sans-serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.ecard:hover{border-color:#6b5a2a;background:#221e0c}
.ecard.selected-card{border-color:#c8903a;background:#261e08;color:#ffffff;font-weight:600}

/* TIMELINE */
.tl-section{margin-bottom:1.25rem}
.tl-outer{position:relative}
.tl-anchors{display:flex;justify-content:space-between;gap:8px;margin-bottom:10px}
.anchor-zone{flex:0 0 calc(50% - 4px)}
@media(min-width:600px){.anchor-zone{flex:0 0 145px}}
.anchor-label{font-size:10px;color:#4a4020;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;text-align:center;font-family:-apple-system,sans-serif}
.anchor-drop{min-height:48px;border:1px dashed #3a3010;border-radius:8px;padding:5px 7px;display:flex;align-items:center;justify-content:center;text-align:center;background:#100e06;transition:border-color .12s,background .12s;cursor:pointer;-webkit-tap-highlight-color:transparent}
.anchor-drop.over{border-color:#c8903a;background:#1a1608}
.anchor-drop.filled{border-style:solid;border-color:#5a4e28;background:#1a1608}
.anchor-card{font-size:11px;color:#f0e8cc;line-height:1.3;cursor:pointer;user-select:none;text-align:center;font-weight:600;font-family:-apple-system,sans-serif}
.anchor-ok{border-color:#2e8b4e !important;background:#0a1e10 !important}
.anchor-bad{border-color:#8b3020 !important;background:#1a0a06 !important}
.tl-bar-row{display:none}
@media(min-width:600px){.tl-bar-row{display:flex;align-items:center;margin-top:4px}}
.tl-anchor-line{width:145px;flex-shrink:0;height:6px;background:#3a3010}
.tl-bar-wrap{flex:1;position:relative;height:6px}
.tl-bar{position:absolute;top:-17px;left:0;right:0;height:40px;cursor:crosshair;z-index:5}
.tl-track{position:absolute;top:0;left:0;right:0;height:6px;background:#3a3010;transition:background .12s}
.tl-bar.active .tl-track{background:#c8903a}
.pins-layer{position:absolute;top:0;left:0;right:0;height:0;pointer-events:none;z-index:10}
.pin{position:absolute;top:0;display:flex;flex-direction:column;align-items:center;transform:translateX(-50%);pointer-events:all;cursor:grab}
.pin-dot{width:13px;height:13px;border-radius:50%;background:#c8903a;border:2px solid #141208;outline:1.5px solid #c8903a;flex-shrink:0;margin-top:-4px}
.pin-stem{width:1.5px;height:14px;background:#c8903a}
.pin-label{background:#1a1608;border:1px solid #5a4e28;border-radius:6px;padding:4px 8px;font-size:11px;color:#f0e8cc;max-width:110px;text-align:center;line-height:1.3;font-family:-apple-system,sans-serif}
.ghost-pin{position:absolute;top:0;display:flex;flex-direction:column;align-items:center;transform:translateX(-50%);pointer-events:none;opacity:0.35}
.ghost-dot{width:13px;height:13px;border-radius:50%;background:#c8903a;border:2px solid #141208;flex-shrink:0;margin-top:-4px}
.ghost-stem{width:1.5px;height:14px;background:#c8903a}
.ghost-label{background:#1a1608;border:1px dashed #3a3010;border-radius:6px;padding:4px 8px;font-size:11px;color:#7a6a3a;max-width:110px;text-align:center;line-height:1.3;font-family:-apple-system,sans-serif}
.answer-pin{position:absolute;display:flex;flex-direction:column;align-items:center;transform:translateX(-50%);pointer-events:none}
.answer-dot{width:10px;height:10px;border-radius:50%;background:#2a8a5a;border:2px solid #141208;flex-shrink:0;opacity:0.65}
.answer-stem{width:1.5px;background:#2a8a5a;opacity:0.45}
.answer-label{background:rgba(42,138,90,0.1);border:1px solid rgba(42,138,90,0.35);border-radius:5px;padding:2px 6px;font-size:10px;color:#5aaa7a;max-width:105px;text-align:center;line-height:1.3;font-family:-apple-system,sans-serif;font-weight:600;opacity:0.8}
.tl-mobile-bar{display:block;margin-top:12px;position:relative;height:52px;background:#100e06;border:1px dashed #3a3010;border-radius:8px;cursor:pointer;overflow:visible}
@media(min-width:600px){.tl-mobile-bar{display:none}}
.tl-mobile-track{position:absolute;top:50%;left:12px;right:12px;height:5px;background:#3a3010;border-radius:2px;transform:translateY(-50%)}
.tl-mobile-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;color:#3a3010;font-family:-apple-system,sans-serif;white-space:nowrap;pointer-events:none}
.mobile-pin{position:absolute;top:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;pointer-events:all;cursor:pointer}
.mobile-pin-dot{width:14px;height:14px;border-radius:50%;background:#c8903a;border:2px solid #141208;flex-shrink:0}
.mobile-pin-lbl{background:#1a1608;border:1px solid #5a4e28;border-radius:5px;padding:2px 6px;font-size:10px;color:#f0e8cc;white-space:normal;max-width:80px;text-align:center;line-height:1.3;font-family:-apple-system,sans-serif;margin-top:3px}
.mobile-bar-instr{display:block;font-size:11px;color:#4a4020;font-family:-apple-system,sans-serif;font-style:italic;margin-top:8px;margin-bottom:4px;text-align:center}
@media(min-width:600px){.mobile-bar-instr{display:none}}
.tap-hint{font-size:11px;color:#4a4020;font-family:-apple-system,sans-serif;font-style:italic;margin-bottom:6px;display:block}
@media(min-width:600px){.tap-hint{display:none}}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:.5rem;align-items:center}
.res{margin-top:1.25rem;padding:1.2rem;border:1px solid #4a3e1e;border-radius:12px;background:#100e06}
.score-big{font-size:42px;font-weight:700;color:#c8903a;font-family:Georgia,serif}
.score-bar-wrap{background:#1e1a0a;border-radius:6px;height:8px;margin:.45rem 0 .35rem;overflow:hidden}
.score-bar-fill{height:100%;background:#c8903a;border-radius:6px;transition:width .7s ease}
.res-sub{font-size:12px;color:#5a4e28;margin-bottom:.9rem;font-family:-apple-system,sans-serif}
.res-row{display:flex;gap:9px;margin-bottom:9px;font-size:13px;line-height:1.5;align-items:flex-start;font-family:-apple-system,sans-serif}
.dot{width:18px;height:18px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.ok{background:#0a2218;color:#5aaa7a}
.bad{background:#1a0806;color:#e06040}
</style>
</head>

          <button class="lang-btn" onclick="setLang('es')">ES</button>
        </div>
      </div>
    </div>
    <div id="body"></div>
  </div>
</div>

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function selDiff(k){S.diff=k;S.generatedSets=[];renderSetup();}

function selTheme(q){S.theme=q;S.customTheme='';S.generatedSets=[];renderSetup();}
function clearTheme(){S.theme=null;S.customTheme='';S.generatedSets=[];renderSetup();}
function onCI(v){
  S.customTheme=v.trim();
  if(S.customTheme)S.theme=null;
  S.generatedSets=[];
  const btn=document.getElementById('start-btn');
  if(btn)btn.textContent=S.customTheme?t('genStart'):t('startBtn');
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));

async function startSeries(){
  if(!S.diff)return;
  S.round=0;S.totalPct=0;S.roundsPlayed=0;S.phase='game';
  const themeQ=S.customTheme||S.theme;
  if(themeQ){
    showOverlay(t('generatingMsg')+' <strong style="color:#ffffff">'+activeLabel()+'</strong><br><br>'+t('generatingWait'));
    const ok=await generateEvents(themeQ);
    hideOverlay();
    if(!ok)return;
  }
  startRound();
}

async function generateEvents(themeQ){
  try{
    const res=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({theme:themeQ,diff:S.diff,rounds:Math.min(S.rounds,8)})});
    const data=await res.json();
    if(data.error){
      renderSetup();
      const errEl=document.getElementById('theme-err');
      if(errEl){errEl.textContent=data.error;errEl.style.display='block';}
      return false;
    }
    const sets=[];
    if(data.sets&&Array.isArray(data.sets)){data.sets.forEach(s=>{if(Array.isArray(s)&&s.length===5)sets.push(s);});}
    if(!sets.length){
      renderSetup();
      const errEl=document.getElementById('theme-err');
      if(errEl){errEl.textContent=t('noSets');errEl.style.display='block';}
      return false;
    }
    S.generatedSets=sets;return true;
  }catch(e){
    renderSetup();
    const errEl=document.getElementById('theme-err');
    if(errEl){errEl.textContent=t('connError');errEl.style.display='block';}
    return false;
  }
}

function startRound(){
  S.submitted=false;S.midP={};S.aLeft=null;S.aRight=null;
  S.dragId=null;S.dragFrom=null;S.ghostName='';S.selectedCard=null;
  let raw;
  if(S.generatedSets.length>0){raw=S.generatedSets[S.round%S.generatedSets.length];}
  else{const sets=DIFFS[S.diff].events;raw=sets[S.round%sets.length];}
  S.events=raw.map((e,i)=>({...e,id:'e'+i}));
  shuffle(S.events);
  document.getElementById('rn').textContent=(S.round+1)+'/'+S.rounds;
  updSc();renderGame();
}

function updSc(){document.getElementById('sc').textContent=S.roundsPlayed>0?Math.round(S.totalPct/S.roundsPlayed)+'%':'—';}
function pIds(){const s=new Set(Object.keys(S.midP));if(S.aLeft)s.add(S.aLeft.id);if(S.aRight)s.add(S.aRight.id);return s;}
function allP(){return pIds().size===5;}

function renderGame(){
  const placed=pIds();
  const pool=S.events.filter(e=>!placed.has(e.id));
  const tTag=activeLabel()!==t('curatedSets')?` <span style="color:#c8903a;font-weight:600">${activeLabel()}</span>`:'';
  const dis=(!allP()||S.submitted)?'disabled':'';
  const mobile=isMobile();

  const pH=pool.length
    ?pool.map(e=>`<div class="ecard${S.selectedCard===e.id?' selected-card':''}" onclick="tapCard('${e.id}')"${!mobile?` draggable="true" ondragstart="ds(event,'${e.id}','pool')" ondragend="de()"`:''} >${e.name}</div>`).join('')
    :`<span style="font-size:12px;color:#4a4020;font-family:-apple-system,sans-serif">${t('allPlaced')}</span>`;

  const lPlaceholder=`<span style="font-size:10px;color:#3a3010;font-family:-apple-system,sans-serif">${mobile?t('tapEarliest'):t('dropEarliest')}</span>`;
  const rPlaceholder=`<span style="font-size:10px;color:#3a3010;font-family:-apple-system,sans-serif">${mobile?t('tapRecent'):t('dropRecent')}</span>`;
  const lC=S.aLeft?`<div class="anchor-card" onclick="tapAnchor('left')"${!mobile?` draggable="true" ondragstart="ds(event,'${S.aLeft.id}','left')" ondragend="de()"`:''} >${S.aLeft.name}</div>`:lPlaceholder;
  const rC=S.aRight?`<div class="anchor-card" onclick="tapAnchor('right')"${!mobile?` draggable="true" ondragstart="ds(event,'${S.aRight.id}','right')" ondragend="de()"`:''} >${S.aRight.name}</div>`:rPlaceholder;

  let pins='';
  for(const [id,pct] of Object.entries(S.midP)){
    const evt=S.events.find(e=>e.id===id);if(!evt)continue;
    pins+=`<div class="pin" id="pin-${id}" style="left:${pct*100}%" draggable="true" ondragstart="ds(event,'${id}','bar')" ondragend="de()"><div class="pin-dot"></div><div class="pin-stem"></div><div class="pin-label">${evt.name}</div></div>`;
  }
  const ghost=`<div class="ghost-pin" id="ghost" style="left:-999px;display:none"><div class="ghost-dot"></div><div class="ghost-stem"></div><div class="ghost-label" id="ghost-lbl"></div></div>`;

  let mobilePins='';
  for(const [id,pct] of Object.entries(S.midP)){
    const evt=S.events.find(e=>e.id===id);if(!evt)continue;
    mobilePins+=`<div class="mobile-pin" style="left:${pct*100}%" onclick="tapMobilePin('${id}')"><div class="mobile-pin-dot"></div><div class="mobile-pin-lbl">${evt.name}</div></div>`;
  }
  const mobileHint=Object.keys(S.midP).length===0?`<div class="tl-mobile-hint">${t('tapEarliest')}</div>`:'';

  document.getElementById('body').innerHTML=`
    <p class="instr">Place one in <strong style="color:#ffffff">${t('earliest')}</strong> and one in <strong style="color:#ffffff">${t('mostRecent')}</strong> — figure out which is which. Place the other three on the bar.${tTag}</p>
    ${mobile?`<span class="tap-hint">${t('tapHint')}</span>`:''}
    <div class="plbl">${t('placeEvents')}</div>
    <div class="pool" id="pool">${pH}</div>
    <div class="tl-section"><div class="tl-outer">
      <div class="tl-anchors">
        <div class="anchor-zone" id="zl">
          <div class="anchor-label">${t('earliest')}</div>
          <div class="anchor-drop ${S.aLeft?'filled':''}" id="dl"
            onclick="tapAnchor('left')"
            ondragover="aOv(event,'left')" ondragleave="aLv('left')" ondrop="aDr(event,'left')">${lC}</div>
        </div>
        <div class="anchor-zone" id="zr">
          <div class="anchor-label">${t('mostRecent')}</div>
          <div class="anchor-drop ${S.aRight?'filled':''}" id="dr"
            onclick="tapAnchor('right')"
            ondragover="aOv(event,'right')" ondragleave="aLv('right')" ondrop="aDr(event,'right')">${rC}</div>
        </div>
      </div>
      <div class="tl-bar-row">
        <div class="tl-anchor-line"></div>
        <div class="tl-bar-wrap">
          <div class="tl-bar" id="tl-bar" ondragover="bOv(event)" ondragleave="bLv()" ondrop="bDr(event)" onmousemove="bMv(event)" onmouseleave="hG()">
            <div class="tl-track" id="tl-track"></div>
          </div>
          <div class="pins-layer" id="pl">${pins}${ghost}</div>
        </div>
        <div class="tl-anchor-line"></div>
      </div>
      ${mobile?`<div class="mobile-bar-instr">${t('barInstr')}</div>`:''}
      <div class="tl-mobile-bar" id="mobile-bar" onclick="tapBar(event)">
        <div class="tl-mobile-track"></div>
        ${mobileHint}${mobilePins}
      </div>
    </div></div>
    <div class="actions">
      <button class="btn btn-p" onclick="doSubmit()" ${dis}>${t('submitBtn')}</button>
      <button class="btn" onclick="clearAll()">${t('clearAll')}</button>
      <button class="btn" onclick="restartSetup()" style="margin-left:auto">${t('menuBtn')}</button>
    </div>
    <div id="res-area"></div>`;
}

function tapCard(id){
  if(S.submitted)return;
  if(S.midP[id]){delete S.midP[id];S.selectedCard=null;renderGame();return;}
  if(S.aLeft&&S.aLeft.id===id){S.aLeft=null;S.selectedCard=null;renderGame();return;}
  if(S.aRight&&S.aRight.id===id){S.aRight=null;S.selectedCard=null;renderGame();return;}
  S.selectedCard=S.selectedCard===id?null:id;renderGame();
}
function tapAnchor(side){
  if(S.submitted)return;
  if(!S.selectedCard){
    if(side==='left'&&S.aLeft){S.aLeft=null;renderGame();return;}
    if(side==='right'&&S.aRight){S.aRight=null;renderGame();return;}
    return;
  }
  const evt=S.events.find(x=>x.id===S.selectedCard);if(!evt)return;
  rtp(S.selectedCard,null);
  if(side==='left')S.aLeft=evt;else S.aRight=evt;
  S.selectedCard=null;renderGame();
}
function tapBar(e){
  if(S.submitted||!S.selectedCard)return;
  const bar=document.getElementById('mobile-bar');if(!bar)return;
  const r=bar.getBoundingClientRect();
  const pct=Math.max(0.02,Math.min(0.98,(e.clientX-r.left)/r.width));
  const evt=S.events.find(x=>x.id===S.selectedCard);if(!evt)return;
  rtp(S.selectedCard,'pool');
  S.midP[S.selectedCard]=pct;S.selectedCard=null;renderGame();
}
function tapMobilePin(id){if(S.submitted)return;delete S.midP[id];renderGame();}

function ds(e,id,from){S.dragId=id;S.dragFrom=from;const ev=S.events.find(x=>x.id===id);S.ghostName=ev?ev.name:'';}
function de(){S.dragId=null;S.dragFrom=null;S.ghostName='';hG();}
function aOv(e,s){e.preventDefault();document.getElementById('d'+s[0])?.classList.add('over');}
function aLv(s){document.getElementById('d'+s[0])?.classList.remove('over');}
function aDr(e,side){
  e.preventDefault();document.getElementById('d'+side[0])?.classList.remove('over');
  if(!S.dragId)return;
  const ev=S.events.find(x=>x.id===S.dragId);if(!ev)return;
  rtp(S.dragId,S.dragFrom);
  if(side==='left')S.aLeft=ev;else S.aRight=ev;renderGame();
}
function rtp(id,from){
  if(from==='bar')delete S.midP[id];
  else if(from==='left')S.aLeft=null;
  else if(from==='right')S.aRight=null;
}
function gPct(e){const b=document.getElementById('tl-bar');if(!b)return.5;const r=b.getBoundingClientRect();return Math.max(.01,Math.min(.99,(e.clientX-r.left)/r.width));}
function bOv(e){e.preventDefault();document.getElementById('tl-track')?.style.setProperty('background','#c8903a');document.getElementById('tl-bar')?.classList.add('active');uG(e);}
function bLv(){document.getElementById('tl-track')?.style.setProperty('background','#3a3010');document.getElementById('tl-bar')?.classList.remove('active');hG();}
function bMv(e){if(S.dragId)uG(e);}
function uG(e){const g=document.getElementById('ghost');const gl=document.getElementById('ghost-lbl');if(!g||!S.dragId)return;g.style.left=(gPct(e)*100)+'%';g.style.display='flex';if(gl)gl.textContent=S.ghostName;}
function hG(){const g=document.getElementById('ghost');if(g)g.style.display='none';}
function bDr(e){e.preventDefault();bLv();hG();if(!S.dragId)return;const ev=S.events.find(x=>x.id===S.dragId);if(!ev)return;rtp(S.dragId,S.dragFrom);S.midP[S.dragId]=gPct(e);renderGame();}
function clearAll(){S.midP={};S.aLeft=null;S.aRight=null;S.selectedCard=null;renderGame();}

function doSubmit(){
  if(!allP()||S.submitted)return;S.submitted=true;
  const sorted=[...S.events].sort((a,b)=>a.year-b.year);
  const minY=sorted[0].year,maxY=sorted[4].year,range=maxY-minY||1;
  const iP={};sorted.forEach(e=>{iP[e.id]=(e.year-minY)/range;});
  const eP={};
  if(S.aLeft)eP[S.aLeft.id]=0;
  if(S.aRight)eP[S.aRight.id]=1;
  for(const [id,pct] of Object.entries(S.midP))eP[id]=pct;
  const pOrd=[...S.events].sort((a,b)=>(eP[a.id]??0.5)-(eP[b.id]??0.5));
  let oc=0;pOrd.forEach((ev,i)=>{if(sorted[i]&&sorted[i].id===ev.id)oc++;});
  const oPct=Math.round((oc/5)*50);
  const tF=DIFFS[S.diff].tolerance/range;
  let sRaw=0;const sPer={};
  S.events.forEach(ev=>{const d=Math.abs((eP[ev.id]??0.5)-iP[ev.id]);const p=Math.max(0,1-d/tF);sPer[ev.id]=Math.round(p*10);sRaw+=p;});
  const sPct=Math.round((sRaw/5)*50);
  const tot=oPct+sPct;S.totalPct+=tot;S.roundsPlayed++;updSc();

  const ld=document.getElementById('dl');const rd=document.getElementById('dr');
  if(ld)ld.classList.add(S.aLeft&&sorted[0].id===S.aLeft.id?'anchor-ok':'anchor-bad');
  if(rd)rd.classList.add(S.aRight&&sorted[4].id===S.aRight.id?'anchor-ok':'anchor-bad');

  const layer=document.getElementById('pl');
  if(layer){
    const pos=sorted.map(e=>iP[e.id]);
    const sh=stemH(pos);
    sorted.forEach((ev,i)=>{
      const el=document.createElement('div');
      el.className='answer-pin';el.style.left=(iP[ev.id]*100)+'%';el.style.top='6px';
      el.innerHTML=`<div class="answer-dot"></div><div class="answer-stem" style="height:${sh[i]}px"></div><div class="answer-label">${yr(ev.year)}<br><span style="font-weight:400;font-size:9px">${ev.name}</span></div>`;
      layer.appendChild(el);
    });
  }

  const rows=sorted.map((ev,i)=>{
    const pR=pOrd.findIndex(x=>x.id===ev.id);const oOk=pR===i;const sp=sPer[ev.id];
    return `<div class="res-row"><div class="dot ${oOk?'ok':'bad'}">${oOk?'&#10003;':'&#10007;'}</div><div><span style="font-weight:600;color:#ffffff">${yr(ev.year)} &#8212; ${ev.name}</span><br><span style="color:#5a4e28;font-size:12px">${ev.desc}</span><br><span style="font-size:12px;color:#4a4020">${t('spacing')}: ${sp}/10</span></div></div>`;
  }).join('');

  const isLast=S.round+1>=S.rounds;
  const nBtn=isLast?`<button class="btn btn-p" onclick="showFinal()">${t('finalScore')}</button>`:`<button class="btn btn-p" onclick="nextRound()">${t('nextRound')}</button>`;
  document.getElementById('res-area').innerHTML=`
    <div class="res">
      <div class="score-big">${tot}%</div>
      <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${tot}%"></div></div>
      <div class="res-sub">${oPct}/50 ${t('orderSpacing')}</div>
      ${rows}
      <div style="margin-top:1rem;display:flex;gap:10px;flex-wrap:wrap">${nBtn}<button class="btn" onclick="restartSetup()">${t('menuBtn')}</button></div>
    </div>`;
}

function stemH(positions){
  const n=positions.length;const h=new Array(n).fill(20);
  for(let i=1;i<n;i++){if(positions[i]-positions[i-1]<0.1)h[i]=h[i-1]+38;}
  return h;
}
function nextRound(){S.round++;startRound();}

function showFinal(){
  const avg=Math.round(S.totalPct/S.roundsPlayed);
  document.getElementById('body').innerHTML=`
    <div class="res" style="text-align:center">
      <div style="font-size:13px;color:#5a4e28;margin-bottom:.5rem;font-family:-apple-system,sans-serif">${S.rounds} ${t('round')} · ${td(S.diff,'label')} · ${activeLabel()}</div>
      <div class="score-big">${avg}%</div>
      <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${avg}%"></div></div>
      <div style="font-size:22px;font-weight:700;color:#ffffff;margin:.75rem 0;font-family:Georgia,serif">${medal(avg)}</div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:1rem;flex-wrap:wrap">
        <button class="btn btn-p" onclick="beginGame()">${t('playAgain')}</button>
        <button class="btn" onclick="restartSetup()">${t('menuBtn')}</button>
      </div>
    </div>`;
  document.getElementById('sc').textContent=avg+'%';
  document.getElementById('rn').textContent=t('round');
}

function beginGame(){S.round=0;S.totalPct=0;S.roundsPlayed=0;S.phase='game';startRound();}
function restartSetup(){S.phase='setup';S.diff=null;S.rounds=5;S.generatedSets=[];renderSetup();}
renderSetup();
</script>
</body>
