<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audience | Talk to Historical Figures with AI | History Challenger</title>
<meta name="description" content="Seven historical figures, seven decisions. Convince Hannibal to march on Rome, Alexander to turn back from India, Justinian to hold Constantinople. AI-driven historical roleplay powered by Claude.">
<meta name="robots" content="index, follow">
<meta property="og:title" content="Audience | Talk to Historical Figures with AI">
<meta property="og:description" content="Eight messages. Fifteen minutes. Convince Hannibal, Alexander, Kublai, Justinian, or Napoleon, one audience at a time.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://historychallenger.com/dialogue.html">
<meta name="twitter:card" content="summary_large_image">
<link rel="canonical" href="https://historychallenger.com/dialogue">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Crimson Text',Georgia,serif;background:#f0e6cc;color:#1a150e;min-height:100vh;font-size:17px;line-height:1.6}
a{color:#8a6208;text-decoration:none}
.page{max-width:880px;margin:0 auto;padding:1.5rem 1rem 4rem}

/* PICKER */
.pick-header{margin:1rem 0 1.5rem}
.pick-eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#8a6208;margin-bottom:.4rem;font-family:'Crimson Text',serif}
.pick-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:400;color:#1a150e;line-height:1.1}
.pick-sub{font-size:15px;color:#5a3e1a;font-style:italic;margin-top:.4rem}
.pick-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem}
.pick-card{background:#faf4e4;border:1.5px solid #c8b888;border-radius:4px;padding:1.25rem 1.25rem 1rem;cursor:pointer;transition:all .15s;text-align:left;display:flex;flex-direction:column}
.pick-card:hover{border-color:#8a6208;box-shadow:0 3px 12px rgba(26,21,14,.08);transform:translateY(-2px)}
.pick-date{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#8a6208;margin-bottom:.4rem;font-family:'Crimson Text',serif}
.pick-figure{font-family:'Playfair Display',serif;font-size:1.35rem;color:#1a150e;line-height:1.15;margin-bottom:.4rem}
.pick-role{font-size:13px;color:#5a3e1a;font-style:italic;margin-bottom:.75rem;line-height:1.45}
.pick-goal{font-size:14px;color:#3a2e1e;line-height:1.5;flex:1;margin-bottom:.85rem}
.pick-cta{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:#8a6208;align-self:flex-start;border-top:1px solid #c8b888;padding-top:.5rem;width:100%}

/* INTRO */
.intro-card{background:#faf4e4;border:1.5px solid #c8b888;border-radius:6px;padding:2rem 1.75rem;margin-top:1rem}
.scenario-date{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#8a6208;margin-bottom:.5rem;font-family:'Crimson Text',serif}
.scenario-figure{font-family:'Playfair Display',serif;font-size:2rem;color:#1a150e;line-height:1.1;margin-bottom:.4rem}
.scenario-role{font-size:14px;color:#5a3e1a;font-style:italic;margin-bottom:1.25rem}
.scenario-setting{font-size:16px;color:#3a2e1e;line-height:1.7;margin-bottom:1.25rem;white-space:pre-wrap}
.scenario-goal{background:#f0e6cc;border-left:3px solid #8a6208;padding:.75rem 1rem;margin-bottom:1.25rem;font-size:15px;color:#1a150e}
.scenario-goal strong{color:#7a0a0a}
.rules{font-size:13px;color:#5a3e1a;line-height:1.7;margin-bottom:1.25rem}
.rules-row{display:flex;gap:.5rem;margin-bottom:.4rem}
.rules-icon{width:20px;text-align:center;flex-shrink:0}
.diff-row{display:flex;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap}
.diff-btn{flex:1;min-width:120px;background:#fff8e8;border:1.5px solid #c8b888;border-radius:4px;padding:.6rem .8rem;cursor:pointer;text-align:center;transition:all .15s;font-family:'Crimson Text',serif;position:relative}
.diff-btn:hover{border-color:#8a6208;background:#fdf4dc}
.diff-btn.sel{border-color:#8a6208;background:#f0e6cc;color:#1a150e}
.diff-btn.locked{opacity:.55;cursor:not-allowed;background:#f0e6cc}
.diff-btn.locked:hover{border-color:#c8b888;background:#f0e6cc}
.diff-btn .lock-mark{display:none;position:absolute;top:6px;right:8px;font-size:13px}
.diff-btn.locked .lock-mark{display:block}
.diff-name{font-family:'Playfair Display',serif;font-style:italic;font-size:15px;color:#1a150e;display:block;margin-bottom:.15rem}
.diff-hint{font-size:11px;color:#7a6040;line-height:1.4}
.intro-actions{display:flex;gap:.75rem;flex-wrap:wrap}
.start-btn{background:#8a6208;color:#f5edd8;border:1.5px solid #c8a028;border-radius:3px;padding:14px 28px;font-family:'Playfair Display',serif;font-style:italic;font-size:16px;cursor:pointer;flex:1;min-width:200px}
.start-btn:hover{background:#b88a18}
.start-btn:disabled{opacity:.5;cursor:not-allowed}
.back-btn{background:none;border:1.5px solid #c8b888;color:#5a3e1a;border-radius:3px;padding:10px 18px;font-family:'Playfair Display',serif;font-style:italic;font-size:14px;cursor:pointer}
.back-btn:hover{border-color:#8a6208;color:#1a150e}

/* CHAT */
.chat-top{display:flex;align-items:center;justify-content:space-between;background:#1a150e;color:#f5edd8;padding:.6rem 1rem;border-radius:6px 6px 0 0;border:1px solid #3a2a14;border-bottom:none;font-size:13px}
.chat-figure{font-family:'Playfair Display',serif;font-size:15px;color:#c8a028}
.chat-meta{display:flex;gap:1rem;align-items:center;font-family:-apple-system,sans-serif;font-size:12px;color:#bbb}
.chat-meta strong{color:#f5edd8}
.timer.warn strong{color:#cc8844}
.timer.crit strong{color:#cc4444}

.conv-bar-wrap{background:#0d0d0d;border-left:1px solid #3a2a14;border-right:1px solid #3a2a14;padding:.55rem 1rem .6rem;color:#bbb;font-family:-apple-system,sans-serif}
.conv-bar-top{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#888;margin-bottom:.3rem}
.conv-bar-top strong{color:#c8903a;font-family:Georgia,serif;font-size:13px}
.conv-bar{height:8px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:4px;overflow:hidden;position:relative}
.conv-fill{height:100%;background:linear-gradient(90deg,#cc4444 0%,#c8903a 50%,#5acc8a 100%);border-radius:3px;transition:width .6s ease;width:0%}
.conv-mark{position:absolute;top:-2px;width:2px;height:12px;background:#5acc8a88}

.chat-pane{background:#0d0d0d;border:1px solid #3a2a14;border-top:none;padding:1rem;min-height:340px;max-height:50vh;overflow-y:auto}
.bubble{margin-bottom:.85rem;max-width:85%;line-height:1.55;font-size:15px}
.bubble.figure{margin-right:auto}
.bubble.player{margin-left:auto;text-align:right}
.bubble-name{font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.2rem;font-family:'Crimson Text',serif}
.bubble.figure .bubble-name{color:#c8a028}
.bubble.player .bubble-name{color:#5acc8a}
.bubble-text{background:#1a1a1a;border:1px solid #2a2a2a;color:#ddd;border-radius:10px;padding:.7rem .9rem;display:inline-block;text-align:left;font-family:Georgia,serif;white-space:pre-wrap}
.bubble.figure .bubble-text{background:#1a1408;border-color:#3a2a14;color:#e8d8b8}
.bubble.player .bubble-text{background:#0d2a1a;border-color:#2a4a2a;color:#d8f0d8}
.thinking{color:#888;font-style:italic;font-size:14px;padding:.4rem .2rem}
.input-area{background:#0d0d0d;border:1px solid #3a2a14;border-top:none;border-radius:0 0 6px 6px;padding:.75rem}
.input-row{display:flex;gap:.5rem;align-items:flex-end}
.input-box{flex:1;background:#1a1a1a;border:1px solid #2a2a2a;color:#fff;border-radius:6px;padding:.6rem .8rem;font-family:'Crimson Text',Georgia,serif;font-size:15px;resize:vertical;min-height:60px;max-height:160px}
.input-box:focus{outline:none;border-color:#c8903a}
.input-box:disabled{opacity:.5}
.send-btn{background:#c8903a;color:#000;border:none;border-radius:6px;padding:0 1.2rem;font-weight:700;cursor:pointer;height:40px;align-self:flex-end;font-family:-apple-system,sans-serif;font-size:14px}
.send-btn:hover:not(:disabled){background:#b07828}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.input-foot{display:flex;justify-content:space-between;align-items:center;margin-top:.4rem;font-size:11px;color:#888;font-family:-apple-system,sans-serif}
.char-count.warn{color:#cc8844}
.end-btn{background:none;border:1px solid #5a2a2a;color:#cc6644;border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:-apple-system,sans-serif}
.end-btn:hover{background:#2a0a0a;color:#cc8844}

/* RESULT */
.result-card{background:#faf4e4;border:1.5px solid #c8b888;border-radius:6px;padding:2rem 1.75rem;margin-top:1rem;text-align:center}
.verdict-eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#8a6208;margin-bottom:.6rem}
.verdict-label{font-family:'Playfair Display',serif;font-size:2.25rem;line-height:1.1;margin-bottom:1rem}
.verdict-label.win{color:#3a7a3a}
.verdict-label.mid{color:#a07828}
.verdict-label.fail{color:#7a0a0a}
.verdict-text{font-size:16px;color:#3a2e1e;line-height:1.7;margin:0 auto 1.75rem;max-width:540px;font-style:italic}
.final-quote{background:#1a150e;color:#e8d8b8;border-left:3px solid #c8903a;padding:1rem 1.25rem;margin:0 auto 1.5rem;max-width:540px;text-align:left;font-family:Georgia,serif;font-style:italic;line-height:1.65;font-size:15px;border-radius:0 4px 4px 0}
.final-quote-attr{font-size:11px;color:#7a6040;letter-spacing:.12em;text-transform:uppercase;margin-top:.6rem;font-family:'Crimson Text',serif;font-style:normal}
.final-quote-attr strong{color:#c8903a;font-style:italic}
.result-actions{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}
.btn-secondary{background:none;border:1.5px solid #c8b888;color:#5a3e1a;border-radius:3px;padding:10px 20px;font-family:'Playfair Display',serif;font-style:italic;font-size:14px;cursor:pointer}
.btn-secondary:hover{border-color:#8a6208;color:#1a150e}

.error-box{background:#2a0808;color:#cc6644;border:1px solid #5a2a2a;border-radius:6px;padding:.8rem 1rem;margin-top:1rem;font-size:14px}

/* CLUES (notes) */
.clues-wrap{background:#0d0d0d;border-left:1px solid #3a2a14;border-right:1px solid #3a2a14;padding:.55rem 1rem .7rem;color:#bbb;font-family:-apple-system,sans-serif;border-bottom:1px dashed #2a2a2a}
.clues-head{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#888;margin-bottom:.5rem}
.clues-head strong{color:#c8a028;font-family:Georgia,serif;font-size:13px}
.clues-meta{font-size:11px;color:#888}
.clues-meta b{color:#c8a028}
.clues-list{display:flex;flex-direction:column;gap:.4rem}
.clue-card{background:#15110a;border:1px solid #3a2a14;border-radius:6px;padding:.5rem .7rem;font-family:'Crimson Text',Georgia,serif}
.clue-row{display:flex;justify-content:space-between;align-items:center;gap:.5rem}
.clue-title{color:#e8d8b8;font-size:14px;line-height:1.3;flex:1}
.clue-reveal{background:#3a2a14;color:#e8d8b8;border:1px solid #c8903a55;border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:-apple-system,sans-serif;letter-spacing:.04em;flex-shrink:0}
.clue-reveal:hover:not(:disabled){background:#5a3e1a;border-color:#c8903a}
.clue-reveal:disabled{opacity:.4;cursor:not-allowed}
.clue-card.revealed{background:#1a1408;border-color:#c8903a55}
.clue-body{color:#d8c8a8;font-size:13.5px;line-height:1.55;margin-top:.5rem;padding-top:.5rem;border-top:1px dashed #3a2a14}
.clues-empty{color:#7a6040;font-size:12px;font-style:italic}

/* LOADOUT picker */
.loadout-card{background:#faf4e4;border:1.5px solid #c8b888;border-radius:6px;padding:1.5rem 1.5rem 1.25rem;margin-top:1rem}
.loadout-head{font-family:'Playfair Display',serif;font-size:1.5rem;color:#1a150e;line-height:1.15;margin-bottom:.4rem}
.loadout-sub{font-size:14px;color:#5a3e1a;font-style:italic;margin-bottom:1.25rem}
.loadout-counter{font-size:13px;color:#8a6208;font-family:-apple-system,sans-serif;letter-spacing:.04em;font-weight:700;margin-bottom:.75rem}
.loadout-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.6rem;margin-bottom:1.25rem}
.loadout-item{background:#fff8e8;border:1.5px solid #c8b888;border-radius:4px;padding:.7rem .85rem;cursor:pointer;transition:all .15s;font-family:'Crimson Text',serif;text-align:left}
.loadout-item:hover{border-color:#8a6208;background:#fdf4dc}
.loadout-item.sel{border-color:#8a6208;background:#f0e6cc;box-shadow:inset 0 0 0 1px #8a6208}
.loadout-item.disabled{opacity:.45;cursor:not-allowed}
.loadout-name{font-family:'Playfair Display',serif;font-style:italic;font-size:14.5px;color:#1a150e;display:block;margin-bottom:.25rem;line-height:1.25}
.loadout-hint{font-size:12px;color:#5a3e1a;line-height:1.4}
.loadout-item.sel .loadout-hint{color:#3a2e1e}

/* EVIDENCE in-chat panel */
.evi-wrap{background:#0d0d0d;border-left:1px solid #3a2a14;border-right:1px solid #3a2a14;padding:.55rem 1rem .7rem;color:#bbb;font-family:-apple-system,sans-serif;border-bottom:1px dashed #2a2a2a}
.evi-head{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#888;margin-bottom:.5rem}
.evi-head strong{color:#c8a028;font-family:Georgia,serif;font-size:13px}
.evi-meta{font-size:11px;color:#888}
.evi-meta b{color:#c8a028}
.evi-list{display:flex;flex-direction:column;gap:.4rem}
.evi-card{background:#15110a;border:1px solid #3a2a14;border-radius:6px;padding:.5rem .7rem;font-family:'Crimson Text',Georgia,serif;display:flex;justify-content:space-between;align-items:center;gap:.5rem}
.evi-name{color:#e8d8b8;font-size:14px;line-height:1.3;flex:1;font-style:italic;font-weight:700}
.evi-used{color:#7a6040;font-size:11px;font-style:italic;font-family:-apple-system,sans-serif}
.evi-deploy{background:#3a2a14;color:#e8d8b8;border:1px solid #c8903a55;border-radius:4px;padding:3px 12px;font-size:11px;cursor:pointer;font-family:-apple-system,sans-serif;letter-spacing:.04em;flex-shrink:0;font-weight:700}
.evi-deploy:hover:not(:disabled){background:#5a3e1a;border-color:#c8903a}
.evi-deploy:disabled{opacity:.4;cursor:not-allowed}
.evi-deploy.armed{background:#c8903a;color:#1a150e;border-color:#e0a84a}
.evi-armed-hint{font-size:11px;color:#c8903a;text-align:center;padding:.4rem;font-family:-apple-system,sans-serif;font-style:italic}

/* RESULT: XP block */
.xp-block{background:#1a150e;color:#e8d8b8;border:1px solid #3a2a14;border-radius:6px;padding:1rem 1.25rem;margin:0 auto 1.5rem;max-width:540px;font-family:-apple-system,sans-serif;text-align:left}
.xp-row{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;color:#bbb;padding:3px 0}
.xp-row.total{border-top:1px solid #3a2a14;margin-top:.4rem;padding-top:.6rem;font-weight:700;color:#c8903a;font-size:15px}
.xp-row strong{color:#e8d8b8;font-family:Georgia,serif}
.xp-row.total strong{color:#c8a028;font-size:18px}
.xp-row.penalty strong{color:#cc8844}

@media(max-width:600px){
  .chat-pane{min-height:280px;max-height:45vh}
  .scenario-figure{font-size:1.6rem}
  .verdict-label{font-size:1.8rem}
  .diff-btn{min-width:100%}
  .pick-grid{grid-template-columns:1fr}
}
</style>

<body>

<div class="page" id="page"></div>

<script>
const WORKER = 'https://histroychallenger-api.maletethan.workers.dev';

let S = {
  phase:'pick', // pick | loading | intro | chat | judging | result | error
  scenarios:[],
  scenarioId:null,
  scenario:null,
  difficulty:'master',
  sessionId:null,
  messages:[],
  turn:0,
  maxTurns:8,
  charLimit:300,
  timeLimit:900,
  startedAt:null,
  timerInterval:null,
  awaitingReply:false,
  conviction:25,
  winAt:90,
  loseAt:0,
  result:null,
  errorMsg:null,
  endReason:null,
  clues:[],          // [{id,title,body?}], body present after reveal
  cluesAllowed:0,
  cluesUsed:0,
  revealingIdx:null, // idx currently mid-flight to prevent double click
  // Evidence loadout system (currently Hannibal only)
  evidencePool:[],   // [{id,name,hint}] available to pick from on intro
  evidenceSlots:0,   // how many to pick (0 = scenario has none)
  evidenceLoadout:[],// player's chosen 3 [{id,name,hint,used?}]
  evidencePicked:[], // [id,id,id] picks during loadout phase
  evidenceArmed:null // id armed for next message, or null
};

function getToken(){return localStorage.getItem('hc_token');}

function render(){
  const p=document.getElementById('page');
  if(S.phase==='pick')    p.innerHTML=renderPick();
  if(S.phase==='loading') p.innerHTML=renderLoading('Preparing the audience…');
  if(S.phase==='intro')   p.innerHTML=renderIntro();
  if(S.phase==='loadout') p.innerHTML=renderLoadout();
  if(S.phase==='chat')    p.innerHTML=renderChat();
  if(S.phase==='judging') p.innerHTML=renderLoading(`${S.scenario?.figure_short||'They'} weigh${S.scenario?.figure_short?'':'s'} your words…`);
  if(S.phase==='result')  p.innerHTML=renderResult();
  if(S.phase==='error')   p.innerHTML=renderError();
  if(S.phase==='chat'){ scrollChat(); attachInputHandlers(); startTimer(); }
}

function renderPick(){
  if (!S.scenarios.length) {
    return `<div class="intro-card" style="text-align:center"><div style="color:#5a3e1a;font-style:italic;font-size:15px;padding:2rem">Loading audiences…</div></div>`;
  }
  const cards = S.scenarios.map(s => `
    <div class="pick-card" onclick="pickScenario('${s.id}')">
      <div class="pick-date">${escapeHtml(s.date_label)}</div>
      <div class="pick-figure">${escapeHtml(s.figure)}</div>
      <div class="pick-role">${escapeHtml(s.player_role)}</div>
      <div class="pick-goal">${escapeHtml(s.goal)}</div>
      <div class="pick-cta">Proceed to the audience →</div>
    </div>`).join('');
  return `<div class="pick-header">
    <div class="pick-eyebrow">Audience</div>
    <h1 class="pick-title">Choose your audience</h1>
    <p class="pick-sub">Seven historical figures. Seven decisions. Convince them, or be dismissed.</p>
  </div>
  <div class="pick-grid">${cards}</div>`;
}

function renderLoading(msg){
  return `<div class="intro-card" style="text-align:center"><div style="color:#5a3e1a;font-style:italic;font-size:15px;padding:2rem">${escapeHtml(msg)}</div></div>`;
}

function renderIntro(){
  const sc = S.scenario;
  if (!sc) return renderLoading('Preparing the audience…');

  const diffs = (sc.difficulty_presets ? Object.entries(sc.difficulty_presets) : []).map(([k,v]) => {
    const locked = window.hcIsLocked && window.hcIsLocked('dialogue', k);
    const reason = locked && window.hcLockedReason ? window.hcLockedReason('dialogue', k) : '';
    const cls = ['diff-btn'];
    if (S.difficulty===k && !locked) cls.push('sel');
    if (locked) cls.push('locked');
    const click = locked ? `onclick="alert('Locked. Need ${escapeHtml(reason)} to unlock ${escapeHtml(v.label)}.')"` : `onclick="setDifficulty('${k}')"`;
    return `<div class="${cls.join(' ')}" ${click}>
      <span class="lock-mark">🔒</span>
      <span class="diff-name">${escapeHtml(v.label)}</span>
      <span class="diff-hint">${locked ? 'Locked, '+escapeHtml(reason) : escapeHtml(v.hint)}</span>
    </div>`;
  }).join('');

  return `<div class="intro-card">
    <div class="scenario-date">${escapeHtml(sc.date_label)}</div>
    <h1 class="scenario-figure">An Audience with ${escapeHtml(sc.figure)}</h1>
    <div class="scenario-role">You are ${escapeHtml(sc.player_role)}</div>
    <div class="scenario-setting">${escapeHtml(sc.setting)}</div>
    <div class="scenario-goal"><strong>Your goal:</strong> ${escapeHtml(sc.goal)}</div>
    <div class="rules">
      <div class="rules-row"><span class="rules-icon">⏱</span> ${Math.round((sc.time_limit_seconds||900)/60)} minutes total</div>
      <div class="rules-row"><span class="rules-icon">💬</span> Up to ${sc.max_turns||8} exchanges, but the audience can end sooner</div>
      <div class="rules-row"><span class="rules-icon">✍</span> ${sc.char_limit||300} characters per message</div>
      <div class="rules-row"><span class="rules-icon">📈</span> A conviction bar tracks how close you are. Fill it to win, empty it and you're dismissed.</div>
    </div>
    <div class="diff-row">${diffs}</div>
    <div class="intro-actions">
      <button class="back-btn" onclick="goPicker()">← Back</button>
      <button class="start-btn" onclick="proceedFromIntro()">Proceed to the audience →</button>
    </div>
  </div>`;
}

function renderChat(){
  if (window.hcSetReportContext && S.scenario){
    const lastMsg = S.messages[S.messages.length - 1];
    window.hcSetReportContext({
      game_type: 'dialogue',
      item_type: 'turn',
      item_id: (S.scenario.id || 'scenario') + '-turn-' + S.turn,
      snapshot_text: S.scenario.figure_short + ' · turn ' + S.turn + (lastMsg ? ' · ' + (lastMsg.role || '') : ''),
      snapshot: { scenario_id: S.scenario.id, figure: S.scenario.figure, turn: S.turn, conviction: S.conviction, last_message: lastMsg },
    });
  }
  const remaining = Math.max(0, S.timeLimit - Math.floor((Date.now() - S.startedAt) / 1000));
  const mins = Math.floor(remaining/60), secs = remaining%60;
  let timerCls = '';
  if (remaining < 30) timerCls = 'crit';
  else if (remaining < 90) timerCls = 'warn';

  const bubbles = S.messages.map(m =>
    `<div class="bubble ${m.role}">
      <div class="bubble-name">${m.role==='figure'?escapeHtml(S.scenario.figure_short):'You'}</div>
      <div class="bubble-text">${escapeHtml(m.content)}</div>
    </div>`
  ).join('') + (S.awaitingReply ? `<div class="thinking">${escapeHtml(S.scenario.figure_short)} considers…</div>` : '');

  const turnsLeft = S.maxTurns - S.turn;
  const convPct = Math.max(0, Math.min(100, S.conviction));
  const winPct  = Math.max(0, Math.min(100, S.winAt));

  return `<div class="chat-top">
    <div class="chat-figure">${escapeHtml(S.scenario.figure)}</div>
    <div class="chat-meta">
      <div>Turn <strong>${S.turn}</strong> / ${S.maxTurns}</div>
      <div class="timer ${timerCls}"><strong id="timer">${mins}:${String(secs).padStart(2,'0')}</strong></div>
    </div>
  </div>
  <div class="conv-bar-wrap">
    <div class="conv-bar-top"><span>${escapeHtml(S.scenario.figure_short)}'s resolve</span><strong>${convPct} / ${winPct}</strong></div>
    <div class="conv-bar"><div class="conv-fill" style="width:${convPct}%"></div><div class="conv-mark" style="left:${winPct}%"></div></div>
  </div>
  ${renderCluesPanel()}
  ${renderEvidencePanel()}
  <div class="chat-pane" id="chat-pane">${bubbles}</div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="msg-input" class="input-box" placeholder="${turnsLeft>0?'Speak your case…':'No turns remaining. End the audience.'}" maxlength="${S.charLimit}" ${turnsLeft<=0||S.awaitingReply?'disabled':''}></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" ${turnsLeft<=0||S.awaitingReply?'disabled':''}>Send</button>
    </div>
    <div class="input-foot">
      <span><span class="char-count" id="char-count">0</span> / ${S.charLimit}</span>
      <button class="end-btn" onclick="endAudience()">End audience</button>
    </div>
  </div>`;
}

function renderLoadout(){
  if (!S.evidencePool.length) return renderLoading('Preparing the audience…');
  const slots = S.evidenceSlots || 3;
  const picked = S.evidencePicked || [];
  const cards = S.evidencePool.map(e => {
    const isSel = picked.includes(e.id);
    const disabled = !isSel && picked.length >= slots;
    return `<div class="loadout-item ${isSel?'sel':''} ${disabled?'disabled':''}" onclick="toggleLoadoutPick('${e.id}')">
      <span class="loadout-name">${escapeHtml(e.name)}</span>
      <span class="loadout-hint">${escapeHtml(e.hint||'')}</span>
    </div>`;
  }).join('');
  return `<div class="loadout-card">
    <div class="loadout-head">Choose your evidence</div>
    <p class="loadout-sub">You may carry three artefacts into the tent. Each may be produced once during the audience. ${escapeHtml(S.scenario?.figure_short||'')} will react to what you place before him &mdash; choose what you think will move <em>this</em> figure.</p>
    <div class="loadout-counter">${picked.length} / ${slots} chosen</div>
    <div class="loadout-grid">${cards}</div>
    <div class="intro-actions">
      <button class="back-btn" onclick="S.phase='intro';render()">← Back</button>
      <button class="start-btn" ${picked.length===slots?'':'disabled'} onclick="confirmLoadout()">Proceed to the audience →</button>
    </div>
  </div>`;
}

function toggleLoadoutPick(id){
  const idx = S.evidencePicked.indexOf(id);
  if (idx >= 0) { S.evidencePicked.splice(idx,1); render(); return; }
  if (S.evidencePicked.length >= S.evidenceSlots) return;
  S.evidencePicked.push(id);
  render();
}

async function proceedFromIntro(){
  // If the scenario has an evidence pool, fetch it and route to loadout picker.
  S.phase = 'loading'; render();
  try {
    const res = await fetch(WORKER, {method:'POST',headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'get_dialogue_evidence', scenario_id: S.scenarioId })});
    const d = await res.json();
    if (d.error) { S.errorMsg=d.error; S.phase='error'; render(); return; }
    if (Array.isArray(d.evidence) && d.evidence.length > 0) {
      S.evidencePool = d.evidence;
      S.evidenceSlots = d.slots || 3;
      S.evidencePicked = [];
      S.phase = 'loadout'; render();
    } else {
      // No evidence for this scenario: straight to chat
      startSession();
    }
  } catch(e) {
    S.errorMsg = 'Network error: '+e.message; S.phase='error'; render();
  }
}

function confirmLoadout(){
  if (S.evidencePicked.length !== S.evidenceSlots) return;
  startSession();
}

function renderCluesPanel(){
  if (!S.clues.length || !S.cluesAllowed) return '';
  const left = Math.max(0, S.cluesAllowed - S.cluesUsed);
  const cards = S.clues.map((c, i) => {
    const revealed = !!c.body;
    const busy = S.revealingIdx === i;
    const disabled = revealed || left <= 0 || busy || S.awaitingReply;
    const btnLabel = revealed ? 'Revealed' : (busy ? '…' : (left>0 ? `Reveal (−25 XP)` : 'No notes left'));
    return `<div class="clue-card ${revealed?'revealed':''}">
      <div class="clue-row">
        <div class="clue-title">${escapeHtml(c.title)}</div>
        <button class="clue-reveal" onclick="revealClue(${i})" ${disabled?'disabled':''}>${btnLabel}</button>
      </div>
      ${revealed ? `<div class="clue-body">${escapeHtml(c.body)}</div>` : ''}
    </div>`;
  }).join('');
  return `<div class="clues-wrap">
    <div class="clues-head">
      <strong>Your notes</strong>
      <span class="clues-meta">Reveals used <b>${S.cluesUsed}</b> / ${S.cluesAllowed} · each costs 25 XP</span>
    </div>
    <div class="clues-list">${cards}</div>
  </div>`;
}

function renderEvidencePanel(){
  if (!S.evidenceLoadout || !S.evidenceLoadout.length) return '';
  const used = S.evidenceLoadout.filter(e => e.used).length;
  const total = S.evidenceLoadout.length;
  const cards = S.evidenceLoadout.map(e => {
    if (e.used) {
      return `<div class="evi-card" style="opacity:.55">
        <span class="evi-name">${escapeHtml(e.name)}</span>
        <span class="evi-used">deployed</span>
      </div>`;
    }
    const armed = S.evidenceArmed === e.id;
    const disabled = S.awaitingReply || (S.maxTurns - S.turn) <= 0;
    return `<div class="evi-card">
      <span class="evi-name">${escapeHtml(e.name)}</span>
      <button class="evi-deploy ${armed?'armed':''}" onclick="armEvidence('${e.id}')" ${disabled?'disabled':''}>${armed?'Armed':'Deploy with next message'}</button>
    </div>`;
  }).join('');
  const armedHint = S.evidenceArmed
    ? `<div class="evi-armed-hint">Your next message will produce: <strong>${escapeHtml((S.evidenceLoadout.find(x=>x.id===S.evidenceArmed)||{}).name||'')}</strong> &middot; <a href="#" onclick="armEvidence(null);return false" style="color:#cc6644">cancel</a></div>`
    : '';
  return `<div class="evi-wrap">
    <div class="evi-head">
      <strong>Your evidence</strong>
      <span class="evi-meta">Deployed <b>${used}</b> / ${total} &middot; deploy attaches the artefact to your next message</span>
    </div>
    <div class="evi-list">${cards}</div>
    ${armedHint}
  </div>`;
}

function armEvidence(id){
  if (S.evidenceArmed === id || id === null) { S.evidenceArmed = null; render(); return; }
  const item = (S.evidenceLoadout||[]).find(e => e.id === id);
  if (!item || item.used) return;
  if (S.awaitingReply) return;
  S.evidenceArmed = id;
  render();
}

async function revealClue(idx){
  if (S.revealingIdx !== null) return;
  if (S.cluesUsed >= S.cluesAllowed) return;
  if (S.clues[idx]?.body) return;
  S.revealingIdx = idx; render();
  try {
    const res = await fetch(WORKER, {method:'POST',headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'reveal_dialogue_clue', session_id: S.sessionId, clue_idx: idx })});
    const d = await res.json();
    if (d.error) { alert(d.error); S.revealingIdx = null; render(); return; }
    S.clues[idx].body = d.clue.body;
    S.cluesUsed = d.clues_used;
  } catch(e) {
    alert('Network error revealing clue.');
  } finally {
    S.revealingIdx = null;
    render();
  }
}

function renderResult(){
  const r = S.result;
  let cls='mid', label=r.verdict;
  if (r.verdict==='Convinced') cls='win';
  else if (r.verdict==='Firm') cls='fail';

  const finalReply = r.final_reply || '';
  const figureName = S.scenario?.figure_short || 'They';
  const finalQuoteHtml = finalReply
    ? `<div class="final-quote">"${escapeHtml(finalReply)}"<div class="final-quote-attr"><strong>${escapeHtml(figureName)}</strong>, the last words of the audience</div></div>`
    : '';

  const xp = (r.xp_earned != null) ? r.xp_earned : null;
  const cluesUsed = r.clues_used != null ? r.clues_used : S.cluesUsed;
  const diffLabel = ({easy:'Apprentice',medium:'Strategist',hard:'Imperator'})[r.difficulty || S.difficulty] || S.difficulty;
  const baseByVerdict = { Convinced: 200, Wavered: 75, Firm: 25 };
  const diffMultMap = { easy: 1.0, medium: 1.5, hard: 2.0 };
  const diffMult = diffMultMap[r.difficulty || S.difficulty] || 1.0;
  const baseXp = (baseByVerdict[r.verdict] || 0) * diffMult;
  const cluePenalty = cluesUsed * 25;
  const xpHtml = xp == null ? '' : `<div class="xp-block">
    <div class="xp-row"><span>Verdict bonus (${escapeHtml(r.verdict||'')} × ${diffLabel})</span><strong>+${Math.round(baseXp)}</strong></div>
    ${cluesUsed>0 ? `<div class="xp-row penalty"><span>Clues revealed (${cluesUsed} × 25)</span><strong>−${cluePenalty}</strong></div>` : ''}
    <div class="xp-row total"><span>XP earned</span><strong>+${xp}</strong></div>
  </div>`;
  const evidence = (r.evidence_loadout || S.evidenceLoadout || []);
  const evidenceHtml = evidence.length ? `<div class="xp-block" style="margin-top:.75rem">
    <div class="xp-row" style="border-bottom:1px solid #3a2a14;padding-bottom:.4rem;margin-bottom:.4rem">
      <span style="font-weight:700;color:#e8d8b8">Evidence carried into the tent</span>
      <strong>${evidence.filter(e=>e.used).length} / ${evidence.length} deployed</strong>
    </div>
    ${evidence.map(e => `<div class="xp-row" style="font-style:italic">
      <span>${escapeHtml(e.name)}</span>
      <strong style="color:${e.used?'#5acc8a':'#7a6040'}">${e.used?'deployed':'kept in reserve'}</strong>
    </div>`).join('')}
  </div>` : '';

  return `<div class="result-card">
    <div class="verdict-eyebrow">${escapeHtml(figureName)}'s verdict</div>
    <h1 class="verdict-label ${cls}">${escapeHtml(label)}</h1>
    ${finalQuoteHtml}
    <p class="verdict-text">${escapeHtml(r.verdict_text||'')}</p>
    ${xpHtml}
    ${evidenceHtml}
    <div class="result-actions">
      <button class="btn-secondary" onclick="resetIntro()">Try again</button>
      <button class="btn-secondary" onclick="goPicker()">Another audience</button>
      <a class="btn-secondary" href="/">Home</a>
    </div>
  </div>`;
}

function renderError(){
  return `<div class="error-box">${escapeHtml(S.errorMsg||'Something went wrong.')}</div>
    <div style="text-align:center;margin-top:1rem"><button class="btn-secondary" onclick="goPicker()">Back</button></div>`;
}

function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function scrollChat(){
  const el=document.getElementById('chat-pane');
  if(el) el.scrollTop = el.scrollHeight;
}

function attachInputHandlers(){
  const input=document.getElementById('msg-input');
  const cnt=document.getElementById('char-count');
  if(!input||!cnt) return;
  input.focus();
  input.addEventListener('input', ()=>{
    cnt.textContent = input.value.length;
    cnt.className = 'char-count' + (input.value.length > S.charLimit*0.9 ? ' warn' : '');
  });
  input.addEventListener('keydown', e=>{
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      sendMessage();
    }
  });
}

function startTimer(){
  if (S.timerInterval) return;
  S.timerInterval = setInterval(()=>{
    if (S.phase!=='chat') { clearInterval(S.timerInterval); S.timerInterval=null; return; }
    const remaining = Math.max(0, S.timeLimit - Math.floor((Date.now() - S.startedAt) / 1000));
    const el = document.getElementById('timer');
    if (el) {
      const m=Math.floor(remaining/60), s=remaining%60;
      el.textContent = m+':'+String(s).padStart(2,'0');
      const wrap = el.parentElement;
      wrap.className = 'timer' + (remaining < 30 ? ' crit' : remaining < 90 ? ' warn' : '');
    }
    if (remaining <= 0) {
      clearInterval(S.timerInterval); S.timerInterval=null;
      endAudience();
    }
  }, 1000);
}

function setDifficulty(k){ S.difficulty = k; render(); }

async function loadScenarios(){
  try {
    const res = await fetch(WORKER, {method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'list_dialogue_scenarios'})});
    const d = await res.json();
    if (d.error) { S.errorMsg = d.error; S.phase='error'; render(); return; }
    S.scenarios = d.scenarios || [];
    render();
  } catch(e) {
    S.errorMsg = 'Network error: '+e.message;
    S.phase='error';
    render();
  }
}

async function pickScenario(id){
  S.scenarioId = id;
  S.phase = 'loading';
  render();
  try {
    const res = await fetch(WORKER, {method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'get_dialogue_scenario',scenario_id:id})});
    const d = await res.json();
    if (d.error) { S.errorMsg = d.error; S.phase='error'; render(); return; }
    S.scenario = d.scenario;
    S.charLimit = d.scenario.char_limit || 300;
    S.timeLimit = d.scenario.time_limit_seconds || 900;
    S.maxTurns = d.scenario.max_turns || 8;
    S.phase = 'intro';
    render();
  } catch(e) {
    S.errorMsg = 'Network error: '+e.message;
    S.phase='error';
    render();
  }
}

function goPicker(){
  if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval=null; }
  S.phase = 'pick';
  S.scenarioId = null;
  S.scenario = null;
  S.sessionId = null;
  S.messages = [];
  S.turn = 0;
  S.conviction = 25;
  S.result = null;
  S.endReason = null;
  S.awaitingReply = false;
  S.clues = []; S.cluesAllowed = 0; S.cluesUsed = 0; S.revealingIdx = null;
  S.evidencePool = []; S.evidenceSlots = 0; S.evidenceLoadout = []; S.evidencePicked = []; S.evidenceArmed = null;
  render();
}

async function startSession(){
  S.phase='loading'; render();
  try{
    const payload = { action:'start_dialogue', token:getToken(), scenario_id:S.scenarioId, difficulty:S.difficulty };
    if (S.evidencePicked && S.evidencePicked.length === S.evidenceSlots && S.evidenceSlots > 0) {
      payload.evidence_loadout = S.evidencePicked.slice();
    }
    const res = await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)});
    const d = await res.json();
    if (d.locked) {
      const reason = window.hcLockedReason ? window.hcLockedReason('dialogue', S.difficulty) : '';
      alert('That difficulty is locked. ' + (reason ? 'Progress: '+reason : 'Earn more mastery first.'));
      S.phase = 'intro'; render(); return;
    }
    if (d.error) { S.errorMsg=d.error; S.phase='error'; render(); return; }
    S.scenario = d.scenario;
    S.sessionId = d.session_id;
    S.maxTurns = d.scenario.max_turns;
    S.charLimit = d.scenario.char_limit;
    S.timeLimit = d.scenario.time_limit_seconds;
    S.conviction = d.conviction;
    S.winAt = d.win_at;
    S.loseAt = d.lose_at;
    S.clues = (d.clues || []).map(c => ({ id:c.id, title:c.title }));
    S.cluesAllowed = d.clues_allowed || 0;
    S.cluesUsed = d.clues_used || 0;
    S.revealingIdx = null;
    S.evidenceLoadout = (d.evidence_loadout || []).map(e => ({ id:e.id, name:e.name, hint:e.hint, used:false }));
    S.evidenceArmed = null;
    S.messages = [{ role:'figure', content: d.opening }];
    S.turn = 0;
    S.startedAt = Date.now();
    S.phase = 'chat'; render();
  } catch(e){ S.errorMsg='Network error: '+e.message; S.phase='error'; render(); }
}

async function sendMessage(){
  if (S.awaitingReply) return;
  const input = document.getElementById('msg-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;

  // Optimistically render the player's message (with deploy line if armed)
  let armedItem = null;
  if (S.evidenceArmed) {
    armedItem = (S.evidenceLoadout||[]).find(e => e.id === S.evidenceArmed && !e.used);
  }
  const optimisticContent = armedItem
    ? `*${armedItem.name}*\n\n${text}`
    : text;
  S.messages.push({ role:'player', content: optimisticContent });
  S.awaitingReply = true;
  const armedSnapshot = S.evidenceArmed;
  render();

  try{
    const payload = { action:'dialogue_turn', session_id:S.sessionId, message:text };
    if (armedSnapshot) payload.evidence_id = armedSnapshot;
    const res = await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)});
    const d = await res.json();
    if (d.error) {
      // Roll back the optimistic message and the arm
      S.messages.pop();
      S.awaitingReply = false;
      alert(d.error);
      render();
      return;
    }
    // Replace the optimistic message with the canonical composed turn from the server
    if (d.player_turn && S.messages.length) {
      S.messages[S.messages.length - 1] = { role:'player', content: d.player_turn };
    }
    S.turn = d.turn;
    S.conviction = d.conviction;
    S.endReason = d.end_reason;
    S.awaitingReply = false;
    // Mark the evidence as used (if any was deployed)
    if (d.deployed_evidence) {
      const item = (S.evidenceLoadout||[]).find(e => e.id === d.deployed_evidence.id);
      if (item) item.used = true;
    }
    S.evidenceArmed = null;

    if (d.end_reason) {
      endAudience();
      return;
    }

    S.messages.push({ role:'figure', content: d.reply });
    render();
  } catch(e){
    // Roll back optimistic message
    S.messages.pop();
    S.awaitingReply = false;
    alert('Network error. Try again.');
    render();
  }
}

async function endAudience(){
  if (S.phase==='judging' || S.phase==='result') return;
  if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval=null; }
  S.phase='judging'; render();
  try{
    const res = await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'judge_dialogue',session_id:S.sessionId})});
    const d = await res.json();
    if (d.error) { S.errorMsg='Judge error: '+d.error; S.phase='error'; render(); return; }
    S.result = d;
    S.phase='result'; render();
    if (window.hcShowAuthNudge) window.hcShowAuthNudge({ xp: d.xp_earned, mastery: d.mastery_earned });
  } catch(e){
    S.errorMsg='Network error during judging.';
    S.phase='error'; render();
  }
}

function resetIntro(){
  if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval=null; }
  // Restart with same scenario
  S.sessionId = null;
  S.messages = [];
  S.turn = 0;
  S.conviction = 25;
  S.result = null;
  S.endReason = null;
  S.awaitingReply = false;
  S.clues = []; S.cluesAllowed = 0; S.cluesUsed = 0; S.revealingIdx = null;
  S.evidenceLoadout = []; S.evidencePicked = []; S.evidenceArmed = null;
  // keep evidencePool + evidenceSlots so user can pick again without refetch
  S.phase = (S.evidencePool && S.evidencePool.length) ? 'loadout' : 'intro';
  render();
}

// Boot: check for ?scenario=... URL param to skip the picker
(function init(){
  const params = new URLSearchParams(window.location.search);
  const scenario = params.get('scenario');
  if (scenario) {
    pickScenario(scenario);
  } else {
    loadScenarios();
  }
  // Re-render when progression loads so locked-state on diff buttons updates.
  window.addEventListener('hc-progression-loaded', () => { if (S.phase === 'intro') render(); });
})();
</script>

</body>
