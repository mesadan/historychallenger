<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signing you in, History Challenger</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'EB Garamond',Georgia,serif;background:#f0e6cc;color:#1a150e;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{max-width:440px;width:100%;background:#faf4e4;border:1.5px solid #c8b888;border-radius:6px;padding:2.5rem 2rem;text-align:center}
.eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#8a6208;margin-bottom:.85rem;font-family:'EB Garamond',serif}
.title{font-family:'Cinzel',Georgia,serif;font-size:1.6rem;font-weight:400;color:#1a150e;line-height:1.2;margin-bottom:.6rem}
.sub{font-size:15px;color:#5a3e1a;line-height:1.65;font-style:italic;margin-bottom:1.5rem}
.spinner{width:34px;height:34px;border:3px solid #e8dfc0;border-top-color:#8a6208;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1.25rem}
@keyframes spin{to{transform:rotate(360deg)}}
.btn{display:inline-block;background:#8a6208;color:#f5edd8;text-decoration:none;border:1.5px solid #c8a028;border-radius:3px;padding:11px 22px;font-family:'Cinzel',Georgia,serif;font-style:italic;font-size:15px;cursor:pointer}
.btn:hover{background:#b88a18}
.err{color:#7a0a0a}
.ok{color:#3a7a3a}
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="eyebrow">History Challenger</div>
    <div class="spinner" id="spinner"></div>
    <div class="title" id="title">Signing you in...</div>
    <div class="sub" id="sub">Verifying your link.</div>
    <div id="actions"></div>
  </div>

<script>
const WORKER = 'https://histroychallenger-api.maletethan.workers.dev';

(async function(){
  const params = new URLSearchParams(location.search);
  const token = params.get('token');
  const titleEl   = document.getElementById('title');
  const subEl     = document.getElementById('sub');
  const spinnerEl = document.getElementById('spinner');
  const actionsEl = document.getElementById('actions');

  function fail(msg){
    if (spinnerEl) spinnerEl.style.display = 'none';
    titleEl.textContent = 'Sign-in failed';
    titleEl.className = 'title err';
    subEl.textContent = msg || 'This link is invalid or has expired.';
    actionsEl.innerHTML = '<a href="/profile" class="btn">Try again</a>';
  }

  function success(){
    if (spinnerEl) spinnerEl.style.display = 'none';
    titleEl.textContent = 'You are signed in.';
    titleEl.className = 'title ok';
    subEl.textContent = 'Redirecting to your profile...';
    setTimeout(() => { location.href = '/profile'; }, 800);
  }

  if (!token) { fail('No sign-in token in the URL.'); return; }

  try {
    const res = await fetch(WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'verify_magic_link', token }),
    });
    const d = await res.json();
    if (d.error) { fail(d.error); return; }
    if (!d.token) { fail('Server did not return a sign-in token.'); return; }

    // Store the JWT and clear any old session cache
    localStorage.setItem('hc_token', d.token);
    try { sessionStorage.removeItem('hc_progression_cache_v1'); } catch(e) {}
    try { sessionStorage.removeItem('hc_nudge_dismissed_v1'); } catch(e) {}

    success();
  } catch(e) {
    fail('Network error. Please try again.');
  }
})();
</script>
</body>
</html>
