const WORKER = 'https://histroychallenger-api.maletethan.workers.dev';

const LEADERS = {"caesar":{"name":"Julius Caesar","era":"100\u201344 BC \u00b7 Rome","summary":"The decisive improviser. You process fast, commit fully, and trust that momentum is its own strategy. You believe in your own judgment more than in any institution \u2014 and you are usually right.","traits":{"decisiveness":9,"strategic_patience":3,"means_vs_ends":4,"personal_control":9,"risk_appetite":9,"institutional_power":2}},"lincoln":{"name":"Abraham Lincoln","era":"1809\u20131865 \u00b7 United States","summary":"The patient anchor. You hold to a principle even when everything argues for abandoning it. You absorb pressure without breaking, delegate to capable people, and move only when the moment is right \u2014 then move completely.","traits":{"decisiveness":4,"strategic_patience":9,"means_vs_ends":8,"personal_control":4,"risk_appetite":5,"institutional_power":9}},"saladin":{"name":"Saladin","era":"1137\u20131193 \u00b7 Egypt & Syria","summary":"The principled strategist. You pursue your objective with relentless patience, but you will not compromise what you believe is right to get there faster. Victory without honor is not victory.","traits":{"decisiveness":5,"strategic_patience":9,"means_vs_ends":9,"personal_control":6,"risk_appetite":4,"institutional_power":6}},"napoleon":{"name":"Napoleon Bonaparte","era":"1769\u20131821 \u00b7 France","summary":"The visionary accelerator. You see further than others and move faster. You believe exceptional circumstances require exceptional people \u2014 and you are that person. You reshape the world rather than work within it.","traits":{"decisiveness":9,"strategic_patience":2,"means_vs_ends":3,"personal_control":10,"risk_appetite":8,"institutional_power":3}},"bismarck":{"name":"Otto von Bismarck","era":"1815\u20131898 \u00b7 Prussia/Germany","summary":"The system builder. You think in decades, not moments. You use conflict as a precision instrument \u2014 only when necessary, only as much as needed. You build structures that outlast you.","traits":{"decisiveness":6,"strategic_patience":10,"means_vs_ends":5,"personal_control":7,"risk_appetite":5,"institutional_power":10}},"genghis":{"name":"Genghis Khan","era":"1162\u20131227 \u00b7 Mongolia","summary":"The total commitment. Once you have decided, nothing is reserved. You do not manage risk \u2014 you eliminate the source of it. Efficiency is the only morality you recognize in conflict.","traits":{"decisiveness":10,"strategic_patience":6,"means_vs_ends":1,"personal_control":8,"risk_appetite":10,"institutional_power":5}},"wuzetian":{"name":"Wu Zetian","era":"624\u2013705 AD \u00b7 Tang China","summary":"The long-game player. You operate in environments hostile to your ambitions, so you are patient, indirect, and precise. You accumulate position before you act. When you move, it is decisive \u2014 but you have been preparing for years.","traits":{"decisiveness":6,"strategic_patience":10,"means_vs_ends":4,"personal_control":9,"risk_appetite":6,"institutional_power":8}}};
const QUESTIONS = [{"id":"q_caesar_1","source_leader":"caesar","trait_axis":"decisiveness","scenario":"You are at a boundary that, once crossed, commits you to a path with no return. Your legal authority ends here. Your rivals have maneuvered you into a position where standing still means defeat \u2014 but crossing means openly breaking the rules that define the system you operate in.","context":"Your key lieutenants are divided. Some urge patience. Others say momentum is the only weapon you have left. The window is hours, not days.","choices":[{"id":"A","text":"Cross immediately. The rules were already broken when they were used against you. Speed is the only remaining advantage.","leader_key":"caesar"},{"id":"B","text":"Wait and attempt one final negotiation. Moving with moral clarity is worth losing some momentum.","leader_key":"lincoln"},{"id":"C","text":"Cross, but send formal notice of your reasons first. Document that you acted only after all other options were exhausted.","leader_key":"saladin"},{"id":"D","text":"Use the moment to secure the loyalty of every subordinate before moving. An uncertain army is worse than a delayed one.","leader_key":"bismarck"}]},{"id":"q_caesar_2","source_leader":"caesar","trait_axis":"personal_control","scenario":"You have just won a decisive military victory. Your enemies are scattered, demoralized, and many have surrendered. Your inner circle expects a purge. History suggests that is the safe move.","context":"Among the defeated are several highly capable people who opposed you vigorously and would be valuable allies \u2014 if they could be trusted. They cannot be fully trusted. But they can be useful.","choices":[{"id":"A","text":"Pardon them publicly and bring them into your administration. Winning them over completely is worth the risk of betrayal.","leader_key":"caesar"},{"id":"B","text":"Pardon the rank and file. Remove the leaders permanently \u2014 exile rather than death, but remove them from the equation.","leader_key":"lincoln"},{"id":"C","text":"Offer generous terms to everyone. Even your fiercest opponents deserve the dignity of an honorable surrender.","leader_key":"saladin"},{"id":"D","text":"Pardon selectively and use the pardons as political instruments \u2014 each one a public demonstration of your magnanimity.","leader_key":"bismarck"}]},{"id":"q_caesar_3","source_leader":"caesar","trait_axis":"risk_appetite","scenario":"You are thousands of miles from your home base, deep in territory you were never authorized to enter. The campaign has exceeded its original scope dramatically. Your enemies at home are using your absence to undermine your political position.","context":"You could consolidate here and return home with a credible victory. Or you could push further \u2014 the next objective would be truly historic, but it requires another six months in the field.","choices":[{"id":"A","text":"Push further. A merely credible victory is forgettable. A historic one cannot be undone by political enemies.","leader_key":"caesar"},{"id":"B","text":"Consolidate and return. Your position at home matters more than marginal territorial gains abroad.","leader_key":"bismarck"},{"id":"C","text":"Send a delegation home to manage your political position while you continue the campaign with a smaller force.","leader_key":"napoleon"},{"id":"D","text":"Consolidate, but spend three months building the infrastructure that makes the next push inevitable and well-supplied.","leader_key":"wuzetian"}]},{"id":"q_caesar_4","source_leader":"caesar","trait_axis":"institutional_power","scenario":"You now hold more power than any person in your system's history. The formal rules were not designed for someone in your position. You could formalize your authority by changing the rules \u2014 or operate through existing structures while quietly controlling everything.","context":"Your advisors disagree sharply. Some say formal power is more honest and more stable. Others say the forms matter to people even when the substance does not.","choices":[{"id":"A","text":"Accumulate formal power openly. The pretense of shared authority is fragile and eventually dangerous.","leader_key":"caesar"},{"id":"B","text":"Work entirely within existing structures. The forms are not empty \u2014 they are what give authority its durability.","leader_key":"lincoln"},{"id":"C","text":"Create new institutions that formalize your authority while appearing to share it. Build the structure you need.","leader_key":"bismarck"},{"id":"D","text":"Maintain the fiction of traditional authority while building personal loyalty networks that make you indispensable.","leader_key":"wuzetian"}]},{"id":"q_caesar_5","source_leader":"caesar","trait_axis":"means_vs_ends","scenario":"An adviser warns you that several people close to you are planning to move against you. The evidence is credible but not conclusive. Acting on it means harming people who may be innocent. Not acting means giving genuine conspirators time to organize.","context":"You could act preemptively, wait for clearer evidence, or confront the suspects directly and give them a chance to demonstrate their loyalty.","choices":[{"id":"A","text":"Act on the intelligence now. The cost of being wrong about innocents is lower than the cost of being right about conspirators.","leader_key":"caesar"},{"id":"B","text":"Wait for clearer evidence. Harming the potentially innocent is not acceptable regardless of the strategic cost.","leader_key":"lincoln"},{"id":"C","text":"Confront them directly with the evidence. Give them the chance to prove their loyalty \u2014 or reveal their guilt.","leader_key":"saladin"},{"id":"D","text":"Do nothing visible, but quietly restructure access and information so that if they are planning something, they cannot execute it.","leader_key":"bismarck"}]},{"id":"q_caesar_6","source_leader":"caesar","trait_axis":"strategic_patience","scenario":"Your opponent has retreated to a fortified position and is clearly hoping you will attack directly, where your advantage is smallest. Waiting them out would work \u2014 they cannot sustain their position indefinitely \u2014 but it will take months.","context":"A bold flanking movement is risky but could end this in days. A siege would end it certainly but slowly. Your instincts are pulling you toward speed.","choices":[{"id":"A","text":"Execute the bold maneuver immediately. Months of siege cost more in total than a high-risk operation that takes days.","leader_key":"caesar"},{"id":"B","text":"Begin the siege. Patience is not passivity \u2014 it is choosing the ground where you are strongest.","leader_key":"saladin"},{"id":"C","text":"Appear to begin the siege while secretly preparing the flanking move. Deceive them about your intentions first.","leader_key":"napoleon"},{"id":"D","text":"Open negotiations while maintaining military pressure. A negotiated surrender costs nothing and wins everything.","leader_key":"bismarck"}]},{"id":"q_lincoln_1","source_leader":"lincoln","trait_axis":"strategic_patience","scenario":"You are prosecuting a long, costly campaign. Public support is eroding badly. Influential people in your own coalition are urging you to accept a compromise that would end the immediate conflict but permanently abandon the core principle you began it for.","context":"The compromise would stop the bleeding now. Refusing it means months or years more of painful attrition \u2014 with no guarantee of success.","choices":[{"id":"A","text":"Hold the principle. A victory that abandons what you were fighting for is not a victory.","leader_key":"lincoln"},{"id":"B","text":"Accept the compromise. Half a victory now is worth more than a total victory that may never come.","leader_key":"bismarck"},{"id":"C","text":"Reject the compromise publicly and in the strongest possible terms, to signal that you cannot be moved.","leader_key":"saladin"},{"id":"D","text":"Escalate dramatically to force a faster resolution \u2014 more pain now to end it sooner.","leader_key":"napoleon"}]},{"id":"q_lincoln_2","source_leader":"lincoln","trait_axis":"means_vs_ends","scenario":"You have the legal authority to take an action that would significantly accelerate your strategic objective. But the action is constitutionally questionable, and your legal advisors are divided about whether it falls within your powers.","context":"Waiting for clearer legal authority means delays that have real human costs. Acting now gets the result faster but creates a precedent that could be misused by successors.","choices":[{"id":"A","text":"Act, but frame it as a temporary emergency measure with built-in limits. Document your reasoning exhaustively.","leader_key":"lincoln"},{"id":"B","text":"Act immediately and without excessive justification. The result is what matters \u2014 constitutional scholars can sort out the theory later.","leader_key":"caesar"},{"id":"C","text":"Wait for clearer legal authority. Actions taken outside the law, even for good reasons, corrode the institutions you depend on.","leader_key":"saladin"},{"id":"D","text":"Use the legal ambiguity as a negotiating tool \u2014 threaten to act while seeking a legislative solution that gives you what you need with full authority.","leader_key":"bismarck"}]},{"id":"q_lincoln_3","source_leader":"lincoln","trait_axis":"institutional_power","scenario":"You need someone for a critical position. The best available person for the job is someone who has publicly criticized you, disagrees with your approach on several key points, and has their own political ambitions. But they are genuinely more capable than the loyal alternatives.","context":"Appointing them risks giving a rival a powerful platform. Not appointing them means a weaker outcome on something that matters enormously.","choices":[{"id":"A","text":"Appoint them. The job requires the best person, and your job is to put the best people in position regardless of the politics.","leader_key":"lincoln"},{"id":"B","text":"Appoint a loyal second-best. You need people you can trust to execute your vision, not people with competing ones.","leader_key":"napoleon"},{"id":"C","text":"Appoint them but give them clear constraints on their authority that limit their ability to build a rival power base.","leader_key":"bismarck"},{"id":"D","text":"Appoint them to the role only after a public process that makes the choice seem inevitable, not personal.","leader_key":"wuzetian"}]},{"id":"q_lincoln_4","source_leader":"lincoln","trait_axis":"strategic_patience","scenario":"A faction within your own side is pushing for a policy you believe is premature \u2014 not wrong in principle, but wrong in timing. Adopting it now would fracture your coalition. Refusing it openly would alienate an important part of your base.","context":"The policy will probably be necessary eventually. The question is whether now is the moment.","choices":[{"id":"A","text":"Delay it publicly while quietly building the conditions that will make it viable. The right moment matters as much as the right policy.","leader_key":"lincoln"},{"id":"B","text":"Push it through now despite the fracture risk. A policy you believe in is worth the political cost.","leader_key":"caesar"},{"id":"C","text":"Oppose it clearly. If it is wrong now, say so now \u2014 even at the cost of coalition unity.","leader_key":"saladin"},{"id":"D","text":"Let the faction advance it without your endorsement. If it succeeds, you benefit. If it fails, you are not attached to the failure.","leader_key":"bismarck"}]},{"id":"q_lincoln_5","source_leader":"lincoln","trait_axis":"personal_control","scenario":"You have assembled a team of highly capable people who frequently disagree with each other \u2014 and with you. Meetings are contentious. Progress is slow. You could impose tighter control on the process or let the disagreements run.","context":"The friction produces better decisions but exhausts everyone involved, including you. A more controlled process would be faster but narrower.","choices":[{"id":"A","text":"Keep the friction. The quality of the decisions is worth the cost. You can absorb the discomfort better than you can absorb the errors that come from too-easy agreement.","leader_key":"lincoln"},{"id":"B","text":"Streamline. Decisions need to be made faster. Get the best two or three voices and cut the rest.","leader_key":"caesar"},{"id":"C","text":"Maintain the team but establish clearer decision rules so that disagreement leads to a vote rather than indefinite debate.","leader_key":"bismarck"},{"id":"D","text":"Restructure the process so each person advises independently rather than debating each other \u2014 then you synthesize.","leader_key":"napoleon"}]},{"id":"q_lincoln_6","source_leader":"lincoln","trait_axis":"means_vs_ends","scenario":"The conflict you are engaged in is nearly won. The opposing side is asking for terms. You could impose harsh conditions that punish them for what they have done \u2014 which your supporters expect and demand \u2014 or offer generous terms that make the peace durable but feel inadequate to those who suffered.","context":"Harsh terms will satisfy the demand for justice but probably reignite the conflict within a generation. Generous terms will feel like injustice to people who sacrificed enormously.","choices":[{"id":"A","text":"Offer generous terms. The purpose of victory is a durable peace, not the satisfaction of grievances.","leader_key":"lincoln"},{"id":"B","text":"Offer terms calibrated to what the peace requires \u2014 generous enough to be accepted, firm enough to be remembered.","leader_key":"bismarck"},{"id":"C","text":"Offer generous terms publicly and unconditionally. The gesture of magnanimity matters as much as its content.","leader_key":"saladin"},{"id":"D","text":"Offer harsh terms initially as a negotiating position, then allow yourself to be persuaded toward generosity. The outcome is the same but you appear strong.","leader_key":"caesar"}]},{"id":"q_saladin_1","source_leader":"saladin","trait_axis":"means_vs_ends","scenario":"You have achieved a major victory. The population of the conquered territory is largely composed of people who supported your opponents, including many who fought against you. Your commanders expect significant retribution. Some of your soldiers are demanding it.","context":"Retribution would satisfy your forces and send a clear message about the cost of resistance. Restraint would be extraordinary by the standards of your era and might inspire broader submission.","choices":[{"id":"A","text":"Offer protection and fair terms to the civilian population. The way you win shapes what you build afterward.","leader_key":"saladin"},{"id":"B","text":"Allow limited retribution against those who actively fought against you while protecting civilians.","leader_key":"caesar"},{"id":"C","text":"Full restraint and amnesty, publicly announced in terms that make the contrast with your opponents' behavior explicit.","leader_key":"lincoln"},{"id":"D","text":"Systematic retribution against the leadership, protection for the population. Remove the threat completely.","leader_key":"genghis"}]},{"id":"q_saladin_2","source_leader":"saladin","trait_axis":"strategic_patience","scenario":"Your forces have surrounded a well-defended position. You could storm it at significant cost, or besiege it and wait for hunger and disease to do the work for you. Your generals are divided. The siege could take months.","context":"Every month of siege is a month your enemies elsewhere have to regroup. But a failed assault would be worse than a slow siege.","choices":[{"id":"A","text":"Besiege it. Time spent on a siege is not wasted \u2014 it is invested in a certain outcome rather than gambled on an uncertain one.","leader_key":"saladin"},{"id":"B","text":"Assault immediately. The cost in lives is real but so is the cost in time \u2014 and the initiative you lose while waiting.","leader_key":"napoleon"},{"id":"C","text":"Offer terms that make surrender attractive. A garrison that surrenders saves everyone the cost of both options.","leader_key":"bismarck"},{"id":"D","text":"Begin the siege but simultaneously launch a rapid strike elsewhere to demonstrate that the siege is not consuming all your attention.","leader_key":"caesar"}]},{"id":"q_saladin_3","source_leader":"saladin","trait_axis":"means_vs_ends","scenario":"You have captured a high-value prisoner who possesses information that could save many lives if obtained. Obtaining the information by ordinary means is unlikely to work. Your advisers suggest more coercive methods.","context":"The information is likely real and valuable. The methods proposed cross a line you have previously held. Your religious and ethical principles are directly in conflict with the strategic logic.","choices":[{"id":"A","text":"Refuse the coercive methods. There are lines that cannot be crossed regardless of the strategic benefit.","leader_key":"saladin"},{"id":"B","text":"Use whatever methods are necessary. The lives at stake outweigh the principle in this specific case.","leader_key":"genghis"},{"id":"C","text":"Attempt persuasion through an intermediary who the prisoner trusts. Look for a third path before closing it off.","leader_key":"lincoln"},{"id":"D","text":"Offer the prisoner something valuable in exchange for the information. Make cooperation more attractive than resistance.","leader_key":"bismarck"}]},{"id":"q_saladin_4","source_leader":"saladin","trait_axis":"strategic_patience","scenario":"You are engaged in a prolonged conflict with a powerful opponent. A temporary truce has been offered. The truce would give you time to consolidate \u2014 but would also give your opponent the same opportunity. Your advisors disagree about who benefits more from the pause.","context":"You are slightly ahead militarily but exhausted logistically. The opponent has deeper reserves but is politically under pressure to settle.","choices":[{"id":"A","text":"Accept the truce. Use the time to build strength and let their internal pressure do its work.","leader_key":"saladin"},{"id":"B","text":"Reject the truce and press the advantage now. Truces favor whoever has the stronger recovery capacity.","leader_key":"napoleon"},{"id":"C","text":"Accept the truce but use it to demonstrate strength publicly \u2014 show what you could have done if you had chosen to continue.","leader_key":"caesar"},{"id":"D","text":"Accept the truce while negotiating its terms to extract specific political concessions as the price of the pause.","leader_key":"bismarck"}]},{"id":"q_saladin_5","source_leader":"saladin","trait_axis":"means_vs_ends","scenario":"A prominent opponent offers to switch sides. Their defection would be a major strategic gain \u2014 it would weaken your enemy significantly and bring resources you badly need. But they have a reputation for betrayal and were responsible for serious harm to people under your protection.","context":"The strategic case for accepting them is strong. The moral case is difficult. Your closest advisors are divided.","choices":[{"id":"A","text":"Refuse. You cannot build something lasting on the foundation of people who betray their own side. Your values are not negotiable for strategic convenience.","leader_key":"saladin"},{"id":"B","text":"Accept them with conditions. People can be used strategically without being trusted personally.","leader_key":"caesar"},{"id":"C","text":"Accept them and find a way to use their defection without giving them real power or information they could misuse.","leader_key":"bismarck"},{"id":"D","text":"Accept them publicly with full honors. The message their defection sends is worth more than any private reservations.","leader_key":"napoleon"}]},{"id":"q_saladin_6","source_leader":"saladin","trait_axis":"personal_control","scenario":"You are about to enter a critical negotiation with an adversary who has requested a personal meeting. Your advisors believe the meeting is a trap \u2014 not physically, but diplomatically. The opponent wants to extract concessions through the pressure of direct personal exchange.","context":"Attending personally demonstrates confidence and good faith. Sending a representative protects you from the pressure but may insult the opponent and slow the process.","choices":[{"id":"A","text":"Attend personally. Direct negotiation demonstrates genuine intent and you trust your own judgment in the room.","leader_key":"saladin"},{"id":"B","text":"Send a senior representative with clear instructions. Protect your negotiating position by keeping personal pressure out of it.","leader_key":"bismarck"},{"id":"C","text":"Attend personally but set a strict time limit and agenda. Control the frame of the meeting from the start.","leader_key":"caesar"},{"id":"D","text":"Propose an alternative format \u2014 written exchange or a multi-party meeting \u2014 that reduces the personal-pressure dynamic.","leader_key":"lincoln"}]},{"id":"q_napoleon_1","source_leader":"napoleon","trait_axis":"risk_appetite","scenario":"You have achieved more than anyone thought possible. Your position is secure, your enemies are exhausted, and a negotiated settlement is available that would lock in your gains permanently. Your advisors are unanimous that this is the right moment to consolidate.","context":"You believe the settlement, while good, leaves possibilities unrealized. You are at the height of your power and capability. The next push might be the one that changes everything permanently.","choices":[{"id":"A","text":"Continue. The settlement locks in today's gains but closes off tomorrow's possibilities. You will take the risk.","leader_key":"napoleon"},{"id":"B","text":"Accept the settlement. A durable peace now is worth more than a theoretical larger gain later.","leader_key":"bismarck"},{"id":"C","text":"Accept the settlement but use the peace to consolidate the kind of structural advantages that make the next expansion easier.","leader_key":"wuzetian"},{"id":"D","text":"Accept the settlement publicly while immediately beginning preparations for the next campaign.","leader_key":"caesar"}]},{"id":"q_napoleon_2","source_leader":"napoleon","trait_axis":"personal_control","scenario":"Your organization has grown to a size where you can no longer be personally involved in every major decision. Your most capable subordinates are ready to operate more independently \u2014 but they have their own ideas about direction, and not all of those ideas match yours.","context":"Tight personal control keeps everything aligned but creates a bottleneck. Delegation accelerates execution but risks drift.","choices":[{"id":"A","text":"Maintain personal control over all key decisions. The alignment is worth the bottleneck. Your judgment is what made this succeed.","leader_key":"napoleon"},{"id":"B","text":"Delegate fully to the most capable people and trust the results. The best outcomes come from the best people, not from central control.","leader_key":"lincoln"},{"id":"C","text":"Delegate implementation while retaining control of strategy. Give people freedom on how, not freedom on what.","leader_key":"bismarck"},{"id":"D","text":"Delegate to people who understand your goals so deeply that their independent decisions align with yours by instinct.","leader_key":"genghis"}]},{"id":"q_napoleon_3","source_leader":"napoleon","trait_axis":"strategic_patience","scenario":"A campaign is not going as planned. Progress has stalled. Your supply chain is under strain. You are deep in hostile territory. The cautious move is to establish a strong defensive position and wait for better conditions.","context":"Your instinct says one more decisive action can break the stalemate. Your logistics officer says the numbers do not support it.","choices":[{"id":"A","text":"One more push. Defensive positions become permanent \u2014 the cautious move is always a slow way to lose.","leader_key":"napoleon"},{"id":"B","text":"Establish the defensive position. Patience now is not retreat \u2014 it is choosing the ground for the next offensive.","leader_key":"saladin"},{"id":"C","text":"Withdraw to a stronger logistical position. You cannot win without supply, and fighting on thin supply is gambling with other people's lives.","leader_key":"bismarck"},{"id":"D","text":"Execute a rapid strike at the enemy's weakest point before establishing the defensive position \u2014 commit to both.","leader_key":"caesar"}]},{"id":"q_napoleon_4","source_leader":"napoleon","trait_axis":"institutional_power","scenario":"You need to implement a major reform that requires changing a system that many powerful people depend on. The reform is clearly better for your overall goals, but it will create enemies among those who benefit from the current arrangement.","context":"You could push it through by force of authority, build consensus slowly, or find a way to compensate the losers while implementing the change.","choices":[{"id":"A","text":"Push it through directly using the authority you have. The reform is right and delay only gives opponents time to organize.","leader_key":"napoleon"},{"id":"B","text":"Build a coalition of support before moving. A reform that survives you is worth more than one that dies when your authority does.","leader_key":"lincoln"},{"id":"C","text":"Implement it gradually with transition arrangements for those affected. Make the change as painless as possible for the losers.","leader_key":"bismarck"},{"id":"D","text":"Implement it and simultaneously create new structures that give the displaced parties a stake in the new system.","leader_key":"wuzetian"}]},{"id":"q_napoleon_5","source_leader":"napoleon","trait_axis":"risk_appetite","scenario":"You are facing an opponent you have never faced before. Your intelligence is incomplete. A direct engagement carries significant risk of a catastrophic loss. An indirect approach would take much longer but reduces the risk dramatically.","context":"Your past successes were built on calculated aggression. But this opponent has specifically studied and prepared for your methods.","choices":[{"id":"A","text":"Engage directly and immediately, before they can implement their preparations fully. Speed negates preparation.","leader_key":"napoleon"},{"id":"B","text":"Take the time to study them before engaging. They have studied you \u2014 you must study them.","leader_key":"saladin"},{"id":"C","text":"Use a completely different approach than they are prepared for. Make their preparation useless by changing your method.","leader_key":"wuzetian"},{"id":"D","text":"Force a confrontation on ground of your choosing, not theirs. Control the terrain before you commit to the engagement.","leader_key":"genghis"}]},{"id":"q_napoleon_6","source_leader":"napoleon","trait_axis":"means_vs_ends","scenario":"A group of people who were not your enemies and did not oppose you will suffer significant harm as a side effect of a campaign you have decided to undertake. The harm is not the goal \u2014 it is an unavoidable consequence of the most efficient path.","context":"There is a less efficient path that avoids the harm but significantly increases the risk of failure. There is no path that avoids all harm.","choices":[{"id":"A","text":"Take the efficient path. Unintended harm is morally different from intended harm, and failure has costs too.","leader_key":"napoleon"},{"id":"B","text":"Take the less efficient path. People who have done nothing to you have a claim on your protection.","leader_key":"lincoln"},{"id":"C","text":"Take the efficient path but invest resources in mitigating the harm as much as possible within the operation.","leader_key":"saladin"},{"id":"D","text":"Delay the campaign until a path can be found that reduces the collateral harm to an acceptable level.","leader_key":"bismarck"}]},{"id":"q_bismarck_1","source_leader":"bismarck","trait_axis":"strategic_patience","scenario":"You need two rival factions to cooperate on a project that serves both their interests \u2014 but neither trusts the other enough to move first. You could try to broker a direct negotiation, or you could simply build conditions that make cooperation the path of least resistance without anyone having to formally agree to trust each other.","context":"The direct approach might work and would be faster. The indirect approach is slower but more durable.","choices":[{"id":"A","text":"Build the conditions patiently. Cooperation that happens because the incentives align is more durable than cooperation that requires trust.","leader_key":"bismarck"},{"id":"B","text":"Force the direct negotiation. If they cannot bring themselves to cooperate, the project does not work anyway.","leader_key":"caesar"},{"id":"C","text":"Broker the negotiation personally and take on the reputational risk of being the guarantor of both sides' commitments.","leader_key":"saladin"},{"id":"D","text":"Use a crisis to force both sides to cooperate by making the cost of non-cooperation immediate and visible.","leader_key":"napoleon"}]},{"id":"q_bismarck_2","source_leader":"bismarck","trait_axis":"institutional_power","scenario":"You have a chance to deliver a major near-term win that would be personally popular, but the method required would weaken an institution you have spent years building. The institution serves purposes beyond this particular win.","context":"Your supporters expect the win. They do not value the institution the way you do. The harm to the institution might not even be visible to them.","choices":[{"id":"A","text":"Protect the institution and forgo the win. Short-term popularity is not worth the long-term structural cost.","leader_key":"bismarck"},{"id":"B","text":"Take the win. The institution can be rebuilt. Popular support, once lost, is harder to recover.","leader_key":"caesar"},{"id":"C","text":"Take the win but invest part of the gain in repairing the institutional damage afterward.","leader_key":"lincoln"},{"id":"D","text":"Find a way to deliver a visible partial win without touching the institution. Give supporters something without paying the full cost.","leader_key":"wuzetian"}]},{"id":"q_bismarck_3","source_leader":"bismarck","trait_axis":"means_vs_ends","scenario":"You have engineered a conflict between two of your rivals. The conflict will weaken both of them and create an opportunity for you to advance your objectives. You did not start the underlying tensions \u2014 but you have deliberately inflamed them.","context":"The outcome serves your genuine strategic goals and will probably produce a better overall result than the alternative. But people will be harmed by the conflict you helped ignite.","choices":[{"id":"A","text":"Continue the strategy. Using existing tensions to advance strategic goals is not the same as creating harm from nothing.","leader_key":"bismarck"},{"id":"B","text":"Stop and attempt to mediate instead. Manipulating conflict \u2014 even existing conflict \u2014 is not a method you are willing to use.","leader_key":"saladin"},{"id":"C","text":"Continue, but limit the escalation to the minimum necessary to achieve your objective.","leader_key":"wuzetian"},{"id":"D","text":"Accelerate it. If the conflict is happening anyway, end it decisively rather than letting it smolder.","leader_key":"genghis"}]},{"id":"q_bismarck_4","source_leader":"bismarck","trait_axis":"strategic_patience","scenario":"You are negotiating an agreement with a counterpart who you know will eventually break it \u2014 not out of bad faith now, but because their circumstances will change and the agreement will become inconvenient for them. You could refuse to negotiate, or build the agreement in a way that makes breaking it very costly.","context":"The agreement has genuine near-term value even if it will not last forever. A shorter durable agreement might be better than a longer fragile one.","choices":[{"id":"A","text":"Build the agreement with structural incentives that make compliance the path of least resistance for as long as possible.","leader_key":"bismarck"},{"id":"B","text":"Negotiate the best terms you can and trust that shared interests will maintain it longer than structural incentives.","leader_key":"lincoln"},{"id":"C","text":"Refuse to negotiate an agreement you know will be broken. Your credibility depends on not entering agreements that fail.","leader_key":"saladin"},{"id":"D","text":"Negotiate for short-term gain only \u2014 extract what value you can while the agreement holds and prepare for its end.","leader_key":"caesar"}]},{"id":"q_bismarck_5","source_leader":"bismarck","trait_axis":"risk_appetite","scenario":"A major opportunity has appeared, but seizing it requires taking an action that could be interpreted as provocative by a much larger power. The opportunity is real and significant. The risk of retaliation is real but not certain.","context":"The larger power has been passive and distracted recently \u2014 but that could change. If they react strongly, your position becomes significantly worse than it was before the opportunity appeared.","choices":[{"id":"A","text":"Seize the opportunity but in a manner so carefully calibrated that it is difficult for the larger power to justify a strong response.","leader_key":"bismarck"},{"id":"B","text":"Seize it directly and immediately. Caution invites the opportunity to close.","leader_key":"napoleon"},{"id":"C","text":"Wait until the larger power is further distracted or until you can build a coalition that changes the risk calculation.","leader_key":"wuzetian"},{"id":"D","text":"Do not seize it. The opportunity is real but the downside risk outweighs the gain.","leader_key":"lincoln"}]},{"id":"q_bismarck_6","source_leader":"bismarck","trait_axis":"institutional_power","scenario":"You are building something that you intend to outlast you. You could build it around your own personal authority \u2014 fast, effective, but fragile after you. Or you could build institutions, rules, and systems that do not depend on any individual \u2014 slower, harder, but durable.","context":"Building around yourself is working extremely well right now. Several advisors are asking you to think about what happens when you are no longer there to run it.","choices":[{"id":"A","text":"Build the institution. The whole point is to create something that outlasts any individual, including you.","leader_key":"bismarck"},{"id":"B","text":"Build around yourself for now and systematize later when the foundational work is complete.","leader_key":"napoleon"},{"id":"C","text":"Build both simultaneously \u2014 the personal authority to get things done now and the institutional structure that will sustain it.","leader_key":"lincoln"},{"id":"D","text":"Build institutions, but design them so that the person who built them retains unique authority within them.","leader_key":"caesar"}]},{"id":"q_genghis_1","source_leader":"genghis","trait_axis":"means_vs_ends","scenario":"You are facing an opponent who has refused to negotiate, killed your envoys, and repeatedly broken agreements. You have the capacity to defeat them militarily. The question is how complete the defeat should be.","context":"A partial defeat leaves them capable of future resistance. A total defeat eliminates the threat permanently but requires methods that go beyond what is militarily necessary.","choices":[{"id":"A","text":"Total defeat. When an opponent has demonstrated they will not keep agreements, the only reliable solution is to eliminate their capacity for future action.","leader_key":"genghis"},{"id":"B","text":"Decisive military defeat with generous terms afterward. The leadership is broken \u2014 the people have done nothing to deserve collective punishment.","leader_key":"saladin"},{"id":"C","text":"Defeat them and then rebuild them as a dependent client. A broken but functional opponent is more useful than a destroyed one.","leader_key":"bismarck"},{"id":"D","text":"Military defeat sufficient to force surrender, then use the terms to establish exactly the relationship you need.","leader_key":"napoleon"}]},{"id":"q_genghis_2","source_leader":"genghis","trait_axis":"personal_control","scenario":"You are expanding rapidly. Your organization's reach is now far beyond what any single person can physically monitor. You must find people to lead distant operations. The question is how much authority to delegate to them.","context":"Full autonomy enables faster action but risks those leaders developing independent agendas. Tight constraints keep alignment but slow everything down.","choices":[{"id":"A","text":"Give full operational autonomy to leaders who have proven themselves. They know the objective \u2014 trust them to achieve it by whatever means work.","leader_key":"genghis"},{"id":"B","text":"Delegate implementation but require strategic check-ins on all major decisions. Trust but verify.","leader_key":"bismarck"},{"id":"C","text":"Retain tight personal control and accept the speed penalty. The coherence of command matters more than local speed.","leader_key":"napoleon"},{"id":"D","text":"Select leaders whose values and judgment are so aligned with yours that their autonomous decisions naturally reflect your intentions.","leader_key":"lincoln"}]},{"id":"q_genghis_3","source_leader":"genghis","trait_axis":"risk_appetite","scenario":"Your scouts report that a target you have been pursuing has retreated to a position widely considered impregnable. Every historical attempt to take it has failed. Your advisors recommend bypassing it and returning later with more resources.","context":"Bypassing it leaves a threat at your rear. Taking it against the historical record is a gamble. The resources it would consume are real.","choices":[{"id":"A","text":"Attempt it immediately with everything available. The belief that it is impregnable is itself the main obstacle.","leader_key":"genghis"},{"id":"B","text":"Bypass it for now. Leave a containment force and return when you have the resources to take it properly.","leader_key":"saladin"},{"id":"C","text":"Attempt it but only after a thorough study of why all previous attempts failed \u2014 then attack the specific weakness rather than the whole position.","leader_key":"napoleon"},{"id":"D","text":"Offer terms first. The defenders know the historical record too. The threat of your full attention may be enough.","leader_key":"bismarck"}]},{"id":"q_genghis_4","source_leader":"genghis","trait_axis":"institutional_power","scenario":"You have conquered a territory with administrative systems, laws, and specialists who know how to run it. Your instinct is to replace their systems with yours. Your advisors suggest using their existing systems and specialists \u2014 it's faster and they know the terrain.","context":"Using their systems means absorbing their approach rather than transforming the territory. Replacing everything is slower but produces something that is fully yours.","choices":[{"id":"A","text":"Use whatever works. The goal is functional control, not ideological purity about systems. Keep what functions and change what does not.","leader_key":"genghis"},{"id":"B","text":"Replace the systems with yours. Long-term coherence requires that everything operates on the same principles.","leader_key":"napoleon"},{"id":"C","text":"Keep the administrative systems but change the leadership. Functional bureaucracy is valuable wherever you find it.","leader_key":"bismarck"},{"id":"D","text":"Keep the systems but audit them deeply first. Absorb what is useful, identify what is dangerous, eliminate the latter.","leader_key":"wuzetian"}]},{"id":"q_genghis_5","source_leader":"genghis","trait_axis":"decisiveness","scenario":"You have multiple operations running simultaneously. One of them is going badly and will probably fail. Reinforcing it might save it but will cost you resources the other operations need. Abandoning it saves those resources but means accepting the failure.","context":"The failing operation was never the most important one. But the people running it have been loyal and capable. Abandoning them now sends a message.","choices":[{"id":"A","text":"Abandon it immediately. Resources follow the operation with the best chance of success, not the one that has already failed.","leader_key":"genghis"},{"id":"B","text":"Reinforce it once, significantly, to determine decisively whether it can be saved. Then decide.","leader_key":"napoleon"},{"id":"C","text":"Maintain minimal support to keep the team intact while focusing resources elsewhere. Do not abandon people.","leader_key":"lincoln"},{"id":"D","text":"Formally end the operation but reassign the team to the better-performing operations immediately. Make the transition clean.","leader_key":"bismarck"}]},{"id":"q_genghis_6","source_leader":"genghis","trait_axis":"strategic_patience","scenario":"A rival has been gradually encroaching on territory you consider yours. Each individual step has been small enough to be dismissed as accidental. The cumulative effect is significant. Responding to each small step is costly and looks reactive. Waiting for a clear act of aggression risks allowing the pattern to become permanent.","context":"Your advisors cannot agree on when the line has been crossed. The rival seems to be testing your response.","choices":[{"id":"A","text":"Respond to the pattern, not the individual steps. Make clear now that the cumulative effect is unacceptable \u2014 before it becomes the new normal.","leader_key":"genghis"},{"id":"B","text":"Wait for a clear, unambiguous act that gives you maximum justification for a decisive response.","leader_key":"bismarck"},{"id":"C","text":"Respond through institutional channels \u2014 formal complaints, documented protests. Establish the record before escalating.","leader_key":"lincoln"},{"id":"D","text":"Make a decisive show of force in a different area to signal that gradual encroachment has a cost \u2014 without directly confronting the specific action.","leader_key":"caesar"}]},{"id":"q_wuzetian_1","source_leader":"wuzetian","trait_axis":"strategic_patience","scenario":"You are working toward an objective that requires you to operate within a system controlled by people who would block you if they understood your true intentions. You could move openly and confront the resistance directly \u2014 or move indirectly, using the system's own mechanisms to advance your position before making your goals explicit.","context":"The direct approach is honest and faster but risks being stopped before you are strong enough to overcome the opposition. The indirect approach takes longer but puts you in a stronger position when the confrontation eventually happens.","choices":[{"id":"A","text":"Move indirectly and patiently. Build your position within the existing structure before revealing the full scope of your intentions.","leader_key":"wuzetian"},{"id":"B","text":"Move openly. Indirect methods corrode trust even when they work, and you will need trust for what comes afterward.","leader_key":"lincoln"},{"id":"C","text":"Move directly and quickly, accepting the confrontation before your opponents can organize a coherent response.","leader_key":"napoleon"},{"id":"D","text":"Move indirectly, but within the rules of the system. Manipulation that uses legitimate mechanisms is different from manipulation that breaks them.","leader_key":"bismarck"}]},{"id":"q_wuzetian_2","source_leader":"wuzetian","trait_axis":"personal_control","scenario":"You have reached a position of authority. The people who supported you to get there now expect influence over decisions. Some of them are capable and useful. Others helped you get here but are not equipped for what comes next.","context":"Rewarding all supporters maintains loyalty but dilutes the quality of your decision-making. Selecting only the capable ones will create resentment among those passed over.","choices":[{"id":"A","text":"Give supporters visible positions with limited real authority. Honor the relationship without compromising the quality of decisions.","leader_key":"wuzetian"},{"id":"B","text":"Select based purely on capability. The people who helped you get here were repaid by helping you get here.","leader_key":"napoleon"},{"id":"C","text":"Give supporters real authority in their areas of competence and manage around their limitations elsewhere.","leader_key":"lincoln"},{"id":"D","text":"Create new roles for supporters that expand your organizational capacity rather than diluting existing decision-making structures.","leader_key":"bismarck"}]},{"id":"q_wuzetian_3","source_leader":"wuzetian","trait_axis":"means_vs_ends","scenario":"A political opponent is spreading damaging accusations about you. The accusations are false, but the people making them have enough credibility that direct denial is unlikely to be effective. You have access to accurate but damaging information about this opponent that is not publicly known.","context":"Using the information would discredit them and end the accusations. But the information was obtained in a way that was ethically questionable, and using it exposes your methods.","choices":[{"id":"A","text":"Use the information. Your survival and your ability to accomplish your goals are worth the ethical compromise of the method.","leader_key":"wuzetian"},{"id":"B","text":"Do not use it. The ethical cost of using information obtained wrongly is not offset by the political benefit.","leader_key":"lincoln"},{"id":"C","text":"Find another way to discredit the accusations without touching the compromised information.","leader_key":"bismarck"},{"id":"D","text":"Use it but through an intermediary so that its use cannot be traced back to you directly.","leader_key":"caesar"}]},{"id":"q_wuzetian_4","source_leader":"wuzetian","trait_axis":"institutional_power","scenario":"You have an opportunity to reform a system that is deeply unfair and has historically excluded capable people based on irrelevant criteria. The reform would genuinely improve the quality of your organization, but it threatens people who have built their position on the existing system.","context":"The reform is right. The opposition is powerful and entrenched. The timing is not obviously favorable.","choices":[{"id":"A","text":"Push the reform now, using your current authority to overcome the opposition before they can organize.","leader_key":"wuzetian"},{"id":"B","text":"Build a coalition for the reform over time, accepting that it will take longer but will be more durable.","leader_key":"lincoln"},{"id":"C","text":"Implement a partial version of the reform that does not directly threaten the entrenched interests while moving in the right direction.","leader_key":"bismarck"},{"id":"D","text":"Create parallel structures that implement the reform in new areas without dismantling the old ones \u2014 let the new system prove itself.","leader_key":"napoleon"}]},{"id":"q_wuzetian_5","source_leader":"wuzetian","trait_axis":"strategic_patience","scenario":"You have been working in a subordinate position for a long time, demonstrating your capability and building influence. The person above you is making decisions you know are wrong, but openly contradicting them would threaten your position.","context":"You could challenge them now and risk being removed, or continue to influence decisions subtly while waiting for the right moment to assume more authority.","choices":[{"id":"A","text":"Continue building influence subtly. The right moment will come \u2014 acting before it arrives is impatience, not principle.","leader_key":"wuzetian"},{"id":"B","text":"Challenge them openly. Complicity in decisions you know are wrong has its own long-term cost.","leader_key":"saladin"},{"id":"C","text":"Challenge them privately. Express your disagreement clearly but not publicly \u2014 allow them the chance to reconsider.","leader_key":"lincoln"},{"id":"D","text":"Maneuver to reduce their authority over the specific decisions you consider most harmful while supporting them broadly.","leader_key":"bismarck"}]},{"id":"q_wuzetian_6","source_leader":"wuzetian","trait_axis":"risk_appetite","scenario":"You have a chance to make a move that would transform your position dramatically \u2014 but it is extremely risky and depends on several things going right simultaneously. If it works, your objectives become achievable. If it fails, you are significantly worse off than before you attempted it.","context":"The conditions for this move will probably not align again for years. Your current position is stable but limiting.","choices":[{"id":"A","text":"Make the move. A stable but limiting position is just a slower form of failure. The conditions are as good as they will get.","leader_key":"wuzetian"},{"id":"B","text":"Wait. The conditions are good but not perfect \u2014 and the downside is severe. Build them further before committing.","leader_key":"saladin"},{"id":"C","text":"Make a partial version of the move \u2014 enough to test the conditions without fully committing to the risk.","leader_key":"bismarck"},{"id":"D","text":"Make the move immediately and completely. Half measures in situations like this produce the worst outcomes.","leader_key":"napoleon"}]}];

function log(msg, cls=''){
  const el = document.getElementById('log');
  const line = document.createElement('div');
  if(cls) line.className = cls;
  line.textContent = msg;
  el.appendChild(line);
}

async function seedAll(){
  document.getElementById('btn').disabled = true;
  log('Starting seed...');

  // Seed leaders
  log('\nSeeding leaders...');
  for(const [id, leader] of Object.entries(LEADERS)){
    try{
      const r = await fetch(WORKER, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          action: 'upsert_persona_leader',
          id,
          name: leader.name,
          era: leader.era,
          summary: leader.summary,
          traits: JSON.stringify(leader.traits)
        })
      });
      const d = await r.json();
      if(d.success) log(`  ✓ ${leader.name}`, 'ok');
      else log(`  ✗ ${leader.name}: ${d.error}`, 'err');
    }catch(e){ log(`  ✗ ${leader.name}: ${e.message}`, 'err'); }
  }

  // Seed questions
  log('\nSeeding questions...');
  let ok=0, fail=0;
  for(const q of QUESTIONS){
    try{
      const r = await fetch(WORKER, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          action: 'upsert_persona_question',
          id: q.id,
          source_leader: q.source_leader,
          trait_axis: q.trait_axis,
          scenario: q.scenario,
          context: q.context,
          choices: JSON.stringify(q.choices)
        })
      });
      const d = await r.json();
      if(d.success){ ok++; }
      else{ fail++; log(`  ✗ ${q.id}: ${d.error}`, 'err'); }
    }catch(e){ fail++; log(`  ✗ ${q.id}: ${e.message}`, 'err'); }
  }
  log(`  ${ok} questions seeded, ${fail} failed`, ok>0?'ok':'err');

  log('\nDone!', 'ok');
  document.getElementById('btn').disabled = false;
}
</script>
</body>
</html>
