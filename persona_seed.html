function log(msg, cls){
  const el = document.getElementById('log');
  const span = document.createElement('span');
  if(cls) span.className = cls;
  span.textContent = msg + '\n';
  el.appendChild(span);
}

// Leaders we previously had that have been retired from the roster.
// We try to delete them so the UI doesn't show ghost entries.
// If your backend worker doesn't expose a delete action this will no-op gracefully.
const REMOVED_LEADERS = ['saladin', 'wuzetian'];
const REMOVED_QUESTION_PREFIXES = ['q_saladin_', 'q_wuzetian_'];

async function seedAll(){
  const btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';

  // Attempt to delete retired leaders. Non-fatal if the action isn't supported.
  log('Cleaning up retired leaders...', 'warn');
  for(const key of REMOVED_LEADERS){
    try{
      const r = await fetch(WORKER, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ action: 'delete_persona_leader', id: key })
      });
      const d = await r.json();
      if(d.success) log(`  removed leader ${key}`, 'ok');
      else log(`  could not remove ${key} (${d.error || 'no delete action'}), skipping`, 'warn');
    }catch(e){ log(`  skip ${key}: ${e.message}`, 'warn'); }
  }

  log(`\nSeeding ${Object.keys(LEADERS).length} leaders...`, 'warn');
  let ok = 0, fail = 0;
  for(const key in LEADERS){
    const leader = LEADERS[key];
    try{
      const r = await fetch(WORKER, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          action: 'upsert_persona_leader',
          id: key,
          name: leader.name,
          era: leader.era,
          summary: leader.summary,
          bio: leader.bio,
          traits: JSON.stringify(leader.traits)
        })
      });
      const d = await r.json();
      if(d.success){ ok++; log(`  \u2713 ${leader.name}`, 'ok'); }
      else{ fail++; log(`  \u2717 ${leader.name}: ${d.error}`, 'err'); }
    }catch(e){ fail++; log(`  \u2717 ${leader.name}: ${e.message}`, 'err'); }
  }
  log(`  ${ok} leaders seeded, ${fail} failed`, ok>0?'ok':'err');

  log(`\nSeeding ${QUESTIONS.length} questions...`, 'warn');
  ok = 0; fail = 0;
  for(const q of QUESTIONS){
    try{
      const r = await fetch(WORKER, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          action: 'upsert_persona_question',
          id: q.id,
          source_leader: q.source_leader,
          trait_axis: q.trait_axis,
          scenario: q.scenario,
          context: q.context,
          choices: JSON.stringify(q.choices)
        })
      });
      const d = await r.json();
      if(d.success){ ok++; }
      else{ fail++; log(`  \u2717 ${q.id}: ${d.error}`, 'err'); }
    }catch(e){ fail++; log(`  \u2717 ${q.id}: ${e.message}`, 'err'); }
  }
  log(`  ${ok} questions seeded, ${fail} failed`, ok>0?'ok':'err');

  log('\nDone!', 'ok');
  document.getElementById('btn').disabled = false;
}
