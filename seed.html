<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pool Seeder — Admin</title>
<style>
body{font-family:monospace;background:#000;color:#0f0;padding:2rem;max-width:900px}
h1{color:#c8903a;margin-bottom:1rem}
button{background:#c8903a;color:#000;border:none;padding:8px 20px;font-size:14px;cursor:pointer;border-radius:6px;margin:4px;font-weight:700}
button:disabled{opacity:.5;cursor:default}
.log{background:#0a0a0a;border:1px solid #1a1a1a;padding:1rem;margin-top:1rem;height:380px;overflow-y:auto;font-size:13px;line-height:1.6}
.ok{color:#0f0}.err{color:#f44}.info{color:#c8903a}
select,input{background:#111;color:#fff;border:1px solid #333;padding:6px 10px;border-radius:4px;font-family:monospace}
.row{margin-bottom:1rem}
#gate{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;z-index:999}
#gate input{font-size:16px;padding:10px 16px;width:260px;text-align:center}
#gate button{font-size:15px;padding:10px 28px}
#gate .err{color:#f44;font-size:13px;display:none}
/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;border-bottom:1px solid #1a1a1a;padding-bottom:0}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:#555;padding:8px 20px;font-size:14px;cursor:pointer;font-family:monospace;margin-bottom:-1px}
.tab:hover{color:#fff}
.tab.active{color:#c8903a;border-bottom-color:#c8903a}
.tab-content{display:none}
.tab-content.active{display:block}
/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:1.5rem}
.dash-card{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:8px;padding:16px;text-align:center}
.dash-val{font-size:2rem;font-weight:700;color:#c8903a}
.dash-lbl{font-size:11px;color:#555;margin-top:4px}
.dash-section{margin-bottom:1.5rem}
.dash-section h3{color:#c8903a;font-size:14px;margin-bottom:.75rem;border-bottom:1px solid #1a1a1a;padding-bottom:.4rem}
.dash-table{width:100%;border-collapse:collapse;font-size:13px}
.dash-table th{text-align:left;color:#555;padding:4px 8px;font-weight:normal;font-size:11px;text-transform:uppercase}
.dash-table td{padding:5px 8px;border-bottom:1px solid #0a0a0a}
.dash-table tr:hover td{background:#0a0a0a}
.bar{height:6px;background:#1a1a1a;border-radius:3px;margin-top:4px;overflow:hidden}
.bar-fill{height:100%;background:#c8903a;border-radius:3px}
.bar-fill.green{background:#0f0}
.bar-fill.blue{background:#5ac8fa}
</style>
</head>
<body>

<div id="gate">
  <div style="color:#c8903a;font-size:20px;font-weight:700;font-family:monospace">🌱 Admin Access</div>
  <input type="password" id="pw" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')checkPw()">
  <button onclick="checkPw()">Enter</button>
  <div class="err" id="pw-err">Wrong password</div>
</div>

<h1>⚙️ History Challenger Admin</h1>

<div class="tabs">
  <button class="tab active" onclick="switchTab('seeder')">🌱 Seeder</button>
  <button class="tab" onclick="switchTab('dashboard')">📊 Dashboard</button>
</div>

<!-- SEEDER TAB -->
<div id="tab-seeder" class="tab-content active">
<div class="row">
  <label>Mode: 
    <select id="mode" onchange="toggleMode()">
      <option value="random">Random pool</option>
      <option value="theme">Theme pool</option>
      <option value="overlap">Did They Overlap?</option>
    </select>
  </label>
</div>
<div class="row">
  <label>Difficulty: 
    <select id="diff"><option value="disciple">Disciple</option><option value="master">Master</option><option value="keeper">Keeper</option></select>
  </label>
  &nbsp;
  <label>Language: 
    <select id="lang"><option value="en">English</option><option value="fr">French</option><option value="de">German</option><option value="es">Spanish</option></select>
  </label>
  &nbsp;
  <label>Batches: 
    <input type="number" id="batches" value="10" min="1" max="50" style="width:60px">
  </label>
</div>
<div class="row" id="theme-row" style="display:none">
  <label>Theme: 
    <select id="theme-select">
      <option value="bronze-age|the Bronze Age civilisations: Mesopotamia, Egypt, Mycenae, Hittites, Indus Valley">Bronze Age</option>
      <option value="iron-age|the Iron Age: early Greece, Assyria, Persia, Celtic Europe, early Rome">Iron Age</option>
      <option value="ancient-world|the ancient world: Classical Greece, Republican and Imperial Rome, Egypt, Persia">Ancient World</option>
      <option value="medieval|medieval history: feudalism, crusades, plague, the Mongols, Byzantine Empire">Medieval</option>
      <option value="early-modern|early modern history: Renaissance, Reformation, Age of Exploration, 1400-1700">Early Modern</option>
      <option value="revolutions|the age of revolutions: American, French, Haitian, Latin American, 1776-1830">Revolutions</option>
      <option value="19th-century|19th century: industrialisation, nationalism, imperialism">19th Century</option>
      <option value="world-wars|World War I and World War II: key battles, turning points, political events">World Wars</option>
      <option value="cold-war|the Cold War 1945-1991: space race, proxy wars, nuclear standoff, detente">Cold War</option>
      <option value="aviation|the history of aviation: from the Wright Brothers to the jet age and space flight">Aviation</option>
      <option value="medicine|the history of medicine: discoveries, vaccines, surgery, anatomy, public health breakthroughs">Medicine</option>
      <option value="technology|landmark moments in technology history: inventions, computers, communications, engineering">Technology</option>
      <option value="ancient-asia|ancient Asian history: Han Dynasty China, Maurya India, classical Japan, Southeast Asia">Ancient Asia</option>
      <option value="science|landmark moments in science: physics, chemistry, biology, astronomy, mathematics">Science</option>
    </select>
  </label>
</div>
<div class="row">
  <button onclick="startSeeding()" id="btn-start">▶ Start Seeding (5 sets per batch)</button>
  <button onclick="stopSeeding()" id="btn-stop" disabled>⏹ Stop</button>
  <button onclick="checkCount()">📊 Check counts</button>
</div>
<div class="row" id="all-themes-row">
  <button onclick="seedAllThemes()" id="btn-all" style="background:#1a6a1a">🌍 Seed ALL themes (current diff/lang)</button>
  <button onclick="seedAllOverlap()" id="btn-all-overlap" style="background:#1a1a6a;display:none">🏛 Seed ALL 3 difficulties (overlap)</button>
</div>
<div class="log" id="log"></div>
</div><!-- end seeder tab -->

<!-- DASHBOARD TAB -->
<div id="tab-dashboard" class="tab-content">
  <div style="margin-bottom:1rem">
    <button onclick="loadDashboard()">🔄 Refresh</button>
    <span id="dash-updated" style="color:#333;font-size:12px;margin-left:12px"></span>
  </div>
  <div id="dash-content" style="color:#555;font-size:14px">Click Refresh to load stats...</div>
</div>

<script>
const WORKER='https://histroychallenger-api.maletethan.workers.dev';
let running=false;
let ADMIN_KEY='';

function checkPw(){
  const pw=document.getElementById('pw').value;
  if(pw.length>=8){
    ADMIN_KEY=pw;
    document.getElementById('gate').style.display='none';
  } else {
    document.getElementById('pw-err').style.display='block';
    document.getElementById('pw-err').textContent='Key must be at least 8 characters';
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}

function log(msg,cls=''){
  const el=document.getElementById('log');
  el.innerHTML+=`<div class="${cls}">${new Date().toLocaleTimeString()} — ${msg}</div>`;
  el.scrollTop=el.scrollHeight;
}

async function toggleMode(){
  const mode = document.getElementById('mode').value;
  document.getElementById('theme-row').style.display = mode==='theme' ? 'block' : 'none';
  document.getElementById('btn-all').style.display = mode==='overlap' ? 'none' : 'inline-block';
  document.getElementById('btn-all-overlap').style.display = mode==='overlap' ? 'inline-block' : 'none';
  // Hide lang for overlap (always English)
  document.getElementById('lang').parentElement.style.display = mode==='overlap' ? 'none' : 'inline';
}

async function startSeeding(){
  const mode = document.getElementById('mode').value;
  if(mode === 'overlap'){ return seedOverlapBatch(); }

  running = true;
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').disabled = false;
  const diff = document.getElementById('diff').value;
  const lang = document.getElementById('lang').value;
  const batches = parseInt(document.getElementById('batches').value) || 10;

  let themeSlug = null, themeQ = null;
  if(mode === 'theme'){
    const val = document.getElementById('theme-select').value;
    [themeSlug, themeQ] = val.split('|');
    themeSlug = diff + '_theme_' + themeSlug;
    log(`Starting theme seeding: ${themeSlug} — ${batches} batches × 5 = ${batches*5} sets`, 'info');
  } else {
    log(`Starting random seeding: ${diff}/${lang} — ${batches} batches × 5 = ${batches*5} sets`, 'info');
  }

  for(let i = 0; i < batches; i++){
    if(!running) break;
    try{
      log(`Batch ${i+1}/${batches}...`);
      const payload = {action:'seed_pool', diff, lang, batch:5, admin_key:ADMIN_KEY};
      if(mode === 'theme'){ payload.theme_slug = themeSlug; payload.theme_q = themeQ; }
      const res = await fetch(WORKER, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
      const data = await res.json();
      if(data.error){ log(`Error: ${data.error}`, 'err'); break; }
      log(`✓ Saved ${data.saved} sets. Total: ${data.total}`, 'ok');
      await new Promise(r => setTimeout(r, 1500));
    }catch(e){
      log(`Error: ${e.message}`, 'err'); break;
    }
  }
  log('Done.', 'info');
  running = false;
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled = true;
}

async function seedOverlapBatch(){
  running = true;
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').disabled = false;
  const diff = document.getElementById('diff').value;
  const batches = parseInt(document.getElementById('batches').value) || 10;
  log(`Starting overlap seeding: ${diff} — ${batches} batches × 5 = ${batches*5} sets`, 'info');

  for(let i = 0; i < batches; i++){
    if(!running) break;
    try{
      log(`Batch ${i+1}/${batches}...`);
      const res = await fetch(WORKER, {method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({action:'seed_overlap', diff, batch:5, admin_key:ADMIN_KEY})});
      const data = await res.json();
      if(data.error){ log(`Error: ${data.error}`, 'err'); break; }
      log(`✓ Saved ${data.saved}. Total ${diff}: ${data.total}`, 'ok');
      await new Promise(r => setTimeout(r, 2000));
    }catch(e){
      log(`Error: ${e.message}`, 'err'); break;
    }
  }
  log('Done.', 'info');
  running = false;
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled = true;
}

async function seedAllOverlap(){
  running = true;
  document.getElementById('btn-all-overlap').disabled = true;
  document.getElementById('btn-stop').disabled = false;
  const batches = parseInt(document.getElementById('batches').value) || 10;
  const diffs = ['disciple', 'master', 'keeper'];

  for(const diff of diffs){
    if(!running) break;
    log(`\n── Overlap ${diff} ──`, 'info');
    for(let i = 0; i < batches; i++){
      if(!running) break;
      try{
        log(`  Batch ${i+1}/${batches}...`);
        const res = await fetch(WORKER, {method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({action:'seed_overlap', diff, batch:5, admin_key:ADMIN_KEY})});
        const data = await res.json();
        if(data.error){ log(`  Error: ${data.error}`, 'err'); break; }
        log(`  ✓ Saved ${data.saved}. Total ${diff}: ${data.total}`, 'ok');
        await new Promise(r => setTimeout(r, 2000));
      }catch(e){
        log(`  Error: ${e.message}`, 'err'); break;
      }
    }
  }
  log('\n🏛 All overlap difficulties done.', 'info');
  running = false;
  document.getElementById('btn-all-overlap').disabled = false;
  document.getElementById('btn-stop').disabled = true;
}

async function checkCount(){
  log('Checking pool counts...','info');
  const diffs=['disciple','master','keeper'];
  for(const d of diffs){
    const res=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'get_sets',diff:d,lang:'en',needed:0,seen_ids:[]})});
    const data=await res.json();
    log(`${d}/en random: available`,'ok');
  }
}

async function startSeeding(){
  running=true;
  document.getElementById('btn-start').disabled=true;
  document.getElementById('btn-stop').disabled=false;
  const diff=document.getElementById('diff').value;
  const lang=document.getElementById('lang').value;
  const batches=parseInt(document.getElementById('batches').value)||10;
  const mode=document.getElementById('mode').value;

  let themeSlug=null,themeQ=null;
  if(mode==='theme'){
    const val=document.getElementById('theme-select').value;
    [themeSlug,themeQ]=val.split('|');
    themeSlug=diff+'_theme_'+themeSlug;
    log(`Starting theme seeding: ${themeSlug} — ${batches} batches × 5 = ${batches*5} sets`,'info');
  } else {
    log(`Starting random seeding: ${diff}/${lang} — ${batches} batches × 5 = ${batches*5} sets`,'info');
  }

  for(let i=0;i<batches;i++){
    if(!running)break;
    try{
      log(`Batch ${i+1}/${batches}...`);
      const payload={action:'seed_pool',diff,lang,batch:5,admin_key:ADMIN_KEY};
      if(mode==='theme'){payload.theme_slug=themeSlug;payload.theme_q=themeQ;}
      const res=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      const data=await res.json();
      if(data.error){log(`Error: ${data.error}`,'err');break;}
      log(`✓ Saved ${data.saved} sets. Total: ${data.total}`,'ok');
      await new Promise(r=>setTimeout(r,1500));
    }catch(e){
      log(`Error: ${e.message}`,'err');break;
    }
  }
  log('Done.','info');
  running=false;
  document.getElementById('btn-start').disabled=false;
  document.getElementById('btn-stop').disabled=true;
}

function stopSeeding(){
  running=false;
  log('Stopping after current batch...','info');
  document.getElementById('btn-stop').disabled=true;
}

const ALL_THEMES=[
  {slug:'bronze-age',q:'the Bronze Age civilisations: Mesopotamia, Egypt, Mycenae, Hittites, Indus Valley'},
  {slug:'iron-age',q:'the Iron Age: early Greece, Assyria, Persia, Celtic Europe, early Rome'},
  {slug:'ancient-world',q:'the ancient world: Classical Greece, Republican and Imperial Rome, Egypt, Persia'},
  {slug:'medieval',q:'medieval history: feudalism, crusades, plague, the Mongols, Byzantine Empire'},
  {slug:'early-modern',q:'early modern history: Renaissance, Reformation, Age of Exploration, 1400-1700'},
  {slug:'revolutions',q:'the age of revolutions: American, French, Haitian, Latin American, 1776-1830'},
  {slug:'19th-century',q:'19th century: industrialisation, nationalism, imperialism'},
  {slug:'world-wars',q:'World War I and World War II: key battles, turning points, political events'},
  {slug:'cold-war',q:'the Cold War 1945-1991: space race, proxy wars, nuclear standoff, detente'},
  {slug:'aviation',q:'the history of aviation: from the Wright Brothers to the jet age and space flight'},
  {slug:'medicine',q:'the history of medicine: discoveries, vaccines, surgery, anatomy, public health breakthroughs'},
  {slug:'technology',q:'landmark moments in technology history: inventions, computers, communications, engineering'},
  {slug:'ancient-asia',q:'ancient Asian history: Han Dynasty China, Maurya India, classical Japan, Southeast Asia'},
  {slug:'science',q:'landmark moments in science: physics, chemistry, biology, astronomy, mathematics'},
];

async function seedAllThemes(){
  const diff=document.getElementById('diff').value;
  const lang=document.getElementById('lang').value;
  const batches=parseInt(document.getElementById('batches').value)||10;
  running=true;
  document.getElementById('btn-all').disabled=true;
  document.getElementById('btn-start').disabled=true;
  document.getElementById('btn-stop').disabled=false;
  log(`🌍 Seeding ALL ${ALL_THEMES.length} themes × ${batches} batches for ${diff}/${lang}`,'info');

  for(const theme of ALL_THEMES){
    if(!running)break;
    const themeSlug=diff+'_theme_'+theme.slug;
    log(`\n── Theme: ${theme.slug} ──`,'info');
    for(let i=0;i<batches;i++){
      if(!running)break;
      try{
        log(`  Batch ${i+1}/${batches}...`);
        const res=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({action:'seed_pool',diff,lang,batch:5,admin_key:ADMIN_KEY,theme_slug:themeSlug,theme_q:theme.q})});
        const data=await res.json();
        if(data.error){log(`  Error: ${data.error}`,'err');break;}
        log(`  ✓ Saved ${data.saved}. Total: ${data.total}`,'ok');
        await new Promise(r=>setTimeout(r,1500));
      }catch(e){
        log(`  Error: ${e.message}`,'err');break;
      }
    }
  }
  log('\n🌍 All themes done.','info');
  running=false;
  document.getElementById('btn-all').disabled=false;
  document.getElementById('btn-start').disabled=false;
  document.getElementById('btn-stop').disabled=true;
}
// ── TABS ─────────────────────────────────────────────────────────
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  event.target.classList.add('active');
  if(name==='dashboard') loadDashboard();
}

// ── DASHBOARD ────────────────────────────────────────────────────
async function loadDashboard(){
  const el=document.getElementById('dash-content');
  el.innerHTML='<span style="color:#c8903a">Loading...</span>';
  try{
    const res=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'get_stats',admin_key:ADMIN_KEY})});
    const d=await res.json();
    if(d.error){el.innerHTML=`<span class="err">Error: ${d.error}</span>`;return;}
    renderDashboard(d);
    document.getElementById('dash-updated').textContent='Updated '+new Date().toLocaleTimeString();
  }catch(e){
    el.innerHTML=`<span class="err">Failed: ${e.message}</span>`;
  }
}

function bar(val,max,cls=''){
  const pct=max>0?Math.min(100,Math.round(val/max*100)):0;
  return `<div class="bar"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>`;
}

function renderDashboard(d){
  const maxHC=Math.max(...d.hc.byDiff.map(x=>x.n)||[1]);
  const maxOV=Math.max(...d.overlap.byDiff.map(x=>x.n)||[1]);
  const maxSess=Math.max(...d.sessions.byDiff.map(x=>x.n)||[1]);

  // Theme breakdown
  const themeMap={};
  d.hc.themes.forEach(t=>{
    const name=t.theme_slug.replace(/^(disciple|master|keeper)_theme_/,'');
    if(!themeMap[name])themeMap[name]={};
    themeMap[name][t.diff]=t.n;
  });
  const themeRows=Object.entries(themeMap).map(([name,diffs])=>`
    <tr>
      <td style="color:#aaa">${name}</td>
      <td style="color:#5acc8a">${diffs.disciple||0}</td>
      <td style="color:#c8903a">${diffs.master||0}</td>
      <td style="color:#e0a84a">${diffs.keeper||0}</td>
      <td style="color:#666">${(diffs.disciple||0)+(diffs.master||0)+(diffs.keeper||0)}</td>
    </tr>`).join('');

  // Random pool rows
  const randomRows=d.hc.random.map(r=>`
    <tr>
      <td style="color:#aaa">${r.diff}</td>
      <td>${r.n}</td>
      <td>${bar(r.n,maxHC)}</td>
    </tr>`).join('');

  // Overlap rows
  const ovRows=d.overlap.byDiff.map(r=>`
    <tr>
      <td style="color:#aaa">${r.diff}</td>
      <td>${r.n}</td>
      <td>${bar(r.n,maxOV,'blue')}</td>
    </tr>`).join('');

  // Session rows
  const sessRows=d.sessions.byDiff.map(r=>`
    <tr>
      <td style="color:#aaa">${r.game_type||'timeline'}</td>
      <td style="color:#aaa">${r.diff}</td>
      <td>${r.n}</td>
      <td style="color:#c8903a">${r.avg}%</td>
      <td>${bar(r.n,maxSess,'green')}</td>
    </tr>`).join('');

  // Lang breakdown
  const langRows=d.hc.byLang.map(r=>`
    <tr><td style="color:#aaa">${r.lang}</td><td>${r.n}</td></tr>`).join('');

  document.getElementById('dash-content').innerHTML=`
    <!-- TOP STATS -->
    <div class="dash-grid">
      <div class="dash-card"><div class="dash-val">${d.users.total}</div><div class="dash-lbl">Registered users</div></div>
      <div class="dash-card"><div class="dash-val">${d.sessions.total}</div><div class="dash-lbl">Total game sessions</div></div>
      <div class="dash-card"><div class="dash-val">${d.sessions.last7days}</div><div class="dash-lbl">Sessions (last 7 days)</div></div>
      <div class="dash-card"><div class="dash-val">${d.hc.total}</div><div class="dash-lbl">HC sets in pool</div></div>
      <div class="dash-card"><div class="dash-val">${d.overlap.total}</div><div class="dash-lbl">Overlap sets in pool</div></div>
      <div class="dash-card"><div class="dash-val">${(d.hc.played||0)+(d.overlap.played||0)}</div><div class="dash-lbl">Total pool plays</div></div>
    </div>

    <!-- SESSIONS BY GAME -->
    <div class="dash-section">
      <h3>Sessions by game type</h3>
      <table class="dash-table">
        <tr>${d.sessions.byType.map(t=>`<td style="color:#aaa;padding:6px 12px;border:1px solid #1a1a1a;text-align:center"><div style="font-size:1.5rem;color:#c8903a">${t.n}</div><div style="font-size:11px;color:#555">${t.game_type||'timeline'}</div></td>`).join('')}</tr>
      </table>
    </div>

    <!-- HC RANDOM POOL -->
    <div class="dash-section">
      <h3>🧭 History Challenger — Random pool</h3>
      <table class="dash-table">
        <tr><th>Difficulty</th><th>Sets</th><th style="width:200px">Fill</th></tr>
        ${randomRows}
      </table>
    </div>

    <!-- HC THEMES -->
    <div class="dash-section">
      <h3>🧭 History Challenger — Theme pool</h3>
      <table class="dash-table">
        <tr><th>Theme</th><th style="color:#5acc8a">Disciple</th><th style="color:#c8903a">Master</th><th style="color:#e0a84a">Keeper</th><th>Total</th></tr>
        ${themeRows||'<tr><td colspan="5" style="color:#333">No theme sets yet</td></tr>'}
      </table>
    </div>

    <!-- OVERLAP POOL -->
    <div class="dash-section">
      <h3>⏳ Did They Overlap? — Pool</h3>
      <table class="dash-table">
        <tr><th>Difficulty</th><th>Sets</th><th style="width:200px">Fill</th></tr>
        ${ovRows||'<tr><td colspan="3" style="color:#333">No overlap sets yet</td></tr>'}
      </table>
    </div>

    <!-- SESSIONS BY DIFF -->
    <div class="dash-section">
      <h3>Session performance by difficulty</h3>
      <table class="dash-table">
        <tr><th>Game</th><th>Difficulty</th><th>Sessions</th><th>Avg score</th><th style="width:160px"></th></tr>
        ${sessRows||'<tr><td colspan="5" style="color:#333">No sessions yet</td></tr>'}
      </table>
    </div>

    <!-- LANG -->
    <div class="dash-section">
      <h3>Pool by language</h3>

        <tr><th>Language</th><th>Sets</th></tr>
        ${langRows}
      </table>
    </div>
  `;
}
</script>
</body>
