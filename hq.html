<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History Quotient | Test Your Depth of Historical Knowledge</title>
<meta name="description" content="An adaptive history quiz: 30 questions, 5 difficulty levels. Questions adjust to your level in real time. Earn a score from 0 to 990 that reflects how much history you really know.">
<meta name="robots" content="index, follow">
<meta property="og:title" content="History Quotient | Test Your Depth of Historical Knowledge">
<meta property="og:description" content="Thirty adaptive questions across every era. Your score reflects not what you remember, but what you really know.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://historychallenger.com/hq.html">
<meta name="twitter:card" content="summary_large_image">
<link rel="canonical" href="https://historychallenger.com/hq.html">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#000;color:#fff;min-height:100vh}
a{color:#c8903a;text-decoration:none}
.page{max-width:720px;margin:0 auto;padding:2rem 1.5rem 5rem}

/* INTRO */
.intro-wrap{display:flex;justify-content:center;padding-top:1rem}
.intro-card{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:16px;padding:2.5rem 2rem;max-width:480px;width:100%;text-align:center}
.intro-icon{font-size:48px;margin-bottom:1rem}
.intro-title{font-family:Georgia,serif;font-size:1.8rem;font-weight:700;color:#c8903a;margin-bottom:.5rem}
.intro-sub{font-size:15px;color:#aaa;line-height:1.6;margin-bottom:1.5rem}
.current-hq-display{background:#0a0800;border:1px solid #c8903a44;border-radius:12px;padding:1rem;margin-bottom:1.5rem}
.chq-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.25rem}
.chq-value{font-family:Georgia,serif;font-size:2.5rem;font-weight:700;color:#c8903a;line-height:1}
.chq-band{font-size:13px;color:#aaa;margin-top:.25rem}
.intro-details{display:flex;flex-direction:column;gap:.5rem;margin-bottom:2rem;text-align:left}
.detail-row{font-size:13px;color:#aaa;display:flex;align-items:center;gap:.5rem}
.detail-icon{font-size:16px;width:24px;text-align:center}
.start-btn{background:#c8903a;color:#000;border:none;border-radius:10px;padding:14px 36px;font-size:16px;font-weight:700;cursor:pointer;width:100%}
.start-btn:hover{background:#b07828}
.guest-note{font-size:12px;color:#555;margin-top:1rem}

/* QUIZ */
.quiz-wrap{display:flex;flex-direction:column;gap:1rem}
.quiz-top{display:flex;justify-content:space-between;align-items:center}
.quiz-progress-text{font-size:13px;color:#7a6040;font-weight:600}
.quiz-hq-live{font-size:13px;color:#aaa;font-family:-apple-system,sans-serif}
.quiz-hq-live strong{color:#c8903a;font-size:15px}
.quiz-hq-live.hq-up strong{color:#5acc8a}
.quiz-hq-live.hq-down strong{color:#cc6644}
.quiz-progress-bar{height:4px;background:#1a1a1a;border-radius:2px;overflow:hidden}
.quiz-progress-fill{height:100%;background:#c8903a;border-radius:2px;transition:width .4s ease}
.quiz-card{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:14px;padding:1.75rem}
.quiz-meta{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.75rem}
.quiz-question{font-family:Georgia,serif;font-size:1.2rem;line-height:1.55;color:#fff;margin-bottom:1.5rem}
.quiz-options{display:flex;flex-direction:column;gap:.6rem}
.opt-btn{display:flex;align-items:center;gap:.75rem;background:#111;border:1px solid #2a2a2a;color:#ddd;border-radius:10px;padding:.85rem 1rem;cursor:pointer;text-align:left;font-size:14px;font-family:-apple-system,sans-serif;transition:background .15s,border-color .15s;width:100%}
.opt-btn:hover:not(:disabled){background:#1a1a1a;border-color:#444}
.opt-btn:disabled{cursor:default}
.opt-letter{font-weight:700;color:#c8903a;min-width:20px;font-size:13px}
.opt-text{flex:1;line-height:1.4}

/* FEEDBACK STATES */
.opt-btn.correct-ans{background:#0d2a1a;border-color:#5acc8a;color:#fff}
.opt-btn.correct-ans .opt-letter{color:#5acc8a}
.opt-btn.wrong-ans{background:#2a0d0d;border-color:#cc4444;color:#fff}
.opt-btn.wrong-ans .opt-letter{color:#cc4444}
.opt-btn.disabled{opacity:.7}
.feedback-banner{border-radius:8px;padding:.6rem 1rem;font-size:14px;font-weight:700;margin-bottom:1rem;text-align:center}
.feedback-banner.correct{background:#0d2a1a;color:#5acc8a;border:1px solid #2a5a2a}
.feedback-banner.incorrect{background:#2a0d0d;color:#cc4444;border:1px solid #5a2a2a}

/* RESULT */
.result-wrap{display:flex;justify-content:center;padding-top:1rem}
.result-card{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:16px;padding:2.5rem 2rem;max-width:480px;width:100%;text-align:center}
.result-hq-label{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem}
.result-hq-value{font-family:Georgia,serif;font-size:5rem;font-weight:700;line-height:1;margin-bottom:.25rem}
.result-hq-max{font-family:Georgia,serif;font-size:1.6rem;font-weight:400;color:#666;margin-left:.25rem;vertical-align:super}
.result-band{font-size:1.2rem;font-weight:700;color:#c8903a;margin-bottom:.5rem}
.result-desc{font-size:13px;color:#aaa;line-height:1.6;margin-bottom:1.25rem;max-width:320px;margin-left:auto;margin-right:auto}
.result-percentile{font-size:13px;color:#c8903a;line-height:1.5;margin-bottom:1.5rem;padding:.75rem 1rem;background:#0a0800;border:1px solid #c8903a33;border-radius:8px;font-family:-apple-system,sans-serif}
.result-percentile strong{color:#e8b060;font-size:15px}
.result-stats{display:flex;justify-content:center;gap:2.5rem;margin-bottom:2rem;padding:1.25rem;background:#0a0a0a;border-radius:12px}
.result-stat{}
.rs-val{font-family:Georgia,serif;font-size:1.75rem;font-weight:700;color:#c8903a}
.rs-lbl{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.06em;margin-top:.2rem}
.result-actions{display:flex;flex-direction:column;gap:.75rem}
.result-link{font-size:14px;color:#c8903a;font-weight:600;padding:.75rem}
.review-btn{background:#1a1a1a;color:#c8903a;border:1px solid #c8903a;border-radius:10px;padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;width:100%}
.review-btn:hover{background:#221a0a}

/* REVIEW */
.review-wrap{max-width:680px;margin:0 auto;padding-top:1rem}
.review-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.review-title{font-family:Georgia,serif;font-size:1.5rem;font-weight:700;color:#c8903a}
.review-back{background:transparent;border:1px solid #c8903a55;color:#c8903a;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer}
.review-back:hover{background:#1a1a1a}
.review-empty{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:14px;padding:2rem;text-align:center;color:#aaa}
.review-card{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:12px;padding:1.25rem;margin-bottom:.85rem}
.review-meta{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem;display:flex;justify-content:space-between}
.review-q{font-family:Georgia,serif;font-size:1.05rem;line-height:1.5;color:#fff;margin-bottom:.85rem}
.review-opts{display:flex;flex-direction:column;gap:.4rem}
.review-opt{display:flex;align-items:center;gap:.6rem;border-radius:8px;padding:.6rem .85rem;font-size:13.5px;border:1px solid #2a2a2a;background:#111;color:#bbb}
.review-opt-letter{font-weight:700;min-width:18px;color:#888;font-size:12px}
.review-opt-text{flex:1;line-height:1.4}
.review-tag{font-size:10px;font-weight:700;letter-spacing:.05em;padding:2px 7px;border-radius:4px;text-transform:uppercase}
.review-opt.your-pick{background:#2a0d0d;border-color:#cc4444;color:#fff}
.review-opt.your-pick .review-opt-letter{color:#cc6666}
.review-opt.your-pick .review-tag{background:#cc4444;color:#000}
.review-opt.right-ans{background:#0d2a1a;border-color:#5acc8a;color:#fff}
.review-opt.right-ans .review-opt-letter{color:#5acc8a}
.review-opt.right-ans .review-tag{background:#5acc8a;color:#000}

/* LOADING */
.loading-wrap{display:flex;justify-content:center;align-items:center;min-height:300px}
.loading-text{color:#7a6040;font-size:15px}

@media(max-width:600px){
  .intro-card,.result-card{padding:1.75rem 1.25rem}
  .quiz-question{font-size:1.1rem}
  .result-hq-value{font-size:4rem}
  .result-stats{gap:1.5rem}
}
</style>
<script src="/nav.js?v=4" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a150e;--parchment:#f5edd8;--gold:#8a6208;--page-bg:#f0e6cc}
html,body{background:#f0e6cc !important}
.intro-card,.quiz-card,.result-card{background:#0d0d0d !important}
.quiz-progress-text{color:#5a3e1a !important}
.loading-text{color:#7a6040 !important}
.guest-note{color:#7a6040 !important}
</style>
</head>
<body>

<div class="page" id="page"></div>

<script>
const WORKER = 'https://histroychallenger-api.maletethan.workers.dev';
const TOTAL = 30;
const FEEDBACK_MS = 1800;

const HQ_BANDS = [
  {min:950,label:'Master Historian',desc:'An extraordinary command of history spanning all eras and regions. Truly exceptional.',color:'#e8d060'},
  {min:850,label:'Expert Historian', desc:'Deep specialist knowledge. You would hold your own in academic discussion.',color:'#c8903a'},
  {min:750,label:'Historian',        desc:'Exceptional breadth and depth well beyond the typical enthusiast.',color:'#a07828'},
  {min:650,label:'Scholar',          desc:'Serious history buff with strong command of detail across many periods.',color:'#5acc8a'},
  {min:500,label:'Knowledgeable',    desc:'A genuine history enthusiast with solid knowledge across multiple eras.',color:'#4a9a6a'},
  {min:350,label:'Informed',         desc:'Above-average knowledge with good grounding in major historical events.',color:'#6888cc'},
  {min:200,label:'Apprentice',       desc:'Basic history knowledge with clear room to grow.',color:'#8888aa'},
  {min:0,  label:'Novice',           desc:'Just starting your history journey. Keep exploring.',color:'#888'},
];
function getBand(hq){return HQ_BANDS.find(b=>hq>=b.min)||HQ_BANDS[HQ_BANDS.length-1];}
function getToken(){return localStorage.getItem('hc_token');}

let S = {
  phase:'intro',
  sessionId:null,
  question:null,
  questionNum:0,
  hq:400,
  correctCount:0,
  lastResult:null,
  userHQ:null,
  answered:false,
  history:[],
};

function render(){
  const p=document.getElementById('page');
  if(S.phase==='intro')    p.innerHTML=renderIntro();
  if(S.phase==='loading')  p.innerHTML=renderLoading();
  if(S.phase==='quiz')     p.innerHTML=renderQuiz();
  if(S.phase==='result')   p.innerHTML=renderResult();
  if(S.phase==='review')   p.innerHTML=renderReview();
}

function renderIntro(){
  const band=S.userHQ?getBand(S.userHQ):null;
  return `<div class="intro-wrap"><div class="intro-card">
    <div class="intro-icon">📊</div>
    <h1 class="intro-title">History Quotient</h1>
    <p class="intro-sub">An adaptive assessment that measures the depth of your historical knowledge. Questions adjust to your level in real time.</p>
    ${band?`<div class="current-hq-display">
      <div class="chq-label">Your current HQ</div>
      <div class="chq-value" style="color:${band.color}">${Math.round(S.userHQ)}</div>
      <div class="chq-band">${band.label}</div>
    </div>`:''}
    <div class="intro-details">
      <div class="detail-row"><span class="detail-icon">📝</span> 30 adaptive questions</div>
      <div class="detail-row"><span class="detail-icon">📈</span> Difficulty adjusts after every answer</div>
      <div class="detail-row"><span class="detail-icon">🔁</span> Minimises repeats across retakes</div>
      <div class="detail-row"><span class="detail-icon">🏆</span> Maximum score: 990</div>
    </div>
    <button class="start-btn" onclick="startSession()">Begin Assessment</button>
    ${!getToken()?`<p class="guest-note">Sign in to save your HQ to your profile.</p>`:''}
  </div></div>`;
}

function renderLoading(){
  return `<div class="loading-wrap"><div class="loading-text">Preparing your assessment…</div></div>`;
}

function renderQuiz(){
  const q=S.question;
  const opts=['a','b','c','d'];
  const labels=['A','B','C','D'];
  const pct=Math.round(((S.questionNum-1)/TOTAL)*100);
  if (window.hcSetReportContext){
    window.hcSetReportContext({
      game_type: 'hq',
      item_type: 'question',
      item_id: q.id,
      snapshot_text: q.question.slice(0, 140),
      snapshot: { question: q.question, answers: q.answers, topic: q.topic, era: q.era, difficulty: q.difficulty },
    });
  }
  return `<div class="quiz-wrap">
    <div class="quiz-top">
      <div class="quiz-progress-text">Question ${S.questionNum} of ${TOTAL}</div>
    </div>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
    <div class="quiz-card">
      <div class="quiz-meta">${[q.era,q.topic].filter(Boolean).join(' · ')}</div>
      <div class="quiz-question">${q.question}</div>
      <div class="quiz-options">
        ${opts.map((o,i)=>`<button class="opt-btn" id="opt-${o}" onclick="submitAnswer(${i})">
          <span class="opt-letter">${labels[i]}</span>
          <span class="opt-text">${q.answers[i]}</span>
        </button>`).join('')}
      </div>
    </div>
  </div>`;
}

function renderResult(){
  const r=S.lastResult;
  const finalHQ=Math.round(r.final_hq);
  const band=getBand(finalHQ);
  const correct=S.correctCount;
  const wrong=TOTAL-correct;
  const pct=Math.round((correct/TOTAL)*100);
  const showPercentile = r.total_takers && r.total_takers >= 20 && r.percentile != null;
  return `<div class="result-wrap"><div class="result-card">
    <div class="result-hq-label">Your History Quotient</div>
    <div class="result-hq-value" style="color:${band.color}">${finalHQ}<span class="result-hq-max">/ 990</span></div>
    <div class="result-band">${band.label}</div>
    <div class="result-desc">${band.desc}</div>
    ${showPercentile?`<div class="result-percentile">Higher than <strong>${r.percentile}%</strong> of ${r.total_takers.toLocaleString()} people who have taken the test.</div>`:''}
    <div class="result-stats">
      <div class="result-stat"><div class="rs-val" style="color:#5acc8a">${correct}</div><div class="rs-lbl">Correct</div></div>
      <div class="result-stat"><div class="rs-val" style="color:#cc6644">${wrong}</div><div class="rs-lbl">Incorrect</div></div>
      <div class="result-stat"><div class="rs-val">${pct}%</div><div class="rs-lbl">Accuracy</div></div>
    </div>
    <div class="result-actions">
      <button class="start-btn" onclick="startSession()">Retake Assessment</button>
      ${wrong>0?`<button class="review-btn" onclick="showReview()">Review your ${wrong} wrong answer${wrong===1?'':'s'}</button>`:''}
      <a href="/profile.html" class="result-link">View Profile →</a>
    </div>
    ${!getToken()?`<p class="guest-note" style="margin-top:1rem">Sign in to save this score to your profile.</p>`:''}
  </div></div>`;
}

function renderReview(){
  const wrongs = S.history.filter(h => !h.correct);
  const labels = ['A','B','C','D'];
  const cards = wrongs.map(h => {
    const opts = h.answers.map((txt, i) => {
      const isCorrect = i === h.correct_idx;
      const isPicked  = i === h.chosen_idx;
      const cls = isCorrect ? 'right-ans' : (isPicked ? 'your-pick' : '');
      const tag = isCorrect ? '<span class="review-tag">Correct</span>'
                : (isPicked  ? '<span class="review-tag">Your answer</span>' : '');
      return `<div class="review-opt ${cls}">
        <span class="review-opt-letter">${labels[i]}</span>
        <span class="review-opt-text">${txt}</span>
        ${tag}
      </div>`;
    }).join('');
    return `<div class="review-card">
      <div class="review-meta"><span>Question ${h.num}</span>${h.topic?`<span>${h.topic}</span>`:''}</div>
      <div class="review-q">${h.question}</div>
      <div class="review-opts">${opts}</div>
    </div>`;
  }).join('');

  return `<div class="review-wrap">
    <div class="review-header">
      <div class="review-title">Review · ${wrongs.length} wrong answer${wrongs.length===1?'':'s'}</div>
      <button class="review-back" onclick="backToResult()">← Back to result</button>
    </div>
    ${wrongs.length ? cards : '<div class="review-empty">A clean run. Nothing to review.</div>'}
    <div style="text-align:center;margin-top:1.5rem">
      <button class="review-back" onclick="backToResult()">← Back to result</button>
    </div>
  </div>`;
}

function showReview(){ S.phase='review'; render(); window.scrollTo(0,0); }
function backToResult(){ S.phase='result'; render(); window.scrollTo(0,0); }

async function startSession(){
  S.phase='loading'; S.questionNum=0; S.hq=400; S.correctCount=0; S.lastResult=null; S.answered=false; S.history=[];
  render();
  try{
    const res=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'start_hq_session',token:getToken()})});
    const d=await res.json();
    if(d.error){showError(d.error);return;}
    S.sessionId=d.session_id; S.question=d.question; S.questionNum=1; S.hq=d.current_hq;
    S.phase='quiz'; render();
  }catch(e){showError('Network error. Please try again.');}
}

async function submitAnswer(chosenIdx){
  if(S.phase!=='quiz'||S.answered) return;
  S.answered=true;
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  try{
    const res=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'submit_hq_answer',token:getToken(),session_id:S.sessionId,question_id:S.question.id,answer_idx:chosenIdx})});
    const d=await res.json();
    if(d.error){showError(d.error);return;}
    S.lastResult={...d, chosen:chosenIdx};
    S.hq=d.new_hq;
    if(d.correct) S.correctCount++;
    S.history.push({
      num: S.questionNum,
      topic: S.question.topic,
      question: S.question.question,
      answers: S.question.answers,
      correct_idx: d.correct_idx,
      chosen_idx: chosenIdx,
      correct: d.correct
    });
    if(d.completed){
      S.phase='result';
    } else {
      S.question=d.next_question;
      S.questionNum=d.questions_answered+1;
      S.answered=false;
      S.phase='quiz';
    }
    render();
  }catch(e){showError('Network error. Please try again.');}
}

function showError(msg){
  document.getElementById('page').innerHTML=`<div style="text-align:center;padding:4rem;color:#7a6040">
    <p style="font-size:16px;margin-bottom:1rem">${msg}</p>
    <button onclick="location.reload()" style="background:#c8903a;color:#000;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700">Reload</button>
  </div>`;
}

async function init(){
  const token=getToken();
  if(token){
    try{
      const res=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'get_profile',token})});
      const d=await res.json();
      if(d.user) S.userHQ=d.user.hq_score||null;
    }catch(e){}
  }
  S.phase='intro'; render();
}

init();
</script>

</body>
</html>
